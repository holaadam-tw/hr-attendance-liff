<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📍 打卡 - 員工服務中心</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loadingPage" class="loading-screen">
        <div class="spinner"></div>
        <p>系統載入中...</p>
    </div>

    <div class="container">
        <div id="checkInPage" class="page active">
            <button class="btn btn-secondary" onclick="window.location.href='index.html'" style="width:auto;margin-bottom:10px;margin-top:0;">← 返回</button>
            <div class="checkin-page">
                <h2 id="checkInTitle" style="text-align:center;font-size:18px;font-weight:800;color:#0F172A;">📍 上班打卡</h2>
                <div id="checkInStatus" class="status-box show info" style="margin-top:12px;">準備開啟相機...</div>
                
                <!-- 班別資訊 -->
                <div id="shiftInfo" style="display:flex;justify-content:space-between;align-items:center;background:#DBEAFE;border-radius:12px;padding:14px;margin-bottom:16px;">
                    <div>
                        <div style="font-size:12px;color:#1E40AF;font-weight:600;">今日班別：早班</div>
                        <div style="font-size:13px;color:#1E40AF;margin-top:2px;">08:00 - 17:00</div>
                    </div>
                    <div id="currentTime" style="font-size:24px;font-weight:900;color:#1E40AF;">--:--</div>
                </div>

                <div class="camera-container" id="cameraContainer">
                    <video id="video" autoplay playsinline muted></video>
                    <canvas id="canvas" class="hidden"></canvas>
                    <div class="camera-overlay" id="cameraOverlay" style="display:none;">
                        <span id="overlayLocation">📍 定位中...</span>
                        <span id="overlayStatus" style="color:#10B981;">-</span>
                    </div>
                </div>

                <button class="btn btn-primary" id="captureBtn" onclick="captureAndCheckIn()" disabled style="font-size:16px;padding:16px;border-radius:16px;">📸 拍照並打卡</button>
                <input type="file" id="captureInput" accept="image/jpeg,image/png" capture="user" style="display:none" onchange="handleCapturePhoto(this)">
            </div>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        let currentCheckInType = 'in';

        // 更新時鐘
        function updateClock() {
            const now = new Date();
            const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            const el = document.getElementById('currentTime');
            if (el) el.textContent = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function captureAndCheckIn() {
            // capture input 模式 → 觸發系統相機
            if (useCaptureInput) {
                showToast('📷 若出現相簿，請點選畫面中的「相機」圖示拍照');
                document.getElementById('captureInput').click();
                return;
            }

            if (!currentEmployee) { showToast('❌ 員工資料未載入'); return; }

            const btn = document.getElementById('captureBtn');
            const statusBox = document.getElementById('checkInStatus');
            btn.disabled = true; btn.textContent = '處理中...';
            
            try {
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');
                
                // ===== 圖片壓縮：縮放至 max 800x600 =====
                const vw = video.videoWidth, vh = video.videoHeight;
                const MAX_W = 800, MAX_H = 600;
                let cw = vw, ch = vh;
                if (cw > MAX_W) { ch = Math.round(ch * MAX_W / cw); cw = MAX_W; }
                if (ch > MAX_H) { cw = Math.round(cw * MAX_H / ch); ch = MAX_H; }
                canvas.width = cw; canvas.height = ch;
                const ctx = canvas.getContext('2d');
                ctx.translate(cw, 0); ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0, cw, ch);
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.6));
                console.log(`📸 壓縮: ${vw}x${vh} → ${cw}x${ch}, ${(blob.size/1024).toFixed(0)}KB`);

                showStatus(statusBox, 'info', '☁️ 上傳中...');
                const fileName = `${currentEmployee.employee_number}_${Date.now()}.jpg`; 
                const { error: uploadError } = await sb.storage.from(CONFIG.BUCKET).upload(fileName, blob);
                if (uploadError) throw uploadError;

                const { data: urlData } = sb.storage.from(CONFIG.BUCKET).getPublicUrl(fileName);
                const publicUrl = urlData?.publicUrl || urlData?.publicURL;
                if (!publicUrl) throw new Error('無法取得照片網址');

                // ===== GPS 精度檢查 =====
                showStatus(statusBox, 'info', '📍 定位中...');
                let loc;
                try {
                    loc = cachedLocation || await getGPS();
                } catch(gpsErr) {
                    showGPSWarning(statusBox);
                    btn.disabled = false; btn.textContent = '📸 重試';
                    return;
                }

                if (loc.accuracy !== undefined) {
                    if (loc.accuracy < 5) {
                        showStatus(statusBox, 'warning', '⚠️ GPS 精度異常（過於精確），請關閉模擬定位 App 後重試');
                        btn.disabled = false; btn.textContent = '📸 重試';
                        return;
                    }
                    if (loc.accuracy > 500) {
                        showStatus(statusBox, 'warning', '⚠️ GPS 訊號太弱（精度 >500m），請到戶外或窗邊重試');
                        btn.disabled = false; btn.textContent = '📸 重試';
                        return;
                    }
                }

                const { data: rpcData, error: rpcError } = await sb.rpc('quick_check_in', {
                    p_line_user_id: liffProfile.userId,
                    p_latitude: loc.latitude, p_longitude: loc.longitude,
                    p_photo_url: publicUrl, p_device_id: navigator.userAgent
                });

                if (rpcError) throw rpcError;
                if (!rpcData.success) throw new Error(rpcData.error);

                if (rpcData.location_name) localStorage.setItem('last_location', rpcData.location_name);

                const typeText = currentCheckInType === 'in' ? '上班' : '下班';
                showToast(`✅ ${typeText}成功！@${rpcData.location_name || '公司'}`);
                
                // 上班打卡且10點前 → 彈出便當訂購
                if (currentCheckInType === 'in' && new Date().getHours() < 9) {
                    showLunchPopup();
                } else {
                    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                }

            } catch (err) {
                console.error(err);
                showStatus(statusBox, 'error', `❌ 失敗: ${friendlyError(err)}`);
                btn.disabled = false; btn.textContent = '📸 重試';
            }
        }

        let useCaptureInput = false;

        function onCameraReady(stream) {
            const video = document.getElementById('video');
            video.srcObject = stream;
            videoStream = stream;
            video.onloadedmetadata = () => {
                video.play();
                document.getElementById('cameraContainer').classList.add('show');
                document.getElementById('captureBtn').disabled = false;
                document.getElementById('checkInStatus').textContent = '✅ 相機就緒';
                const overlay = document.getElementById('cameraOverlay');
                if (overlay) overlay.style.display = 'flex';
                const lastLoc = localStorage.getItem('last_location');
                if (lastLoc) {
                    document.getElementById('overlayLocation').textContent = `📍 ${lastLoc}`;
                }
            };
        }

        async function openCamera() {
            const attempts = [
                { video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } },
                { video: { facingMode: 'user' } },
                { video: { facingMode: { ideal: 'user' } } },
                { video: true }
            ];

            for (const constraints of attempts) {
                try {
                    if (!navigator.mediaDevices?.getUserMedia) break;
                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    onCameraReady(stream);
                    console.log('📷 getUserMedia 成功:', JSON.stringify(constraints));
                    return;
                } catch(e) {
                    console.log('📷 嘗試失敗:', JSON.stringify(constraints), e.name);
                }
            }

            // 所有 getUserMedia 都失敗 → capture input fallback
            console.log('📷 所有 getUserMedia 失敗，使用 capture input');
            useCaptureInput = true;
            document.getElementById('cameraContainer').style.display = 'none';
            document.getElementById('checkInStatus').innerHTML =
                '<div style="background:#DBEAFE;border:1px solid #93C5FD;border-radius:12px;padding:16px;text-align:center;">' +
                '<p style="color:#1E40AF;font-weight:700;margin:0 0 8px;">📸 請點擊下方按鈕拍照打卡</p>' +
                '<p style="color:#1E40AF;font-size:13px;margin:0;">點擊後請選擇「相機」拍攝（非相簿）</p></div>';
            document.getElementById('captureBtn').disabled = false;
            document.getElementById('captureBtn').textContent = '📸 開啟相機拍照';
        }

        function handleCapturePhoto(input) {
            if (!input.files || !input.files[0]) return;
            if (!currentEmployee) { showToast('❌ 員工資料未載入'); return; }

            const file = input.files[0];
            const statusBox = document.getElementById('checkInStatus');
            const btn = document.getElementById('captureBtn');
            btn.disabled = true; btn.textContent = '處理中...';

            // 壓縮圖片後上傳打卡
            const img = new Image();
            img.onload = async () => {
                try {
                    const canvas = document.getElementById('canvas');
                    const MAX_W = 800, MAX_H = 600;
                    let cw = img.width, ch = img.height;
                    if (cw > MAX_W) { ch = Math.round(ch * MAX_W / cw); cw = MAX_W; }
                    if (ch > MAX_H) { cw = Math.round(cw * MAX_H / ch); ch = MAX_H; }
                    canvas.width = cw; canvas.height = ch;
                    canvas.getContext('2d').drawImage(img, 0, 0, cw, ch);
                    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.6));
                    console.log(`📸 capture 壓縮: ${img.width}x${img.height} → ${cw}x${ch}, ${(blob.size/1024).toFixed(0)}KB`);

                    showStatus(statusBox, 'info', '☁️ 上傳中...');
                    const fileName = `${currentEmployee.employee_number}_${Date.now()}.jpg`;
                    const { error: uploadError } = await sb.storage.from(CONFIG.BUCKET).upload(fileName, blob);
                    if (uploadError) throw uploadError;

                    const { data: urlData } = sb.storage.from(CONFIG.BUCKET).getPublicUrl(fileName);
                    const publicUrl = urlData?.publicUrl || urlData?.publicURL;
                    if (!publicUrl) throw new Error('無法取得照片網址');

                    showStatus(statusBox, 'info', '📍 定位中...');
                    let loc;
                    try {
                        loc = cachedLocation || await getGPS();
                    } catch(gpsErr) {
                        showGPSWarning(statusBox);
                        btn.disabled = false; btn.textContent = '📸 開啟相機拍照';
                        return;
                    }
                    if (loc.accuracy !== undefined) {
                        if (loc.accuracy < 5) {
                            showStatus(statusBox, 'warning', '⚠️ GPS 精度異常（過於精確），請關閉模擬定位 App 後重試');
                            btn.disabled = false; btn.textContent = '📸 開啟相機拍照'; return;
                        }
                        if (loc.accuracy > 500) {
                            showStatus(statusBox, 'warning', '⚠️ GPS 訊號太弱（精度 >500m），請到戶外或窗邊重試');
                            btn.disabled = false; btn.textContent = '📸 開啟相機拍照'; return;
                        }
                    }

                    const { data: rpcData, error: rpcError } = await sb.rpc('quick_check_in', {
                        p_line_user_id: liffProfile.userId,
                        p_latitude: loc.latitude, p_longitude: loc.longitude,
                        p_photo_url: publicUrl, p_device_id: navigator.userAgent
                    });
                    if (rpcError) throw rpcError;
                    if (!rpcData.success) throw new Error(rpcData.error);

                    if (rpcData.location_name) localStorage.setItem('last_location', rpcData.location_name);
                    const typeText = currentCheckInType === 'in' ? '上班' : '下班';
                    showToast(`✅ ${typeText}成功！@${rpcData.location_name || '公司'}`);

                    if (currentCheckInType === 'in' && new Date().getHours() < 9) {
                        showLunchPopup();
                    } else {
                        setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                    }
                } catch(err) {
                    console.error(err);
                    showStatus(statusBox, 'error', `❌ 失敗: ${friendlyError(err)}`);
                    btn.disabled = false; btn.textContent = '📸 開啟相機拍照';
                }
            };
            img.src = URL.createObjectURL(file);
        }

        function showCameraError(err) {
            const statusBox = document.getElementById('checkInStatus');
            statusBox.className = 'status-box show';
            const errorInfo = '<p style="color:#94A3B8;font-size:11px;margin:8px 0 0;font-family:monospace;">錯誤代碼: ' + (err.name || 'Unknown') + '<br>詳情: ' + (err.message || '無') + '</p>';

            if (err.name === 'NotAllowedError') {
                statusBox.innerHTML = '<div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:16px;margin:0;">' +
                    '<p style="color:#DC2626;font-weight:700;margin:0 0 8px;">❌ 相機權限未開啟</p>' +
                    '<p style="color:#7F1D1D;font-size:13px;line-height:1.6;margin:0 0 12px;">' +
                    '請依照以下步驟開啟：<br>' +
                    '1. 手機「設定」→「應用程式」→「LINE」<br>' +
                    '2. 點選「權限」→ 開啟「相機」<br>' +
                    '3. 回到 LINE 重新開啟打卡</p>' +
                    '<p style="color:#991B1B;font-size:12px;margin:0;">若問題持續，請聯絡管理員。</p>' +
                    errorInfo + '</div>';
            } else if (err.name === 'NotFoundError') {
                statusBox.innerHTML = '<div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:16px;margin:0;">' +
                    '<p style="color:#DC2626;font-weight:700;margin:0 0 8px;">❌ 找不到相機設備</p>' +
                    '<p style="color:#7F1D1D;font-size:13px;line-height:1.6;margin:0;">請確認手機有前置相機。</p>' +
                    errorInfo + '</div>';
            } else if (err.name === 'NotReadableError') {
                statusBox.innerHTML = '<div style="background:#FFF7ED;border:1px solid #FED7AA;border-radius:12px;padding:16px;margin:0;">' +
                    '<p style="color:#C2410C;font-weight:700;margin:0 0 8px;">⚠️ 相機被佔用</p>' +
                    '<p style="color:#7C2D12;font-size:13px;line-height:1.6;margin:0;">相機被其他應用程式佔用，<br>請關閉其他相機 app 後重試。</p>' +
                    errorInfo + '</div>';
            } else {
                statusBox.innerHTML = '<div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:16px;margin:0;">' +
                    '<p style="color:#DC2626;font-weight:700;margin:0 0 8px;">❌ 相機啟動失敗</p>' +
                    '<p style="color:#7F1D1D;font-size:13px;line-height:1.6;margin:0;">' + (err.message || '未知錯誤') + '</p>' +
                    errorInfo + '</div>';
            }
        }

        // GPS 定位權限檢查
        async function checkGPSPermission() {
            const statusBox = document.getElementById('checkInStatus');
            // 嘗試 Permissions API（部分瀏覽器支援）
            if (navigator.permissions) {
                try {
                    const result = await navigator.permissions.query({ name: 'geolocation' });
                    if (result.state === 'denied') {
                        showGPSWarning(statusBox);
                        return;
                    }
                } catch(e) { /* 部分瀏覽器不支援，忽略 */ }
            }
            // 預先取得定位（快取供打卡使用）
            navigator.geolocation.getCurrentPosition(
                p => {
                    cachedLocation = { latitude: p.coords.latitude, longitude: p.coords.longitude, accuracy: p.coords.accuracy };
                    const overlay = document.getElementById('overlayLocation');
                    if (overlay) overlay.textContent = '📍 定位成功';
                },
                e => {
                    showGPSWarning(statusBox);
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function showGPSWarning(statusBox) {
            const el = document.getElementById('gpsWarning');
            if (el) { el.style.display = ''; return; }
            const warning = document.createElement('div');
            warning.id = 'gpsWarning';
            warning.style.cssText = 'background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:14px;margin:8px 0;';
            warning.innerHTML =
                '<p style="color:#DC2626;font-weight:700;margin:0 0 6px;">📍 定位未開啟</p>' +
                '<p style="color:#7F1D1D;font-size:13px;line-height:1.6;margin:0;">' +
                '打卡需要定位資訊，請開啟定位：<br>' +
                '• iPhone：設定 → 隱私權 → 定位服務 → LINE<br>' +
                '• Android：設定 → 應用程式 → LINE → 權限 → 位置</p>';
            statusBox.parentNode.insertBefore(warning, statusBox.nextSibling);
        }

        window.addEventListener('load', async () => {
            if (typeof initializeLiff === 'undefined') return;

            const urlParams = new URLSearchParams(window.location.search);
            currentCheckInType = urlParams.get('type') || 'in';

            const titleEl = document.getElementById('checkInTitle');
            if (titleEl) titleEl.textContent = currentCheckInType === 'in' ? '📍 上班打卡' : '👋 下班打卡';

            const initialized = await initializeLiff({ requireLineApp: true });
            if (initialized) {
                const isLoggedIn = await checkUserStatus();
                if (isLoggedIn) {
                    checkGPSPermission();
                    openCamera();
                } else {
                    window.location.href = 'index.html';
                }
            }
        });

        window.addEventListener('beforeunload', () => {
            if (videoStream) videoStream.getTracks().forEach(t => t.stop());
        });

        // ===== 便當訂購彈窗 =====
        function showLunchPopup() {
            const overlay = document.createElement('div');
            overlay.id = 'lunchOverlay';
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.3s;';
            overlay.innerHTML = `
                <div style="background:#fff;border-radius:20px;padding:24px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
                    <div style="text-align:center;margin-bottom:16px;">
                        <div style="font-size:40px;margin-bottom:8px;">🍱</div>
                        <h3 style="font-size:16px;font-weight:800;color:#0F172A;">今日便當訂購</h3>
                        <p style="font-size:12px;color:#94A3B8;margin-top:4px;">請選擇今日午餐</p>
                    </div>
                    
                    <div id="lunchOptions" style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;">
                        <div class="lunch-opt" onclick="selectLunch('regular')" style="display:flex;align-items:center;gap:12px;padding:14px;border:2px solid #E5E7EB;border-radius:14px;cursor:pointer;transition:all 0.2s;">
                            <span style="font-size:28px;">🍖</span>
                            <div style="flex:1;"><b style="font-size:14px;">葷食便當</b><br><span style="font-size:11px;color:#94A3B8;">今日主菜由餐廳安排</span></div>
                            <div id="checkRegular" style="width:22px;height:22px;border:2px solid #CBD5E1;border-radius:50%;transition:all 0.2s;"></div>
                        </div>
                        <div class="lunch-opt" onclick="selectLunch('vegetarian')" style="display:flex;align-items:center;gap:12px;padding:14px;border:2px solid #E5E7EB;border-radius:14px;cursor:pointer;transition:all 0.2s;">
                            <span style="font-size:28px;">🥗</span>
                            <div style="flex:1;"><b style="font-size:14px;">素食便當</b><br><span style="font-size:11px;color:#94A3B8;">蔬食料理</span></div>
                            <div id="checkVeg" style="width:22px;height:22px;border:2px solid #CBD5E1;border-radius:50%;transition:all 0.2s;"></div>
                        </div>
                        <div class="lunch-opt" onclick="selectLunch('none')" style="display:flex;align-items:center;gap:12px;padding:14px;border:2px solid #E5E7EB;border-radius:14px;cursor:pointer;transition:all 0.2s;">
                            <span style="font-size:28px;">🚫</span>
                            <div style="flex:1;"><b style="font-size:14px;">不訂購</b><br><span style="font-size:11px;color:#94A3B8;">今日不需要便當</span></div>
                            <div id="checkNone" style="width:22px;height:22px;border:2px solid #CBD5E1;border-radius:50%;transition:all 0.2s;"></div>
                        </div>
                    </div>
                    
                    <button id="lunchConfirmBtn" onclick="confirmLunch()" disabled style="width:100%;padding:14px;border:none;border-radius:12px;background:#CBD5E1;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;">
                        請先選擇
                    </button>
                    <button onclick="skipLunch()" style="width:100%;padding:10px;border:none;background:transparent;color:#94A3B8;font-size:12px;cursor:pointer;margin-top:8px;">
                        稍後再決定
                    </button>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        let selectedLunch = null;
        function selectLunch(type) {
            selectedLunch = type;
            // 重設所有選項
            document.querySelectorAll('.lunch-opt').forEach(opt => {
                opt.style.borderColor = '#E5E7EB';
                opt.style.background = '#fff';
            });
            ['checkRegular','checkVeg','checkNone'].forEach(id => {
                const el = document.getElementById(id);
                if (el) { el.style.borderColor = '#CBD5E1'; el.style.background = 'transparent'; el.innerHTML = ''; }
            });
            
            // 標記選中
            const opts = document.querySelectorAll('.lunch-opt');
            const idx = { regular: 0, vegetarian: 1, none: 2 }[type];
            if (opts[idx]) { opts[idx].style.borderColor = '#4F46E5'; opts[idx].style.background = '#F5F3FF'; }
            
            const checkId = { regular: 'checkRegular', vegetarian: 'checkVeg', none: 'checkNone' }[type];
            const checkEl = document.getElementById(checkId);
            if (checkEl) { checkEl.style.borderColor = '#4F46E5'; checkEl.style.background = '#4F46E5'; checkEl.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" style="margin:2px;"><path fill="white" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>'; }
            
            const btn = document.getElementById('lunchConfirmBtn');
            btn.disabled = false;
            btn.style.background = 'linear-gradient(135deg,#4F46E5,#7C3AED)';
            const labels = { regular: '✅ 確認訂購葷食便當', vegetarian: '✅ 確認訂購素食便當', none: '✅ 確認不訂購' };
            btn.textContent = labels[type];
        }

        async function confirmLunch() {
            if (!selectedLunch) return;
            
            // 二次確認
            const msgs = {
                regular: '確定訂購「葷食便當」？',
                vegetarian: '確定訂購「素食便當」？',
                none: '確定不訂購便當？'
            };
            if (!confirm(msgs[selectedLunch])) return;
            
            const btn = document.getElementById('lunchConfirmBtn');
            btn.disabled = true; btn.textContent = '⏳ 提交中...';
            
            try {
                if (selectedLunch === 'none') {
                    // 不訂購
                    if (typeof submitLunchOrder === 'function') {
                        // 使用 common.js 的函數
                    }
                    await sb.from('lunch_orders').upsert({
                        employee_id: currentEmployee.id,
                        order_date: getTaiwanDate(),
                        is_vegetarian: false,
                        status: 'cancelled',
                        notes: '今日不訂購'
                    }, { onConflict: 'employee_id,order_date' });
                } else {
                    await sb.from('lunch_orders').upsert({
                        employee_id: currentEmployee.id,
                        order_date: getTaiwanDate(),
                        is_vegetarian: selectedLunch === 'vegetarian',
                        status: 'ordered',
                        notes: ''
                    }, { onConflict: 'employee_id,order_date' });
                }
                
                const emoji = { regular: '🍖', vegetarian: '🥗', none: '🚫' };
                showToast(`${emoji[selectedLunch]} ${selectedLunch === 'none' ? '已確認不訂購' : '便當訂購成功！'}`);
            } catch(e) {
                console.error(e);
                showToast('⚠️ 訂購失敗，請到便當訂購頁面重試');
            }
            
            document.getElementById('lunchOverlay')?.remove();
            setTimeout(() => { window.location.href = 'index.html'; }, 1200);
        }

        function skipLunch() {
            document.getElementById('lunchOverlay')?.remove();
            setTimeout(() => { window.location.href = 'index.html'; }, 500);
        }
    </script>
</body>
</html>
