<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="icon" href="data:,">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4F46E5">
<title>員工登記</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #4F46E5;
  --primary-light: #818CF8;
  --bg: #F8FAFC;
  --card: #FFFFFF;
  --text: #1E293B;
  --text-muted: #64748B;
  --border: #E2E8F0;
  --success: #10B981;
  --danger: #EF4444;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.container{max-width:480px;margin:0 auto;padding:20px;}
.logo-section{text-align:center;padding:30px 0 20px;}
.logo-icon{font-size:48px;margin-bottom:8px;}
.logo-title{font-size:22px;font-weight:900;color:var(--primary);}
.logo-sub{font-size:13px;color:var(--text-muted);margin-top:4px;}
.card{background:var(--card);border-radius:16px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:16px;}
.card h2{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
.form-group .hint{font-size:11px;color:var(--text-muted);margin-top:2px;}
.form-group .required::after{content:' *';color:var(--danger);}
input,select,textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;transition:border-color 0.2s;}
input:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,0.1);}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:#4338CA;}
.btn-primary:disabled{background:#C7D2FE;cursor:not-allowed;}
.error-msg{color:var(--danger);font-size:12px;margin-top:4px;display:none;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}
.toast.error{background:var(--danger);}
.success-view{text-align:center;padding:40px 24px;}
.success-icon{font-size:64px;margin-bottom:16px;}
.loading-view{text-align:center;padding:60px 20px;}
.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none;}
.company-badge{display:inline-block;padding:6px 16px;background:#EEF2FF;color:var(--primary);border-radius:20px;font-weight:700;font-size:14px;margin-top:8px;}
</style>
</head>
<body>
<div class="container">
  <div class="logo-section">
    <div class="logo-icon">📋</div>
    <div class="logo-title">員工登記</div>
    <div class="logo-sub">填寫資料後等待管理員審核</div>
  </div>

  <!-- 載入中 -->
  <div id="loadingView" class="loading-view">
    <div class="spinner"></div>
    <p style="color:var(--text-muted);">載入中...</p>
  </div>

  <!-- 錯誤頁面 -->
  <div id="errorView" class="hidden">
    <div class="card" style="text-align:center;padding:40px 24px;">
      <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
      <h2 style="justify-content:center;" id="errorTitle">無法載入</h2>
      <p style="color:var(--text-muted);font-size:13px;" id="errorMsg">請確認連結是否正確</p>
    </div>
  </div>

  <!-- 登記表單 -->
  <div id="formView" class="hidden">
    <div class="card" style="text-align:center;padding:16px 24px;margin-bottom:16px;">
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:4px;">登記公司</p>
      <div class="company-badge" id="companyNameBadge"></div>
    </div>

    <div class="card">
      <h2>📝 個人資料</h2>

      <div class="form-group">
        <label class="required">姓名</label>
        <input type="text" id="regName" placeholder="請輸入真實姓名">
      </div>

      <div class="form-group">
        <label class="required">手機號碼</label>
        <input type="tel" id="regPhone" placeholder="0912345678" maxlength="10">
        <div class="error-msg" id="phoneError">請輸入正確的手機號碼格式</div>
      </div>

      <div class="form-group">
        <label>部門</label>
        <select id="regDepartment">
          <option value="">-- 選擇部門 --</option>
        </select>
      </div>

      <div class="form-group">
        <label>職位</label>
        <input type="text" id="regPosition" placeholder="例如：專員">
      </div>

      <div class="form-group">
        <label>到職日</label>
        <input type="date" id="regHireDate">
      </div>
    </div>

    <div class="card">
      <h2>🆘 緊急聯絡人</h2>

      <div class="form-group">
        <label>聯絡人姓名</label>
        <input type="text" id="regEmergencyContact" placeholder="例如：王大明">
      </div>

      <div class="form-group">
        <label>聯絡人電話</label>
        <input type="tel" id="regEmergencyPhone" placeholder="0912345678" maxlength="10">
      </div>
    </div>

    <button class="btn btn-primary" id="submitBtn" onclick="submitRegistration()">📨 送出登記</button>
  </div>

  <!-- 成功頁面 -->
  <div id="successView" class="hidden">
    <div class="card success-view">
      <div class="success-icon">✅</div>
      <h2 style="justify-content:center;font-size:20px;">登記成功！</h2>
      <p style="color:var(--text-muted);font-size:13px;margin-top:8px;line-height:1.6;">
        您的登記資料已送出，<br>請等待管理員審核。<br>
        審核通過後即可從 LINE 使用所有功能。
      </p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// === 全域錯誤監控 ===
window._errLogCount = 0; window._errLogResetTs = 0;
window.onerror = function(msg, src, line, col, err) {
  try {
    var _now = Date.now(); if (_now > window._errLogResetTs) { window._errLogCount = 0; window._errLogResetTs = _now + 60000; } if (++window._errLogCount > 5) return;
    fetch('https://nssuisyvlrqnqfxupklb.supabase.co/rest/v1/error_logs', {
      method: 'POST',
      headers: {
        'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zc3Vpc3l2bHJxbnFmeHVwa2xiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyOTAwMzUsImV4cCI6MjA4NDg2NjAzNX0.q_B6v3gf1TOCuAq7z0xIw10wDueCSJn0p37VzdMfmbc',
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        message: String(msg).substring(0, 1000),
        page: location.pathname,
        line: line,
        user_id: null,
        user_agent: navigator.userAgent
      })
    }).catch(function(){});
  } catch(e) {}
};

const SUPABASE_URL = 'https://nssuisyvlrqnqfxupklb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zc3Vpc3l2bHJxbnFmeHVwa2xiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyOTAwMzUsImV4cCI6MjA4NDg2NjAzNX0.q_B6v3gf1TOCuAq7z0xIw10wDueCSJn0p37VzdMfmbc';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let companyId = null;
let companyName = '';
let lineUserId = null;
let lineDisplayName = '';

// ===== 初始化 =====
async function init() {
    try {
        // 從 URL 取得 company_id
        const params = new URLSearchParams(window.location.search);
        companyId = params.get('company');

        if (!companyId) {
            showError('缺少公司資訊', '請掃描管理員提供的 QR Code 進入此頁面。');
            return;
        }

        // 驗證公司是否存在
        const { data: company, error: compErr } = await sb.from('companies')
            .select('id, name')
            .eq('id', companyId)
            .maybeSingle();

        if (compErr || !company) {
            showError('公司不存在', '此登記連結無效，請聯繫管理員取得正確連結。');
            return;
        }

        companyName = company.name;
        document.getElementById('companyNameBadge').textContent = companyName;

        // 從 sessionStorage 讀取 LINE profile（由 index.html LIFF 傳入）
        lineUserId = sessionStorage.getItem('register_line_user_id') || null;
        lineDisplayName = sessionStorage.getItem('register_line_name') || '';
        // 讀完即清除，避免殘留
        sessionStorage.removeItem('register_line_user_id');
        sessionStorage.removeItem('register_line_name');

        // 如果有 line_user_id，檢查是否已註冊
        if (lineUserId) {
            const { data: existByLine } = await sb.from('employees')
                .select('id, name, status, is_active')
                .eq('line_user_id', lineUserId)
                .eq('company_id', companyId)
                .maybeSingle();

            if (existByLine) {
                if (existByLine.status === 'pending') {
                    showError('已登記過', '您的登記資料正在等待管理員審核，請耐心等候。');
                    return;
                } else if (existByLine.is_active) {
                    showError('已是員工', '您已經是在職員工，請直接從 LINE 開啟員工系統。');
                    return;
                }
            }
        }

        // 載入部門選項
        await loadDepartments();

        // 預設到職日為今天
        const today = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Taipei' });
        document.getElementById('regHireDate').value = today;

        // 自動帶入 LINE 顯示名稱
        if (lineDisplayName) {
            document.getElementById('regName').value = lineDisplayName;
        }

        // 顯示表單
        document.getElementById('loadingView').classList.add('hidden');
        document.getElementById('formView').classList.remove('hidden');

    } catch (e) {
        console.error('Init error:', e);
        showError('初始化失敗', '系統發生錯誤，請重新整理或聯繫管理員。');
    }
}

// ===== 載入部門 =====
async function loadDepartments() {
    try {
        const { data } = await sb.from('system_settings')
            .select('value')
            .eq('company_id', companyId)
            .eq('key', 'departments')
            .maybeSingle();

        const select = document.getElementById('regDepartment');
        let depts = ['管理部', '生產部', '業務部', '倉管部']; // 預設

        if (data && data.value) {
            try {
                const parsed = typeof data.value === 'string' ? JSON.parse(data.value) : data.value;
                if (Array.isArray(parsed) && parsed.length > 0) depts = parsed;
            } catch (e) { /* 使用預設 */ }
        }

        let html = '<option value="">-- 選擇部門 --</option>';
        depts.forEach(function(d) {
            html += '<option value="' + esc(d) + '">' + esc(d) + '</option>';
        });
        select.innerHTML = html;
    } catch (e) {
        console.error('Load departments error:', e);
    }
}

// ===== 顯示錯誤 =====
function showError(title, msg) {
    document.getElementById('errorTitle').textContent = title;
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('loadingView').classList.add('hidden');
    document.getElementById('errorView').classList.remove('hidden');
}

// ===== 手機號碼驗證 =====
function validatePhone(phone) {
    return /^09\d{8}$/.test(phone);
}

// ===== 送出登記 =====
async function submitRegistration() {
    const btn = document.getElementById('submitBtn');
    const name = document.getElementById('regName').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const department = document.getElementById('regDepartment').value;
    const position = document.getElementById('regPosition').value.trim();
    const hireDate = document.getElementById('regHireDate').value;
    const emergencyContact = document.getElementById('regEmergencyContact').value.trim();
    const emergencyPhone = document.getElementById('regEmergencyPhone').value.trim();

    // 必填驗證
    if (!name) {
        showToast('請輸入姓名', true);
        document.getElementById('regName').focus();
        return;
    }

    if (!phone) {
        showToast('請輸入手機號碼', true);
        document.getElementById('regPhone').focus();
        return;
    }

    if (!validatePhone(phone)) {
        document.getElementById('phoneError').style.display = 'block';
        document.getElementById('regPhone').focus();
        return;
    }
    document.getElementById('phoneError').style.display = 'none';

    // 緊急聯絡人電話格式（選填，但填了就要正確）
    if (emergencyPhone && !validatePhone(emergencyPhone)) {
        showToast('緊急聯絡人電話格式不正確', true);
        document.getElementById('regEmergencyPhone').focus();
        return;
    }

    btn.disabled = true;
    btn.textContent = '送出中...';

    try {
        // 檢查同 LINE 帳號是否已登記（優先用 line_user_id）
        if (lineUserId) {
            const { data: existByLine } = await sb.from('employees')
                .select('id, name, status, is_active')
                .eq('line_user_id', lineUserId)
                .eq('company_id', companyId)
                .maybeSingle();

            if (existByLine) {
                if (existByLine.status === 'pending') {
                    showToast('此 LINE 帳號已登記過，正在等待審核', true);
                } else if (existByLine.is_active) {
                    showToast('此 LINE 帳號已是在職員工', true);
                }
                btn.disabled = false;
                btn.textContent = '📨 送出登記';
                return;
            }
        }

        // 檢查同手機+同公司是否已登記（用手機號碼防重複）
        const { data: existing } = await sb.from('employees')
            .select('id, name, status, is_active, phone')
            .eq('phone', phone)
            .eq('company_id', companyId)
            .maybeSingle();

        if (existing) {
            if (existing.status === 'pending') {
                showToast('此手機號碼已登記過，正在等待審核', true);
                btn.disabled = false;
                btn.textContent = '📨 送出登記';
                return;
            } else if (existing.status === 'approved' || existing.is_active) {
                showToast('此手機號碼已是在職員工', true);
                btn.disabled = false;
                btn.textContent = '📨 送出登記';
                return;
            } else if (existing.status === 'rejected') {
                // 被拒絕過的可以重新登記 → 更新資料（含 line_user_id）
                const updateData = {
                    name: name,
                    phone: phone,
                    department: department || null,
                    position: position || null,
                    hire_date: hireDate || null,
                    emergency_contact: emergencyContact || null,
                    emergency_phone: emergencyPhone || null,
                    status: 'pending',
                    is_active: false,
                    updated_at: new Date().toISOString()
                };
                if (lineUserId) updateData.line_user_id = lineUserId;
                const { error } = await sb.from('employees').update(updateData).eq('id', existing.id);

                if (error) throw error;

                document.getElementById('formView').classList.add('hidden');
                document.getElementById('successView').classList.remove('hidden');
                return;
            }
        }

        // 新增登記（自動帶入 LINE userId）
        // 產生臨時工號（審核通過後會被正式工號覆蓋）
        const tempNumber = 'REG-' + Date.now().toString(36).toUpperCase();

        const employeeData = {
            name: name,
            phone: phone,
            employee_number: tempNumber,
            department: department || null,
            position: position || null,
            hire_date: hireDate || null,
            emergency_contact: emergencyContact || null,
            emergency_phone: emergencyPhone || null,
            line_user_id: lineUserId,
            company_id: companyId,
            is_active: false,
            status: 'pending',
            role: 'user',
            employment_type: 'fulltime',
            created_at: new Date().toISOString()
        };

        const { error } = await sb.from('employees').insert([employeeData]);
        if (error) throw error;

        // 顯示成功
        document.getElementById('formView').classList.add('hidden');
        document.getElementById('successView').classList.remove('hidden');

    } catch (e) {
        console.error('Registration error:', e);
        const errMsg = e.message || e.details || e.hint || '請稍後再試';
        console.error('Error details:', JSON.stringify(e));
        showToast('送出失敗：' + errMsg, true);
        btn.disabled = false;
        btn.textContent = '📨 送出登記';
    }
}

// ===== 工具函數 =====
function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
}

function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 2500);
}

// 手機輸入即時清除錯誤提示
document.addEventListener('DOMContentLoaded', function() {
    const phoneInput = document.getElementById('regPhone');
    if (phoneInput) {
        phoneInput.addEventListener('input', function() {
            document.getElementById('phoneError').style.display = 'none';
        });
    }
});

// 啟動
init();
</script>
</body>
</html>
