<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>公務機打卡</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0F172A; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; -webkit-user-select: none; user-select: none; }
        .kiosk-container { width: 100%; max-width: 400px; padding: 20px; }
        .kiosk-header { text-align: center; margin-bottom: 24px; }
        .kiosk-header h1 { font-size: 20px; font-weight: 800; color: #F8FAFC; }
        .kiosk-header .company-name { font-size: 15px; color: #94A3B8; margin-top: 4px; }
        .kiosk-header .clock { font-size: 48px; font-weight: 900; color: #fff; margin: 16px 0 8px; font-variant-numeric: tabular-nums; }
        .kiosk-header .date { font-size: 14px; color: #64748B; }

        /* 輸入顯示 */
        .input-display { background: #1E293B; border: 2px solid #334155; border-radius: 16px; padding: 16px; text-align: center; margin-bottom: 16px; min-height: 60px; display: flex; align-items: center; justify-content: center; }
        .input-display .value { font-size: 28px; font-weight: 700; letter-spacing: 4px; color: #F8FAFC; font-variant-numeric: tabular-nums; }
        .input-display .placeholder { font-size: 14px; color: #64748B; }

        /* 數字鍵盤 */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
        .key { background: #1E293B; border: 2px solid #334155; border-radius: 14px; padding: 18px; font-size: 24px; font-weight: 700; color: #F8FAFC; cursor: pointer; text-align: center; transition: all 0.1s; font-family: inherit; }
        .key:active { background: #334155; transform: scale(0.95); }
        .key-clear { background: #7F1D1D; border-color: #991B1B; color: #FCA5A5; }
        .key-clear:active { background: #991B1B; }
        .key-confirm { background: #064E3B; border-color: #059669; color: #6EE7B7; }
        .key-confirm:active { background: #059669; }
        .key-confirm.disabled { opacity: 0.3; pointer-events: none; }

        /* 員工確認畫面 */
        .employee-card { background: #1E293B; border-radius: 20px; padding: 24px; text-align: center; margin-bottom: 16px; }
        .employee-card .name { font-size: 28px; font-weight: 900; color: #F8FAFC; margin-bottom: 8px; }
        .employee-card .info { font-size: 14px; color: #94A3B8; }
        .action-buttons { display: flex; gap: 12px; margin-bottom: 12px; }
        .action-btn { flex: 1; padding: 16px; border: none; border-radius: 14px; font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit; }
        .btn-checkin { background: linear-gradient(135deg, #059669, #10B981); color: #fff; }
        .btn-checkout { background: linear-gradient(135deg, #7C3AED, #8B5CF6); color: #fff; }
        .btn-checkin:active, .btn-checkout:active { transform: scale(0.97); }
        .btn-cancel { width: 100%; padding: 14px; background: #334155; border: 2px solid #475569; border-radius: 14px; color: #94A3B8; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

        /* 結果畫面 */
        .result-card { background: #1E293B; border-radius: 20px; padding: 32px; text-align: center; }
        .result-card .icon { font-size: 56px; margin-bottom: 12px; }
        .result-card .msg { font-size: 20px; font-weight: 800; color: #F8FAFC; margin-bottom: 4px; }
        .result-card .time { font-size: 36px; font-weight: 900; color: #10B981; margin: 8px 0; }
        .result-card .countdown { font-size: 13px; color: #64748B; margin-top: 12px; }

        /* 錯誤畫面 */
        .error-card { background: #1E293B; border-radius: 20px; padding: 24px; text-align: center; }
        .error-card .icon { font-size: 48px; margin-bottom: 12px; }
        .error-card .msg { font-size: 16px; color: #FCA5A5; margin-bottom: 16px; }

        /* 拍照 */
        .camera-section { margin-bottom: 16px; text-align: center; }
        .camera-section video { width: 100%; max-width: 320px; border-radius: 16px; background: #000; }
        .photo-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #3B82F6, #2563EB); border: none; border-radius: 14px; color: #fff; font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit; margin-bottom: 12px; }
        .photo-btn:disabled { opacity: 0.5; }
        .photo-btn:active { transform: scale(0.97); }

        .hidden { display: none !important; }

        /* 提示 */
        .hint { font-size: 12px; color: #475569; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="kiosk-container">
        <!-- 頁頭 -->
        <div class="kiosk-header">
            <h1 id="kioskTitle">公務機打卡</h1>
            <div id="companyName" class="company-name"></div>
            <div id="kioskClock" class="clock">--:--</div>
            <div id="kioskDate" class="date"></div>
        </div>

        <!-- Step 1: 輸入驗證碼 -->
        <div id="stepInput">
            <div class="input-display">
                <span id="inputValue" class="value" style="display:none;"></span>
                <span id="inputPlaceholder" class="placeholder">輸入工號、手機或驗證碼</span>
            </div>
            <div class="keypad">
                <button class="key" onclick="pressKey('1')">1</button>
                <button class="key" onclick="pressKey('2')">2</button>
                <button class="key" onclick="pressKey('3')">3</button>
                <button class="key" onclick="pressKey('4')">4</button>
                <button class="key" onclick="pressKey('5')">5</button>
                <button class="key" onclick="pressKey('6')">6</button>
                <button class="key" onclick="pressKey('7')">7</button>
                <button class="key" onclick="pressKey('8')">8</button>
                <button class="key" onclick="pressKey('9')">9</button>
                <button class="key key-clear" onclick="clearInput()">清除</button>
                <button class="key" onclick="pressKey('0')">0</button>
                <button id="confirmBtn" class="key key-confirm disabled" onclick="lookupEmployee()">確認</button>
            </div>
            <div class="hint">輸入工號、手機號碼或身分證後4碼</div>
        </div>

        <!-- Step 2: 確認員工 + 拍照 + 打卡 -->
        <div id="stepEmployee" class="hidden">
            <div class="employee-card">
                <div id="empName" class="name"></div>
                <div id="empInfo" class="info"></div>
            </div>
            <div class="camera-section">
                <video id="kioskVideo" autoplay playsinline muted style="display:none;"></video>
                <canvas id="kioskCanvas" style="display:none;"></canvas>
                <input type="file" id="kioskCaptureInput" accept="image/jpeg,image/png" capture="user" style="display:none">
            </div>
            <button id="photoBtn" class="photo-btn" onclick="takePhoto()">📸 拍照</button>
            <div class="action-buttons" id="actionBtns" style="display:none;">
                <button class="action-btn btn-checkin" onclick="doCheckin('check_in')">☀️ 上班打卡</button>
                <button class="action-btn btn-checkout" onclick="doCheckin('check_out')">🌙 下班打卡</button>
            </div>
            <button class="btn-cancel" onclick="resetToInput()">← 取消</button>
        </div>

        <!-- Step 3: 結果 -->
        <div id="stepResult" class="hidden">
            <div class="result-card">
                <div id="resultIcon" class="icon"></div>
                <div id="resultName" class="msg"></div>
                <div id="resultMsg" style="font-size:16px;color:#94A3B8;"></div>
                <div id="resultTime" class="time"></div>
                <div id="resultCountdown" class="countdown"></div>
            </div>
        </div>

        <!-- 錯誤畫面 -->
        <div id="stepError" class="hidden">
            <div class="error-card">
                <div class="icon">❌</div>
                <div id="errorMsg" class="msg"></div>
                <button class="btn-cancel" onclick="resetToInput()">← 重新輸入</button>
            </div>
        </div>
    </div>

    <script>
    // ===== 全域錯誤監控 =====
    window._errLogCount = 0; window._errLogResetTs = 0;
    window.onerror = function(msg, src, line, col, err) {
        try {
            var _now = Date.now(); if (_now > window._errLogResetTs) { window._errLogCount = 0; window._errLogResetTs = _now + 60000; } if (++window._errLogCount > 5) return;
            fetch('https://nssuisyvlrqnqfxupklb.supabase.co/rest/v1/error_logs', {
                method: 'POST',
                headers: {
                    'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zc3Vpc3l2bHJxbnFmeHVwa2xiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyOTAwMzUsImV4cCI6MjA4NDg2NjAzNX0.q_B6v3gf1TOCuAq7z0xIw10wDueCSJn0p37VzdMfmbc',
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({ message: String(msg).substring(0, 1000), page: 'kiosk.html', line: line, user_id: null, user_agent: navigator.userAgent })
            }).catch(function(){});
        } catch(e) {}
    };

    const SUPABASE_URL = 'https://nssuisyvlrqnqfxupklb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zc3Vpc3l2bHJxbnFmeHVwa2xiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyOTAwMzUsImV4cCI6MjA4NDg2NjAzNX0.q_B6v3gf1TOCuAq7z0xIw10wDueCSJn0p37VzdMfmbc';
    const LIFF_ID = '2008962829-bnsS1bbB';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let kioskLineUserId = null;
    let kioskCompanyId = null;
    let kioskLunchEnabled = false;
    let kioskLunchDeadline = '9:00';
    let inputStr = '';
    let currentEmployee = null;
    let photoBlob = null;
    let videoStream = null;
    let idleTimer = null;
    let resultTimer = null;
    let isPunching = false;
    let selectedLunch = null;
    let lunchPromptEmployee = null;

    function setActionButtonsBusy(isBusy) {
        const checkinBtn = document.querySelector('.btn-checkin');
        const checkoutBtn = document.querySelector('.btn-checkout');
        [checkinBtn, checkoutBtn].forEach(btn => {
            if (!btn) return;
            btn.disabled = isBusy;
            btn.style.opacity = isBusy ? '0.5' : '1';
        });
        if (checkinBtn) checkinBtn.textContent = isBusy ? '處理中...' : '☀️ 上班打卡';
        if (checkoutBtn) checkoutBtn.textContent = isBusy ? '處理中...' : '🌙 下班打卡';
    }

    async function getOptionalKioskPosition(timeoutMs = 2000) {
        if (!navigator.geolocation) return null;
        return Promise.race([
            new Promise(resolve => {
                navigator.geolocation.getCurrentPosition(
                    pos => resolve(pos),
                    () => resolve(null),
                    { enableHighAccuracy: false, maximumAge: 300000, timeout: timeoutMs }
                );
            }),
            new Promise(resolve => setTimeout(() => resolve(null), timeoutMs + 300))
        ]);
    }

    // ===== 時鐘 =====
    function updateClock() {
        const now = new Date();
        const time = now.toLocaleTimeString('zh-TW', { timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', hour12: false });
        const date = now.toLocaleDateString('zh-TW', { timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' });
        document.getElementById('kioskClock').textContent = time;
        document.getElementById('kioskDate').textContent = date;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ===== 初始化（LIFF 認證） =====
    window.addEventListener('load', async () => {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            const profile = await liff.getProfile();
            kioskLineUserId = profile.userId;
        } catch (e) {
            document.getElementById('stepInput').innerHTML = '<div class="error-card"><div class="icon">⚠️</div><div class="msg">請從 LINE 開啟此頁面</div></div>';
            return;
        }

        // 驗證公務機帳號
        try {
            const { data } = await sb.rpc('kiosk_get_company', {
                p_kiosk_line_user_id: kioskLineUserId
            });
            if (data?.success && data.name) {
                kioskCompanyId = data.company_id || null;
                document.getElementById('companyName').textContent = data.name;
                document.getElementById('kioskTitle').textContent = data.name + ' 公務機打卡';
                loadKioskLunchSettings(kioskCompanyId).catch(e => console.warn('公務機便當設定讀取失敗:', e));
            } else {
                document.getElementById('stepInput').innerHTML = '<div class="error-card"><div class="icon">⚠️</div><div class="msg">' + (data?.error || '此帳號非公務機') + '<br><br><span style="font-size:13px;color:#64748B;">請聯繫管理員設定公務機帳號</span></div></div>';
                return;
            }
        } catch (e) {
            document.getElementById('stepInput').innerHTML = '<div class="error-card"><div class="icon">⚠️</div><div class="msg">連線失敗，請重試</div></div>';
        }
    });

    async function loadKioskLunchSettings(companyId) {
        if (!companyId) {
            kioskLunchEnabled = false;
            return;
        }

        let enabled = false;

        const { data: company } = await sb.from('companies')
            .select('industry, features')
            .eq('id', companyId)
            .maybeSingle();

        const industryLunchDefaults = {
            general: false,
            manufacturing: true,
            restaurant: true,
            service: false,
            clinic: false,
            retail: false
        };
        enabled = industryLunchDefaults[company?.industry || 'general'] === true;
        if (company?.features && typeof company.features === 'object' && company.features.lunch !== undefined) {
            enabled = company.features.lunch === true;
        }

        const { data: settings } = await sb.from('system_settings')
            .select('key, value')
            .eq('company_id', companyId)
            .in('key', ['feature_visibility', 'lunch_deadline']);

        (settings || []).forEach(row => {
            if (row.key === 'feature_visibility' && row.value && typeof row.value === 'object' && row.value.lunch === false) {
                enabled = false;
            }
            if (row.key === 'lunch_deadline' && row.value) {
                kioskLunchDeadline = String(row.value);
            }
        });

        kioskLunchEnabled = enabled;
    }

    // ===== 閒置計時 =====
    function resetIdleTimer() {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
            if (inputStr.length > 0) clearInput();
        }, 30000);
    }

    // ===== 數字鍵盤 =====
    function pressKey(n) {
        if (inputStr.length >= 12) return;
        inputStr += n;
        updateInputDisplay();
        resetIdleTimer();
    }

    function clearInput() {
        inputStr = '';
        updateInputDisplay();
    }

    function updateInputDisplay() {
        const valEl = document.getElementById('inputValue');
        const phEl = document.getElementById('inputPlaceholder');
        const confirmBtn = document.getElementById('confirmBtn');
        if (inputStr.length > 0) {
            valEl.textContent = inputStr;
            valEl.style.display = '';
            phEl.style.display = 'none';
            confirmBtn.classList.remove('disabled');
        } else {
            valEl.style.display = 'none';
            phEl.style.display = '';
            confirmBtn.classList.add('disabled');
        }
    }

    // ===== 查詢員工 =====
    async function lookupEmployee() {
        if (!inputStr) return;
        const confirmBtn = document.getElementById('confirmBtn');
        confirmBtn.textContent = '...';
        confirmBtn.classList.add('disabled');

        try {
            const { data, error } = await sb.rpc('kiosk_lookup_employee', {
                p_kiosk_line_user_id: kioskLineUserId,
                p_identifier: inputStr
            });

            if (error) throw error;
            if (!data?.success) {
                showError(data?.error || '查詢失敗');
                return;
            }

            currentEmployee = data;
            showEmployeeStep();
        } catch (e) {
            showError(e.message || '網路錯誤，請重試');
        } finally {
            confirmBtn.textContent = '確認';
            confirmBtn.classList.remove('disabled');
        }
    }

    // ===== 員工確認畫面 =====
    function showEmployeeStep() {
        document.getElementById('stepInput').classList.add('hidden');
        document.getElementById('stepEmployee').classList.remove('hidden');
        document.getElementById('empName').textContent = currentEmployee.name;
        document.getElementById('empInfo').textContent =
            (currentEmployee.employee_number || '') + ' · ' + (currentEmployee.department || '未分配');
        photoBlob = null;
        document.getElementById('actionBtns').style.display = 'none';
        document.getElementById('photoBtn').textContent = '📸 拍照';
        document.getElementById('photoBtn').disabled = false;
        openCamera();
    }

    // ===== 相機 =====
    async function openCamera() {
        const video = document.getElementById('kioskVideo');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 360 } } });
            video.srcObject = stream;
            videoStream = stream;
            video.style.display = 'block';
        } catch (e) {
            // fallback: 使用 file input
            video.style.display = 'none';
        }
    }

    function stopCamera() {
        if (videoStream) {
            videoStream.getTracks().forEach(t => t.stop());
            videoStream = null;
        }
        const video = document.getElementById('kioskVideo');
        if (video) video.srcObject = null;
    }

    function takePhoto() {
        const video = document.getElementById('kioskVideo');
        if (video.srcObject && video.videoWidth > 0) {
            // getUserMedia 模式
            const canvas = document.getElementById('kioskCanvas');
            const w = Math.min(video.videoWidth, 640);
            const h = Math.round(w * video.videoHeight / video.videoWidth);
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(video, 0, 0, w, h);
            canvas.toBlob(blob => {
                if (!blob) {
                    showError('照片處理失敗，請重新拍照。');
                    return;
                }
                photoBlob = blob;
                stopCamera();
                onPhotoReady();
            }, 'image/jpeg', 0.6);
        } else {
            // fallback: file input
            document.getElementById('kioskCaptureInput').click();
        }
    }

    // file input handler
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('kioskCaptureInput').addEventListener('change', function() {
            if (!this.files || !this.files[0]) return;
            const file = this.files[0];
            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('kioskCanvas');
                const w = Math.min(img.width, 640);
                const h = Math.round(w * img.height / img.width);
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                canvas.toBlob(blob => {
                    if (!blob) {
                        showError('照片處理失敗，請重新拍照。');
                        return;
                    }
                    photoBlob = blob;
                    onPhotoReady();
                }, 'image/jpeg', 0.6);
                URL.revokeObjectURL(img.src);
            };
            img.src = URL.createObjectURL(file);
            this.value = '';
        });
    });

    function onPhotoReady() {
        document.getElementById('photoBtn').textContent = '✅ 已拍照';
        document.getElementById('photoBtn').disabled = true;
        setActionButtonsBusy(false);
        document.getElementById('actionBtns').style.display = 'flex';
    }

    // ===== 打卡 =====
    async function doCheckin(action) {
        if (isPunching) return;
        if (!currentEmployee || !currentEmployee.employee_id) {
            showError('員工資料未載入，請重新輸入工號。');
            return;
        }

        isPunching = true;
        setActionButtonsBusy(true);

        try {
            // 上傳照片
            let photoUrl = null;
            if (photoBlob) {
                const fileName = `kiosk_${currentEmployee.employee_number}_${Date.now()}.jpg`;
                const { error: upErr } = await sb.storage.from('selfies').upload(fileName, photoBlob);
                if (!upErr) {
                    const { data: urlData } = sb.storage.from('selfies').getPublicUrl(fileName);
                    photoUrl = urlData?.publicUrl || null;
                }
            }

            // GPS（公務機可能有定位）
            let lat = null, lng = null;
            const pos = await getOptionalKioskPosition(2000);
            if (pos) {
                lat = pos.coords.latitude;
                lng = pos.coords.longitude;
            }

            const { data, error } = await sb.rpc('kiosk_check_in', {
                p_kiosk_line_user_id: kioskLineUserId,
                p_employee_id: currentEmployee.employee_id,
                p_action: action,
                p_photo_url: photoUrl,
                p_latitude: lat,
                p_longitude: lng
            });

            if (error) throw error;
            if (!data?.success) {
                showError(formatKioskError(data?.error || '打卡失敗'));
                return;
            }

            await showResult(data);
        } catch (e) {
            showError(formatKioskError(e.message || '打卡失敗，請重試'));
        } finally {
            isPunching = false;
            if (!document.getElementById('stepEmployee').classList.contains('hidden')) {
                setActionButtonsBusy(false);
            }
        }
    }

    // ===== 結果畫面 =====
    async function showResult(data) {
        stopCamera();
        document.getElementById('stepEmployee').classList.add('hidden');
        document.getElementById('stepResult').classList.remove('hidden');

        const isCheckIn = data.type === 'check_in';
        document.getElementById('resultIcon').textContent = isCheckIn ? '☀️' : '🌙';
        document.getElementById('resultName').textContent = data.name;
        document.getElementById('resultMsg').textContent = isCheckIn ? '上班打卡成功' : '下班打卡成功';

        const nowTime = new Date().toLocaleTimeString('zh-TW', { timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        document.getElementById('resultTime').textContent = nowTime;

        if (isCheckIn) {
            try {
                const employeeForLunch = currentEmployee ? { ...currentEmployee } : null;
                const shouldPromptLunch = await shouldPromptKioskLunch(employeeForLunch);
                if (shouldPromptLunch) {
                    document.getElementById('resultCountdown').textContent = '請選擇今日便當';
                    showKioskLunchPopup(employeeForLunch);
                    return;
                }
            } catch (e) {
                console.warn('公務機便當檢查失敗:', e);
            }
        }

        startResultCountdown();
    }

    function startResultCountdown(startSec = 3) {
        clearInterval(resultTimer);
        let sec = 3;
        if (Number.isFinite(startSec) && startSec > 0) sec = startSec;
        const cdEl = document.getElementById('resultCountdown');
        cdEl.textContent = sec + ' 秒後返回...';
        resultTimer = setInterval(() => {
            sec--;
            if (sec <= 0) {
                clearInterval(resultTimer);
                resultTimer = null;
                resetToInput();
            } else {
                cdEl.textContent = sec + ' 秒後返回...';
            }
        }, 1000);
    }

    function getKioskTaiwanDate(offsetDays = 0) {
        const now = new Date();
        const tw = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
        tw.setDate(tw.getDate() + offsetDays);
        const y = tw.getFullYear();
        const m = String(tw.getMonth() + 1).padStart(2, '0');
        const d = String(tw.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    async function shouldPromptKioskLunch(employee) {
        if (!kioskLunchEnabled || !employee?.employee_id) return false;

        const deadline = kioskLunchDeadline || '9:00';
        const [dlHour, dlMin] = deadline.includes(':')
            ? deadline.split(':').map(Number)
            : [parseInt(deadline, 10) || 9, 0];
        const nowTw = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
        if (nowTw.getHours() > dlHour || (nowTw.getHours() === dlHour && nowTw.getMinutes() >= dlMin)) {
            return false;
        }

        const { data, error } = await sb.from('lunch_orders')
            .select('id, status')
            .eq('employee_id', employee.employee_id)
            .eq('order_date', getKioskTaiwanDate())
            .maybeSingle();

        if (error) {
            console.warn('公務機查詢便當紀錄失敗:', error);
            return false;
        }
        return !(data && data.status !== 'cancelled');
    }

    function showKioskLunchPopup(employee) {
        lunchPromptEmployee = employee;
        selectedLunch = null;

        const overlay = document.createElement('div');
        overlay.id = 'kioskLunchOverlay';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,0.82);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
        overlay.innerHTML = `
            <div style="background:#fff;color:#0F172A;border-radius:22px;padding:24px;width:100%;max-width:360px;box-shadow:0 24px 80px rgba(0,0,0,0.45);">
                <div style="text-align:center;margin-bottom:16px;">
                    <div style="font-size:42px;margin-bottom:8px;">🍱</div>
                    <h3 style="font-size:20px;font-weight:900;margin:0;">今日便當訂購</h3>
                    <p style="font-size:13px;color:#64748B;margin-top:6px;">${escapeHtml(employee?.name || '員工')}，請選擇今日午餐</p>
                </div>

                <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;">
                    <button type="button" class="kiosk-lunch-opt" onclick="selectKioskLunch('regular')" style="display:flex;align-items:center;gap:12px;width:100%;padding:16px;border:2px solid #E2E8F0;border-radius:16px;background:#fff;color:#0F172A;text-align:left;font-family:inherit;cursor:pointer;">
                        <span style="font-size:30px;">🍖</span>
                        <span style="flex:1;"><b style="font-size:16px;">葷食便當</b><br><span style="font-size:12px;color:#64748B;">今日主菜由餐廳安排</span></span>
                        <span id="kioskLunchCheckRegular" style="width:24px;height:24px;border:2px solid #CBD5E1;border-radius:50%;display:flex;align-items:center;justify-content:center;"></span>
                    </button>
                    <button type="button" class="kiosk-lunch-opt" onclick="selectKioskLunch('vegetarian')" style="display:flex;align-items:center;gap:12px;width:100%;padding:16px;border:2px solid #E2E8F0;border-radius:16px;background:#fff;color:#0F172A;text-align:left;font-family:inherit;cursor:pointer;">
                        <span style="font-size:30px;">🥗</span>
                        <span style="flex:1;"><b style="font-size:16px;">素食便當</b><br><span style="font-size:12px;color:#64748B;">蔬食料理</span></span>
                        <span id="kioskLunchCheckVeg" style="width:24px;height:24px;border:2px solid #CBD5E1;border-radius:50%;display:flex;align-items:center;justify-content:center;"></span>
                    </button>
                    <button type="button" class="kiosk-lunch-opt" onclick="selectKioskLunch('none')" style="display:flex;align-items:center;gap:12px;width:100%;padding:16px;border:2px solid #E2E8F0;border-radius:16px;background:#fff;color:#0F172A;text-align:left;font-family:inherit;cursor:pointer;">
                        <span style="font-size:30px;">🚫</span>
                        <span style="flex:1;"><b style="font-size:16px;">不訂購</b><br><span style="font-size:12px;color:#64748B;">今日不需要便當</span></span>
                        <span id="kioskLunchCheckNone" style="width:24px;height:24px;border:2px solid #CBD5E1;border-radius:50%;display:flex;align-items:center;justify-content:center;"></span>
                    </button>
                </div>

                <button id="kioskLunchConfirmBtn" type="button" onclick="confirmKioskLunch()" disabled style="width:100%;padding:15px;border:none;border-radius:14px;background:#CBD5E1;color:#fff;font-size:16px;font-weight:900;font-family:inherit;cursor:pointer;">請先選擇</button>
                <button type="button" onclick="skipKioskLunch()" style="width:100%;padding:12px;border:none;background:transparent;color:#64748B;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:8px;">稍後再決定</button>
            </div>
        `;
        document.body.appendChild(overlay);
    }

    function selectKioskLunch(type) {
        selectedLunch = type;
        document.querySelectorAll('.kiosk-lunch-opt').forEach(opt => {
            opt.style.borderColor = '#E2E8F0';
            opt.style.background = '#fff';
        });
        ['kioskLunchCheckRegular', 'kioskLunchCheckVeg', 'kioskLunchCheckNone'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.style.borderColor = '#CBD5E1';
                el.style.background = 'transparent';
                el.textContent = '';
            }
        });

        const idx = { regular: 0, vegetarian: 1, none: 2 }[type];
        const opts = document.querySelectorAll('.kiosk-lunch-opt');
        if (opts[idx]) {
            opts[idx].style.borderColor = '#4F46E5';
            opts[idx].style.background = '#EEF2FF';
        }

        const checkId = { regular: 'kioskLunchCheckRegular', vegetarian: 'kioskLunchCheckVeg', none: 'kioskLunchCheckNone' }[type];
        const checkEl = document.getElementById(checkId);
        if (checkEl) {
            checkEl.style.borderColor = '#4F46E5';
            checkEl.style.background = '#4F46E5';
            checkEl.textContent = '✓';
            checkEl.style.color = '#fff';
            checkEl.style.fontWeight = '900';
        }

        const btn = document.getElementById('kioskLunchConfirmBtn');
        const labels = { regular: '確認訂購葷食便當', vegetarian: '確認訂購素食便當', none: '確認不訂購' };
        btn.disabled = false;
        btn.style.background = 'linear-gradient(135deg,#4F46E5,#7C3AED)';
        btn.textContent = labels[type] || '確認';
    }

    async function confirmKioskLunch() {
        if (!selectedLunch || !lunchPromptEmployee?.employee_id) return;

        const btn = document.getElementById('kioskLunchConfirmBtn');
        btn.disabled = true;
        btn.textContent = '提交中...';

        try {
            const isNone = selectedLunch === 'none';
            await sb.from('lunch_orders').upsert({
                employee_id: lunchPromptEmployee.employee_id,
                order_date: getKioskTaiwanDate(),
                is_vegetarian: selectedLunch === 'vegetarian',
                status: isNone ? 'cancelled' : 'ordered',
                notes: isNone ? '公務機：今日不訂購' : '公務機訂購'
            }, { onConflict: 'employee_id,order_date' });

            document.getElementById('kioskLunchOverlay')?.remove();
            document.getElementById('resultCountdown').textContent = isNone ? '已記錄不訂購' : '便當訂購成功';
            lunchPromptEmployee = null;
            selectedLunch = null;
            startResultCountdown(2);
        } catch (e) {
            console.error('公務機便當訂購失敗:', e);
            btn.disabled = false;
            btn.textContent = '訂購失敗，請重試';
            btn.style.background = 'linear-gradient(135deg,#DC2626,#B91C1C)';
        }
    }

    function skipKioskLunch() {
        document.getElementById('kioskLunchOverlay')?.remove();
        lunchPromptEmployee = null;
        selectedLunch = null;
        startResultCountdown(1);
    }

    function escapeHtml(text) {
        return String(text || '').replace(/[&<>"']/g, ch => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[ch]));
    }

    // ===== 錯誤畫面 =====
    function formatKioskError(msg) {
        const text = String(msg || '打卡失敗');
        if (text.includes('v_schedule') && text.includes('not assigned')) {
            return '公務機打卡設定尚未更新：今天沒有排班時會打卡失敗。請通知管理員執行最新公務機 SQL 後再重試。';
        }
        return text;
    }

    function showError(msg) {
        stopCamera();
        document.getElementById('stepInput').classList.add('hidden');
        document.getElementById('stepEmployee').classList.add('hidden');
        document.getElementById('stepResult').classList.add('hidden');
        document.getElementById('stepError').classList.remove('hidden');
        document.getElementById('errorMsg').textContent = msg;
    }

    // ===== 重設 =====
    function resetToInput() {
        stopCamera();
        clearInterval(resultTimer);
        resultTimer = null;
        document.getElementById('kioskLunchOverlay')?.remove();
        inputStr = '';
        currentEmployee = null;
        photoBlob = null;
        selectedLunch = null;
        lunchPromptEmployee = null;
        isPunching = false;
        setActionButtonsBusy(false);
        updateInputDisplay();
        document.getElementById('stepInput').classList.remove('hidden');
        document.getElementById('stepEmployee').classList.add('hidden');
        document.getElementById('stepResult').classList.add('hidden');
        document.getElementById('stepError').classList.add('hidden');
    }
    </script>
</body>
</html>
