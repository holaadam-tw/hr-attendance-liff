<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✂️ 預約系統（服務業）</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div id="loadingPage" class="loading-screen">
        <div class="spinner"></div>
        <p>系統載入中...</p>
    </div>

    <div class="container">
        <div id="mainPage" class="page active">
            <button class="btn btn-secondary" onclick="window.location.href='index.html'" style="width:auto;margin-bottom:10px;">← 返回</button>
            <div class="checkin-page">
                <h2>✂️ 預約系統（服務業）</h2>

                <!-- Tab 切換 -->
                <div style="display:flex;gap:4px;margin-bottom:16px;background:#F1F5F9;border-radius:10px;padding:3px;">
                    <button class="bsTab active-tab" onclick="switchBsTab('bookings',this)" style="flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;background:#fff;color:#4F46E5;box-shadow:0 1px 4px rgba(0,0,0,0.08);">📋 預約列表</button>
                    <button class="bsTab" onclick="switchBsTab('staff',this)" id="tabStaff" style="flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;background:transparent;color:#94A3B8;">👥 技師管理</button>
                    <button class="bsTab" onclick="switchBsTab('services',this)" id="tabServices" style="flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;background:transparent;color:#94A3B8;">✂️ 服務項目</button>
                    <button class="bsTab" onclick="switchBsTab('slots',this)" id="tabSlots" style="flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;background:transparent;color:#94A3B8;">⏰ 時段</button>
                </div>

                <!-- Tab 1: 預約列表 -->
                <div id="bsTabBookings">
                    <div id="bookingListContent"></div>
                </div>

                <!-- Tab 2: 技師管理 -->
                <div id="bsTabStaff" style="display:none;">
                    <div id="staffMgrList"></div>
                    <button class="btn btn-primary" onclick="addStaffProfile()" style="margin-top:12px;font-size:14px;padding:12px;border-radius:12px;">+ 新增技師</button>
                </div>

                <!-- Tab 3: 服務項目 -->
                <div id="bsTabServices" style="display:none;">
                    <div id="serviceMgrList"></div>
                    <button class="btn btn-primary" onclick="addServiceItem()" style="margin-top:12px;font-size:14px;padding:12px;border-radius:12px;">+ 新增服務項目</button>
                </div>

                <!-- Tab 4: 時段設定 -->
                <div id="bsTabSlots" style="display:none;">
                    <div id="slotsTabContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
    // currentEmployee, liffProfile, sb 等由 common.js 提供，不需重複宣告
    let isAdmin = false;
    let bsSelectedDate = '';
    let bsStatusFilter = 'all';
    let bsAllBookings = [];
    let bsSettings = { interval_minutes: 30, advance_days: 14, auto_confirm: false };

    function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function localDate(dt) {
        const d = dt ? new Date(dt.toLocaleString('en-US', { timeZone: 'Asia/Taipei' })) : new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function localDateOffset(days) {
        const d = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
        d.setDate(d.getDate() + days);
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    // ===== Tab 切換 =====
    function switchBsTab(tab, btn) {
        ['bookings', 'staff', 'services', 'slots'].forEach(t => {
            const el = document.getElementById('bsTab' + t.charAt(0).toUpperCase() + t.slice(1));
            if (el) el.style.display = t === tab ? '' : 'none';
        });
        document.querySelectorAll('.bsTab').forEach(b => {
            b.style.background = 'transparent';
            b.style.color = '#94A3B8';
            b.style.boxShadow = 'none';
        });
        if (btn) {
            btn.style.background = '#fff';
            btn.style.color = '#4F46E5';
            btn.style.boxShadow = '0 1px 4px rgba(0,0,0,0.08)';
        }

        if (tab === 'bookings') loadBookings();
        if (tab === 'staff') loadStaffProfiles();
        if (tab === 'services') loadServiceItems();
        if (tab === 'slots') loadTimeSlots();
    }

    // ===== 初始化 =====
    window.addEventListener('load', async () => {
        try {
            if (typeof initializeLiff === 'undefined') {
                console.error('common.js 未正確載入');
                return;
            }

            const initialized = await initializeLiff();
            if (!initialized) {
                const loadingPage = document.getElementById('loadingPage');
                if (loadingPage) loadingPage.style.display = 'none';
                alert('LIFF 初始化失敗，請從 LINE 開啟');
                return;
            }

            const isLoggedIn = await checkUserStatus();
            const loadingPage = document.getElementById('loadingPage');
            if (loadingPage) loadingPage.style.display = 'none';

            if (!isLoggedIn) {
                alert('請先登入');
                window.location.href = 'index.html';
                return;
            }

            console.log('📋 預約後台初始化，公司:', window.currentCompanyId, '員工:', currentEmployee?.name);

            const role = currentEmployee?.role || '';
            isAdmin = (role === 'admin' || role === 'platform_admin' || window.isPlatformAdmin);

            if (!isAdmin) {
                document.getElementById('tabStaff').style.display = 'none';
                document.getElementById('tabServices').style.display = 'none';
                document.getElementById('tabSlots').style.display = 'none';
            }

            // 載入基本設定
            await loadBsSettings();

            bsSelectedDate = localDate();
            loadBookings();

        } catch (e) {
            console.error(e);
            const loadingPage = document.getElementById('loadingPage');
            if (loadingPage) loadingPage.style.display = 'none';
            alert('載入失敗：' + e.message);
        }
    });

    // ===== 基本設定載入 =====
    async function loadBsSettings() {
        try {
            const { data } = await sb.from('system_settings')
                .select('value')
                .eq('company_id', window.currentCompanyId)
                .eq('key', 'booking_service_settings')
                .maybeSingle();
            if (data && data.value) {
                const parsed = typeof data.value === 'string' ? JSON.parse(data.value) : data.value;
                bsSettings = { ...bsSettings, ...parsed };
            }
        } catch(e) { console.error('loadBsSettings error:', e); }
    }

    // ===== Tab 1: 預約列表（動態渲染，風格同餐飲業） =====
    async function loadBookings() {
        const content = document.getElementById('bookingListContent');
        content.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;padding:48px 0;"><div style="width:32px;height:32px;border:3px solid #E2E8F0;border-top-color:#7C3AED;border-radius:50%;animation:spin 0.8s linear infinite;"></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style></div>';

        const today = localDate();
        const rangeStart = localDateOffset(-1);
        const rangeEnd = localDateOffset(13);

        let query = sb.from('service_bookings')
            .select('*, service_items(name), employees(name)')
            .eq('company_id', window.currentCompanyId)
            .gte('booking_date', rangeStart)
            .lte('booking_date', rangeEnd)
            .order('booking_date')
            .order('slot_time');

        if (!isAdmin) {
            query = query.eq('employee_id', currentEmployee.id);
        }

        const { data, error } = await query;
        if (error) {
            content.innerHTML = '<div style="text-align:center;padding:24px;color:#EF4444;">載入失敗</div>';
            return;
        }

        bsAllBookings = (data || []).map(b => ({
            ...b,
            service_name: b.service_items?.name || '未指定',
            staff_name: b.employees?.name || ''
        }));

        renderBookingList();
    }

    function renderBookingList() {
        const content = document.getElementById('bookingListContent');
        const today = localDate();
        const statusColors = {pending:'#F59E0B',confirmed:'#3B82F6',completed:'#10B981',cancelled:'#EF4444'};
        const statusLabels = {pending:'待確認',confirmed:'已確認',completed:'已完成',cancelled:'已取消'};

        // 統計
        const todayBookings = bsAllBookings.filter(b => b.booking_date === today);
        const todayCount = todayBookings.length;
        const pendingCount = bsAllBookings.filter(b => b.status === 'pending').length;
        const confirmedCount = bsAllBookings.filter(b => b.status === 'confirmed').length;

        // 選中日期的預約
        const dayBookings = bsAllBookings.filter(b => b.booking_date === bsSelectedDate);

        let html = '';

        // ── 日期橫向滑動列 ──
        const wkDays = ['日','一','二','三','四','五','六'];
        html += '<div style="display:flex;gap:6px;overflow-x:auto;padding:2px 0 14px;-webkit-overflow-scrolling:touch;scrollbar-width:none;" class="bs-date-scroll">';
        html += '<style>.bs-date-scroll::-webkit-scrollbar{display:none}</style>';
        for (let i = -1; i < 14; i++) {
            const d = new Date(); d.setDate(d.getDate() + i);
            const ds = localDate(d);
            let topLabel, botLabel;
            if (i === -1) { topLabel = '昨天'; botLabel = (d.getMonth()+1)+'/'+d.getDate(); }
            else if (i === 0) { topLabel = '今天'; botLabel = (d.getMonth()+1)+'/'+d.getDate(); }
            else if (i === 1) { topLabel = '明天'; botLabel = (d.getMonth()+1)+'/'+d.getDate(); }
            else { topLabel = (d.getMonth()+1)+'/'+d.getDate(); botLabel = '週'+wkDays[d.getDay()]; }
            const isSel = ds === bsSelectedDate;
            const isToday = i === 0;
            const cnt = bsAllBookings.filter(b => b.booking_date === ds).length;
            html += '<div onclick="selectBsDate(\'' + ds + '\')" style="flex-shrink:0;min-width:56px;padding:8px 6px;text-align:center;border-radius:12px;cursor:pointer;transition:all .15s;';
            if (isSel) {
                html += 'background:linear-gradient(135deg,#7C3AED,#6D28D9);color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.3);';
            } else if (isToday) {
                html += 'background:#F5F3FF;border:1.5px solid #7C3AED;color:#1E293B;';
            } else {
                html += 'background:#fff;border:1.5px solid #E2E8F0;color:#1E293B;';
            }
            html += '">';
            html += '<div style="font-size:10px;' + (isSel ? 'color:rgba(255,255,255,.7);' : 'color:#94A3B8;') + '">' + botLabel + '</div>';
            html += '<div style="font-size:14px;font-weight:700;margin:2px 0;">' + topLabel + '</div>';
            if (cnt > 0) html += '<div style="font-size:10px;font-weight:700;' + (isSel ? 'color:rgba(255,255,255,.85);' : 'color:#7C3AED;') + '">' + cnt + ' 筆</div>';
            html += '</div>';
        }
        html += '</div>';

        // ── 統計卡片 ──
        html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;">';
        html += '<div style="background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border-radius:12px;padding:12px 10px;text-align:center;">';
        html += '<div style="font-size:10px;font-weight:600;color:#3B82F6;text-transform:uppercase;letter-spacing:.5px;">今日預約</div>';
        html += '<div style="font-size:24px;font-weight:800;color:#1E40AF;margin-top:2px;">' + todayCount + '</div></div>';
        html += '<div style="background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border-radius:12px;padding:12px 10px;text-align:center;">';
        html += '<div style="font-size:10px;font-weight:600;color:#D97706;text-transform:uppercase;letter-spacing:.5px;">待確認</div>';
        html += '<div style="font-size:24px;font-weight:800;color:#B45309;margin-top:2px;">' + pendingCount + '</div></div>';
        html += '<div style="background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border-radius:12px;padding:12px 10px;text-align:center;">';
        html += '<div style="font-size:10px;font-weight:600;color:#059669;text-transform:uppercase;letter-spacing:.5px;">已確認</div>';
        html += '<div style="font-size:24px;font-weight:800;color:#065F46;margin-top:2px;">' + confirmedCount + '</div></div>';
        html += '</div>';

        // ── 狀態過濾膠囊 ──
        const filterDefs = [
            {k:'all',l:'全部',c:'#64748B'},
            {k:'pending',l:'待確認',c:'#F59E0B'},
            {k:'confirmed',l:'已確認',c:'#3B82F6'},
            {k:'completed',l:'已完成',c:'#10B981'},
            {k:'cancelled',l:'已取消',c:'#EF4444'}
        ];
        html += '<div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;">';
        filterDefs.forEach(function(f) {
            const cnt = f.k === 'all' ? dayBookings.length : dayBookings.filter(b => b.status === f.k).length;
            const active = bsStatusFilter === f.k;
            html += '<button onclick="filterBsBookings(\'' + f.k + '\')" style="flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;';
            if (active) {
                html += 'border:1.5px solid ' + f.c + ';background:' + f.c + ';color:#fff;box-shadow:0 1px 4px ' + f.c + '33;';
            } else {
                html += 'border:1.5px solid #E2E8F0;background:#fff;color:#64748B;';
            }
            html += '">' + f.l;
            if (cnt > 0) html += '<span style="margin-left:4px;font-size:10px;opacity:.8;">' + cnt + '</span>';
            html += '</button>';
        });
        html += '</div>';

        // ── 時間軸卡片 — 按時段分組 ──
        const filtered = bsStatusFilter === 'all' ? dayBookings : dayBookings.filter(b => b.status === bsStatusFilter);
        if (filtered.length === 0) {
            html += '<div style="text-align:center;padding:48px 20px;color:#94A3B8;">';
            html += '<div style="font-size:48px;margin-bottom:12px;">📅</div>';
            html += '<div style="font-size:14px;font-weight:600;color:#64748B;">此日無預約</div>';
            html += '<div style="font-size:12px;color:#94A3B8;margin-top:4px;">等待消費者預約中</div>';
            html += '</div>';
        } else {
            const morning = filtered.filter(b => (b.slot_time || '') < '12:00');
            const afternoon = filtered.filter(b => (b.slot_time || '') >= '12:00' && (b.slot_time || '') < '18:00');
            const evening = filtered.filter(b => (b.slot_time || '') >= '18:00');

            [['🌅 上午', morning],['☀️ 下午', afternoon],['🌙 晚上', evening]].forEach(function(grp) {
                if (grp[1].length === 0) return;
                html += '<div style="display:flex;align-items:center;gap:8px;margin:14px 0 8px;">';
                html += '<div style="font-size:12px;font-weight:700;color:#94A3B8;">' + grp[0] + '</div>';
                html += '<div style="flex:1;height:1px;background:#E2E8F0;"></div>';
                html += '<div style="font-size:11px;color:#94A3B8;">' + grp[1].length + ' 筆</div>';
                html += '</div>';

                grp[1].forEach(function(b) {
                    const sc = statusColors[b.status] || '#E2E8F0';
                    const sl = statusLabels[b.status] || b.status;
                    html += '<div style="position:relative;padding:14px 14px 14px 18px;background:#fff;border-radius:12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #F1F5F9;overflow:hidden;">';
                    // Left color bar
                    html += '<div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:' + sc + ';border-radius:4px 0 0 4px;"></div>';

                    // Row 1: time + status badge
                    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
                    html += '<div style="font-size:18px;font-weight:800;color:#1E293B;letter-spacing:-.5px;">' + ((b.slot_time || '').substring(0,5) || '--:--') + (b.slot_end_time ? ' ～ ' + b.slot_end_time.substring(0,5) : '') + '</div>';
                    html += '<span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;color:#fff;background:' + sc + ';">' + sl + '</span>';
                    html += '</div>';

                    // Row 2: customer name + phone
                    html += '<div style="font-size:15px;font-weight:700;color:#1E293B;margin-bottom:2px;">' + esc(b.customer_name) + '</div>';
                    if (b.customer_phone) html += '<div style="font-size:13px;color:#64748B;margin-bottom:8px;">📱 ' + esc(b.customer_phone) + '</div>';

                    // Row 3: badges
                    html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">';
                    if (b.service_name) html += '<span style="background:#FFF7ED;color:#C2410C;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;">✂️ ' + esc(b.service_name) + '</span>';
                    if (b.staff_name) html += '<span style="background:#EFF6FF;color:#1D4ED8;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;">👤 ' + esc(b.staff_name) + '</span>';
                    if (b.notes) html += '<span style="background:#FEF3C7;color:#92400E;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;">📝 ' + esc(b.notes.length > 20 ? b.notes.substring(0,20) + '…' : b.notes) + '</span>';
                    html += '</div>';

                    // Action buttons
                    html += '<div style="display:flex;gap:6px;">';
                    if (b.status === 'pending') {
                        html += '<button onclick="event.stopPropagation();updateBsStatus(\'' + b.id + '\',\'confirmed\')" style="flex:1;padding:8px;border:none;border-radius:8px;background:#3B82F6;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">✓ 確認預約</button>';
                        html += '<button onclick="event.stopPropagation();updateBsStatus(\'' + b.id + '\',\'cancelled\')" style="padding:8px 14px;border:1.5px solid #FCA5A5;border-radius:8px;background:#fff;color:#EF4444;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">✕</button>';
                    } else if (b.status === 'confirmed') {
                        html += '<button onclick="event.stopPropagation();updateBsStatus(\'' + b.id + '\',\'completed\')" style="flex:1;padding:8px;border:none;border-radius:8px;background:#6366F1;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">✔ 完成服務</button>';
                        html += '<button onclick="event.stopPropagation();updateBsStatus(\'' + b.id + '\',\'cancelled\')" style="padding:8px 14px;border:1.5px solid #FCA5A5;border-radius:8px;background:#fff;color:#EF4444;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">✕</button>';
                    }
                    html += '</div>';
                    html += '</div>';
                });
            });
        }

        content.innerHTML = html;
    }

    // 日期切換
    function selectBsDate(date) {
        bsSelectedDate = date;
        renderBookingList();
    }

    // 狀態過濾
    function filterBsBookings(filter) {
        bsStatusFilter = filter;
        renderBookingList();
    }

    // 更新預約狀態
    async function updateBsStatus(id, newStatus) {
        if (newStatus === 'cancelled') {
            const reason = prompt('取消原因（選填）：');
            const update = { status: newStatus, cancelled_reason: reason || null };
            const { error } = await sb.from('service_bookings').update(update).eq('id', id);
            if (error) { showToast('操作失敗'); return; }
        } else {
            const update = { status: newStatus };
            if (newStatus === 'confirmed') update.confirmed_at = new Date().toISOString();
            const { error } = await sb.from('service_bookings').update(update).eq('id', id);
            if (error) { showToast('操作失敗'); return; }
        }
        showToast('已更新');
        loadBookings();
    }

    // ===== Tab 2: 技師管理 =====
    async function loadStaffProfiles() {
        const el = document.getElementById('staffMgrList');
        el.innerHTML = '<div style="text-align:center;padding:24px;color:#94A3B8;">載入中...</div>';

        const { data } = await sb.from('staff_profiles')
            .select('*, employees(name)')
            .eq('company_id', window.currentCompanyId);

        if (!data || data.length === 0) {
            el.innerHTML = '<div style="text-align:center;padding:24px;color:#94A3B8;">尚未新增技師</div>';
            return;
        }

        el.innerHTML = data.map(s => `
            <div style="background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center;gap:12px;">
                <div style="width:48px;height:48px;border-radius:50%;background:#E2E8F0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">
                    ${s.photo_url ? '<img src="' + esc(s.photo_url) + '" style="width:100%;height:100%;object-fit:cover;">' : '👤'}
                </div>
                <div style="flex:1;">
                    <div style="font-weight:700;font-size:14px;">${esc(s.employees?.name || '未命名')}</div>
                    <div style="font-size:12px;color:#64748B;margin-top:2px;">${s.bio ? esc(s.bio) : '未設定簡介'}</div>
                    <div style="font-size:11px;margin-top:4px;">
                        <span style="padding:2px 6px;border-radius:4px;font-weight:600;${s.is_bookable ? 'background:#D1FAE5;color:#059669;' : 'background:#FEE2E2;color:#DC2626;'}">${s.is_bookable ? '開放預約' : '暫停預約'}</span>
                    </div>
                </div>
                <div style="display:flex;flex-direction:column;gap:4px;">
                    <button onclick="editStaffProfile('${s.id}')" style="padding:6px 10px;border:none;border-radius:6px;background:#EEF2FF;color:#4F46E5;font-size:11px;font-weight:600;cursor:pointer;">編輯</button>

    async function addStaffProfile() {
        // 取未加入的員工
        const { data: existing } = await sb.from('staff_profiles')
            .select('employee_id')
            .eq('company_id', window.currentCompanyId);
        const existIds = (existing || []).map(e => e.employee_id);

        const { data: emps } = await sb.from('employees')
            .select('id, name')
            .eq('company_id', window.currentCompanyId)
            .eq('is_active', true);

        const available = (emps || []).filter(e => !existIds.includes(e.id));
        if (available.length === 0) {
            showToast('所有員工都已加入');
            return;
        }

        const list = available.map((e, i) => (i + 1) + '. ' + e.name).join('\n');
        const choice = prompt('選擇員工（輸入編號）：\n' + list);
        const idx = parseInt(choice) - 1;
        if (isNaN(idx) || idx < 0 || idx >= available.length) return;

        const emp = available[idx];
        const bio = prompt('簡介（選填）：', '') || null;

        const { error } = await sb.from('staff_profiles').insert({
            company_id: window.currentCompanyId,
            employee_id: emp.id,
            bio: bio,
            is_bookable: true
        });

        if (error) { showToast('新增失敗：' + error.message); return; }
        showToast('已新增');
        loadStaffProfiles();
    }

    async function editStaffProfile(id) {
        const { data: s } = await sb.from('staff_profiles').select('*').eq('id', id).maybeSingle();
        if (!s) return;
        const bio = prompt('簡介：', s.bio || '');
        if (bio === null) return;
        const photoUrl = prompt('照片 URL（留空不改）：', s.photo_url || '');

        const update = { bio: bio || null, updated_at: new Date().toISOString() };
        if (photoUrl !== null && photoUrl !== (s.photo_url || '')) update.photo_url = photoUrl || null;

        const { error } = await sb.from('staff_profiles').update(update).eq('id', id);
        if (error) { showToast('更新失敗'); return; }
        showToast('已更新');
        loadStaffProfiles();
    }

        await sb.from('staff_profiles').update({ is_bookable: bookable, updated_at: new Date().toISOString() }).eq('id', id);

        loadStaffProfiles();

            '<div style="margin-bottom:12px;">' +
                '<label style="font-size:13px;color:#666;display:block;margin-bottom:4px;">同時可服務人數</label>' +
                '<input type="number" id="slotMaxInput" value="' + (maxConcurrent || 1) + '" min="1" style="width:100%;padding:10px;border:1px solid #E2E8F0;border-radius:8px;font-size:15px;">' +
            '</div>' +
            '<div style="margin-bottom:16px;">' +
                '<label style="font-size:13px;color:#666;display:block;margin-bottom:8px;">開放星期（不選 = 每天）</label>' +
                '<div style="display:flex;gap:6px;flex-wrap:wrap;" id="daySelector">' +
                    DOW_LABELS.map(function(label, i) {
                        var sel = selectedDays.includes(i);
                        return '<button type="button" class="day-btn" data-day="' + i + '" onclick="toggleDayBtn(this)" style="padding:8px 12px;border:1px solid ' + (sel ? '#7C3AED' : '#E2E8F0') + ';border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:' + (sel ? '#7C3AED' : '#fff') + ';color:' + (sel ? '#fff' : '#64748B') + ';">' + label + '</button>';
                    }).join('') +
                '</div>' +
            '</div>' +
            '<div style="display:flex;gap:8px;">' +
                '<button onclick="closeSlotModal()" style="flex:1;padding:10px;border:1px solid #E2E8F0;border-radius:10px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;color:#64748B;">取消</button>' +
                '<button onclick="saveSlotModal()" style="flex:1;padding:10px;border:none;border-radius:10px;background:linear-gradient(135deg,#7C3AED,#6D28D9);color:#fff;font-size:14px;font-weight:600;cursor:pointer;">儲存</button>' +
            '</div>' +
        '</div>';
        document.body.appendChild(overlay);
    }

    function toggleDayBtn(btn) {
        const isOn = btn.style.background === 'rgb(124, 58, 237)';
        btn.style.background = isOn ? '#fff' : '#7C3AED';
        btn.style.color = isOn ? '#64748B' : '#fff';
        btn.style.borderColor = isOn ? '#E2E8F0' : '#7C3AED';
    }

    function closeSlotModal() {
        const m = document.getElementById('slotModal');
        if (m) m.remove();
    }

    async function saveSlotModal() {
        const time = document.getElementById('slotTimeInput').value;
        if (!time) { showToast('請輸入開始時間'); return; }
        const endTime = document.getElementById('slotEndTimeInput').value || null;
        const max = parseInt(document.getElementById('slotMaxInput').value) || 1;

        const selectedDays = [];
        document.querySelectorAll('#daySelector .day-btn').forEach(function(btn) {
            if (btn.style.background === 'rgb(124, 58, 237)') {
                selectedDays.push(parseInt(btn.dataset.day));
            }
        });
        const dow = selectedDays.length === 0 ? null : JSON.stringify(selectedDays.sort());

        if (slotEditId) {
            const { error } = await sb.from('service_time_slots').update({
                slot_time: time, slot_end_time: endTime, max_concurrent: max, day_of_week: dow
            }).eq('id', slotEditId);
            if (error) { showToast('更新失敗'); return; }
            showToast('已更新');
        } else {
            const { error } = await sb.from('service_time_slots').insert({
                company_id: window.currentCompanyId,
                slot_time: time, slot_end_time: endTime, max_concurrent: max, day_of_week: dow, is_active: true
            });
            if (error) { showToast('新增失敗：' + error.message); return; }
            showToast('已新增');
        }
        closeSlotModal();
        loadTimeSlots();
    }

    function addTimeSlot() {
        showSlotModal(null, '10:00', 1, null, '');
    }

    async function editTimeSlot(id) {
        const { data: s } = await sb.from('service_time_slots').select('*').eq('id', id).maybeSingle();
        if (!s) return;
        showSlotModal(s.id, s.slot_time, s.max_concurrent, s.day_of_week, s.slot_end_time);
    }

    async function deleteTimeSlot(id) {
        if (!confirm('確定刪除此時段？')) return;
        await sb.from('service_time_slots').delete().eq('id', id);
        showToast('已刪除');
        loadTimeSlots();
    }
    </script>
</body>
</html>
