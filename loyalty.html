<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>集點會員</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:#1E293B; min-height:100vh; }
        .container { max-width:480px; margin:0 auto; padding:20px 16px 32px; }
        .header { text-align:center; padding:32px 0 20px; }
        .header h1 { font-size:24px; font-weight:800; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.15); }
        .header p { font-size:14px; color:rgba(255,255,255,.75); margin-top:6px; }
        .card { background:#fff; border-radius:24px; padding:24px 20px; box-shadow:0 8px 32px rgba(0,0,0,.12); margin-bottom:16px; }
        .btn { display:block; width:100%; padding:14px; border:none; border-radius:14px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s; }
        .btn:active { transform:scale(0.98); }
        .btn-line { background:#06C755; color:#fff; box-shadow:0 4px 16px rgba(6,199,85,.3); }
        .btn-query { background:#6366F1; color:#fff; }
        .point-card { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:#fff; border-radius:20px; padding:24px; text-align:center; margin-bottom:20px; }
        .point-card .pts { font-size:48px; font-weight:900; margin:12px 0 4px; }
        .point-card .label { font-size:13px; opacity:0.85; }
        .tx-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #F1F5F9; }
        .tx-row:last-child { border-bottom:none; }
        .section-title { font-size:15px; font-weight:800; margin-bottom:14px; }
        .reward-card { display:flex; align-items:center; gap:14px; padding:14px; border:2px solid #E2E8F0; border-radius:14px; margin-bottom:10px; cursor:pointer; transition:all .2s; }
        .reward-card:hover { border-color:#C4B5FD; }
        .reward-card .rpts { background:#EDE9FE; color:#7C3AED; padding:4px 10px; border-radius:8px; font-size:12px; font-weight:700; white-space:nowrap; }
        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#1E293B; color:#fff; padding:12px 24px; border-radius:12px; font-size:14px; z-index:9999; display:none; }
        .back-btn { display:inline-flex; align-items:center; gap:6px; color:rgba(255,255,255,.85); font-size:14px; font-weight:600; text-decoration:none; margin-bottom:16px; }
        .divider { display:flex; align-items:center; gap:12px; margin:16px 0; color:#94A3B8; font-size:13px; }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background:#E2E8F0; }
        #loginView, #memberView, #phoneView { display:none; }
    </style>
</head>
<body>
    <div class="container">
        <a class="back-btn" href="javascript:history.back()">← 返回</a>
        <div class="header">
            <h1>集點會員</h1>
            <p id="storeName">載入中...</p>
        </div>

        <!-- 未登入 View -->
        <div id="loginView">
            <div class="card" style="text-align:center;">
                <div style="font-size:60px;margin-bottom:16px;">🎁</div>
                <h2 style="font-size:18px;font-weight:800;margin-bottom:8px;">集點會員</h2>
                <p style="font-size:13px;color:#64748B;margin-bottom:24px;">登入查看點數或開始集點</p>
                <button class="btn btn-line" onclick="loginWithLine()" style="margin-bottom:0;">
                    🟢 LINE 登入查看點數
                </button>
                <div class="divider">或</div>
                <input type="tel" id="phoneInput" placeholder="輸入手機號碼查詢" maxlength="10"
                    style="width:100%;padding:12px 14px;border:2px solid #E2E8F0;border-radius:12px;font-size:15px;margin-bottom:8px;">
                <button class="btn btn-query" onclick="queryByPhone()">查詢點數</button>
            </div>
        </div>

        <!-- LINE 登入後 View（可兌換） -->
        <div id="memberView">
            <div class="point-card">
                <div style="font-size:14px;font-weight:600;" id="memberName">會員</div>
                <div class="pts" id="memberPoints">0</div>
                <div class="label">可用點數</div>
                <div style="font-size:11px;opacity:0.7;margin-top:8px;" id="memberSince"></div>
            </div>
            <!-- 綁定手機（LINE 登入後，若 phone 為空） -->
            <div id="bindPhoneCard" class="card" style="display:none;">
                <div style="font-size:13px;color:#64748B;margin-bottom:10px;">綁定手機號碼，方便店員查詢您的點數</div>
                <div style="display:flex;gap:8px;">
                    <input type="tel" id="bindPhoneInput" placeholder="0912345678" maxlength="10"
                        style="flex:1;padding:10px 12px;border:2px solid #E2E8F0;border-radius:10px;font-size:14px;">
                    <button onclick="bindPhone()" style="padding:10px 16px;border:none;border-radius:10px;background:#6366F1;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;">綁定</button>
                    <button onclick="document.getElementById('bindPhoneCard').style.display='none'" style="padding:10px 12px;border:1px solid #E2E8F0;border-radius:10px;background:#fff;font-size:13px;cursor:pointer;">略過</button>
                </div>
            </div>
            <div class="card">
                <div class="section-title">🎁 兌換商品</div>
                <div id="rewardsList"></div>
            </div>
            <div class="card">
                <div class="section-title">📋 點數記錄</div>
                <div id="txHistory" style="font-size:13px;color:#94A3B8;">載入中...</div>
            </div>
        </div>

        <!-- 手機查詢 View（只能看） -->
        <div id="phoneView">
            <div class="point-card">
                <div style="font-size:14px;font-weight:600;" id="phoneMemberName">📱</div>
                <div class="pts" id="phoneMemberPoints">0</div>
                <div class="label">可用點數</div>
            </div>
            <div class="card">
                <div class="section-title">📋 點數記錄</div>
                <div id="phoneTxHistory" style="font-size:13px;color:#94A3B8;">載入中...</div>
            </div>
            <div class="card" style="text-align:center;padding:20px;">
                <p style="font-size:13px;color:#64748B;margin-bottom:12px;">LINE 登入後可兌換商品</p>
                <button class="btn btn-line" onclick="loginWithLine()">🟢 LINE 登入</button>
            </div>
            <button class="btn" onclick="switchToLogin()" style="background:rgba(255,255,255,.15);color:#fff;margin-top:8px;">← 重新查詢</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    // === 全域錯誤監控 ===
    window.onerror = function(msg, src, line, col, err) {
      try {
        fetch('https://nssuisyvlrqnqfxupklb.supabase.co/rest/v1/error_logs', {
          method: 'POST',
          headers: {
            'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zc3Vpc3l2bHJxbnFmeHVwa2xiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyOTAwMzUsImV4cCI6MjA4NDg2NjAzNX0.q_B6v3gf1TOCuAq7z0xIw10wDueCSJn0p37VzdMfmbc',
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({
            message: String(msg).substring(0, 1000),
            page: location.pathname,
            line: line,
            user_id: (window.liffProfile && window.liffProfile.userId) || null,
            user_agent: navigator.userAgent
          })
        }).catch(function(){});
      } catch(e) {}
    };
    var SUPABASE_URL = 'https://nssuisyvlrqnqfxupklb.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zc3Vpc3l2bHJxbnFmeHVwa2xiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyOTAwMzUsImV4cCI6MjA4NDg2NjAzNX0.q_B6v3gf1TOCuAq7z0xIw10wDueCSJn0p37VzdMfmbc';
    var LIFF_ID = '2008962829-bnsS1bbB';
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    var companyId = '';
    var currentMember = null;
    var lineUserId = null;
    var isLineLoggedIn = false;

    function showToast(msg) { var el = document.getElementById('toast'); el.textContent = msg; el.style.display = 'block'; setTimeout(function() { el.style.display = 'none'; }, 2500); }
    function escapeHTML(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ===== 初始化 =====
    window.addEventListener('load', async function() {
        var params = new URLSearchParams(window.location.search);
        companyId = params.get('store') || params.get('company') || sessionStorage.getItem('loyalty_company_id');
        if (!companyId) { document.getElementById('storeName').textContent = '缺少商店參數'; return; }
        sessionStorage.setItem('loyalty_company_id', companyId);

        // 檢查是否從 LIFF 跳轉回來（帶有 line_user_id）
        var savedLineId = sessionStorage.getItem('loyalty_line_user_id_' + companyId);
        var savedLineName = sessionStorage.getItem('loyalty_line_name_' + companyId);
        if (savedLineId) {
            lineUserId = savedLineId;
            isLineLoggedIn = true;
            await loadLineMember(savedLineName || '會員');
            // 載入商店名稱（背景）
            try { var res = await sb.from('companies').select('name').eq('id', companyId).maybeSingle(); if (res.data) document.getElementById('storeName').textContent = res.data.name; } catch(e) {}
            return;
        }

        try {
            var res = await sb.from('companies').select('name').eq('id', companyId).maybeSingle();
            if (res.data) document.getElementById('storeName').textContent = res.data.name;
        } catch(e) {}

        // 不使用 LIFF（loyalty.html 不在 LIFF endpoint URL 範圍）
        // 直接顯示登入畫面
        document.getElementById('loginView').style.display = 'block';
    });

    // LINE 登入：跳轉到 LIFF URL，由 index.html handleGotoParam 處理後跳回
    function loginWithLine() {
        // 存 store 參數，LIFF 登入後 index.html 會讀取並跳回
        sessionStorage.setItem('loyalty_pending_store', companyId);
        window.location.href = 'https://liff.line.me/' + LIFF_ID + '?goto=loyalty&store=' + companyId;
    }

    function switchToLogin() {
        document.getElementById('phoneView').style.display = 'none';
        document.getElementById('loginView').style.display = 'block';
    }

    // ===== LINE 登入 → 載入會員 =====
    async function loadLineMember(displayName) {
        try {
            var res = await sb.from('loyalty_members').select('*').eq('company_id', companyId).eq('line_user_id', lineUserId).maybeSingle();
            var member = (res && !res.error) ? res.data : null;

            if (!member) {
                // 新會員 → 自動建立
                var welcomePoints = 0;
                try {
                    var sr = await sb.from('loyalty_settings').select('welcome_points').eq('company_id', companyId).maybeSingle();
                    if (sr && sr.data) welcomePoints = sr.data.welcome_points || 0;
                } catch(e) {}

                try {
                    var ir = await sb.from('loyalty_members')
                        .insert({ company_id: companyId, line_user_id: lineUserId, name: displayName || null, total_points: welcomePoints })
                        .select().single();
                    if (ir.error) { console.error('Insert member error:', ir.error); }
                    member = ir.data;
                } catch(insertErr) {
                    console.error('Insert member failed:', insertErr);
                }

                if (member && welcomePoints > 0) {
                    try {
                        await sb.from('loyalty_transactions').insert({
                            company_id: companyId, member_id: member.id, type: 'earn',
                            points: welcomePoints, source: 'manual', note: '新會員歡迎禮'
                        });
                    } catch(e) {}
                }
                if (member) showToast('🎉 歡迎加入！' + (welcomePoints > 0 ? ' 獲得 ' + welcomePoints + ' 點' : ''));
            }

            // member 仍然可能是 null（DB 錯誤）
            if (!member) {
                showToast('無法載入會員資料，請重試');
                document.getElementById('loginView').style.display = 'block';
                return;
            }

            currentMember = member;
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('memberView').style.display = 'block';
            document.getElementById('memberName').textContent = '👋 歡迎回來，' + (member.name || displayName || '會員') + '！';
            document.getElementById('memberPoints').textContent = member.available_points || 0;
            if (member.member_since) document.getElementById('memberSince').textContent = '會員自 ' + member.member_since;

            // 若 phone 為空，顯示綁定手機
            if (!member.phone) {
                document.getElementById('bindPhoneCard').style.display = '';
            }

            loadTransactions('txHistory');
            loadRewards();
        } catch(e) {
            console.error(e);
            showToast('載入失敗');
            document.getElementById('loginView').style.display = 'block';
        }
    }

    // ===== 手機查詢（只能看） =====
    async function queryByPhone() {
        var phone = document.getElementById('phoneInput').value.trim();
        if (!phone || phone.length < 9) { showToast('請輸入正確的手機號碼'); return; }

        try {
            var res = await sb.from('loyalty_members').select('*').eq('company_id', companyId).eq('phone', phone).maybeSingle();
            if (!res.data) { showToast('找不到此手機的會員資料'); return; }

            currentMember = res.data;
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('phoneView').style.display = 'block';
            document.getElementById('phoneMemberName').textContent = '📱 ' + phone.replace(/(\d{4})(\d{3})(\d{3})/, '$1-$2-$3');
            document.getElementById('phoneMemberPoints').textContent = res.data.available_points || 0;

            loadTransactions('phoneTxHistory');
        } catch(e) {
            showToast('查詢失敗');
        }
    }

    // ===== 載入點數記錄 =====
    async function loadTransactions(containerId) {
        var el = document.getElementById(containerId);
        if (!currentMember) return;
        try {
            var res = await sb.from('loyalty_transactions').select('*').eq('member_id', currentMember.id).order('created_at', { ascending: false }).limit(10);
            if (!res.data || res.data.length === 0) { el.innerHTML = '<div style="text-align:center;padding:16px;color:#94A3B8;">尚無點數記錄</div>'; return; }

            var html = '';
            res.data.forEach(function(t) {
                var isEarn = t.type === 'earn';
                var dateStr = t.created_at ? new Date(t.created_at).toLocaleDateString('zh-TW', { timeZone: 'Asia/Taipei', month: 'numeric', day: 'numeric' }) : '';
                var sourceLabel = { order: '🛒 消費集點', booking: '📅 預約集點', manual: '🎁 手動' }[t.source] || '';
                html += '<div class="tx-row"><div>';
                html += '<div style="font-size:13px;font-weight:600;">' + escapeHTML(t.note || sourceLabel || (isEarn ? '獲得點數' : '兌換商品')) + '</div>';
                html += '<div style="font-size:11px;color:#94A3B8;">' + dateStr + (t.amount ? ' · $' + t.amount : '') + '</div>';
                html += '</div>';
                html += '<div style="font-size:15px;font-weight:800;color:' + (isEarn ? '#059669' : '#DC2626') + ';">' + (isEarn ? '+' : '') + t.points + '</div></div>';
            });
            el.innerHTML = html;
        } catch(e) { el.innerHTML = '<div style="text-align:center;padding:16px;color:#94A3B8;">載入失敗</div>'; }
    }

    // ===== 兌換商品（LINE 登入才有） =====
    async function loadRewards() {
        var el = document.getElementById('rewardsList');
        try {
            var res = await sb.from('loyalty_rewards').select('*').eq('company_id', companyId).eq('is_active', true).order('sort_order');
            if (!res.data || res.data.length === 0) { el.innerHTML = '<div style="text-align:center;padding:16px;color:#94A3B8;">目前沒有兌換商品</div>'; return; }

            var pts = currentMember.available_points || 0;
            var html = '';
            res.data.forEach(function(r) {
                var canRedeem = pts >= r.points_required;
                html += '<div class="reward-card" style="' + (canRedeem ? '' : 'opacity:0.5;') + '" onclick="' + (canRedeem ? "redeemReward('" + r.id + "'," + r.points_required + ",'" + escapeHTML(r.name).replace(/'/g, "\\'") + "')" : '') + '">';
                html += '<div style="font-size:28px;">🎁</div><div style="flex:1;min-width:0;">';
                html += '<div style="font-size:14px;font-weight:700;">' + escapeHTML(r.name) + '</div>';
                if (r.description) html += '<div style="font-size:12px;color:#64748B;margin-top:2px;">' + escapeHTML(r.description) + '</div>';
                html += '</div><div class="rpts">' + r.points_required + '點</div></div>';
            });
            el.innerHTML = html;
        } catch(e) { el.innerHTML = '<div style="text-align:center;padding:16px;color:#94A3B8;">載入失敗</div>'; }
    }

    async function redeemReward(rewardId, pointsRequired, rewardName) {
        if (!currentMember || !isLineLoggedIn) return;
        if (!confirm('確定要兌換「' + rewardName + '」（' + pointsRequired + '點）？\n\n兌換後將產生兌換碼，請出示給店員核銷。')) return;
        try {
            var res = await sb.from('loyalty_members').select('available_points, used_points').eq('id', currentMember.id).single();
            if (!res.data || res.data.available_points < pointsRequired) { showToast('❌ 點數不足'); return; }

            // 產生 6 碼兌換碼
            var code = Math.floor(100000 + Math.random() * 900000).toString();
            var expiresAt = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString();

            // 寫入 loyalty_redemptions
            var { error: rErr } = await sb.from('loyalty_redemptions').insert({
                company_id: companyId, member_id: currentMember.id, reward_id: rewardId,
                code: code, points_used: pointsRequired, status: 'pending', expires_at: expiresAt
            });
            if (rErr) throw rErr;

            // 扣除 used_points
            await sb.from('loyalty_members').update({ used_points: res.data.used_points + pointsRequired }).eq('id', currentMember.id);

            // 記錄交易
            await sb.from('loyalty_transactions').insert({
                company_id: companyId, member_id: currentMember.id, type: 'redeem',
                points: -pointsRequired, source: 'manual', note: '兌換：' + rewardName + '（碼：' + code + '）'
            });

            currentMember.available_points = res.data.available_points - pointsRequired;
            document.getElementById('memberPoints').textContent = currentMember.available_points;
            loadTransactions('txHistory');
            loadRewards();

            // 顯示兌換碼
            showRedeemCode(code, rewardName);
        } catch(e) { console.error(e); showToast('❌ 兌換失敗'); }
    }

    function showRedeemCode(code, rewardName) {
        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
        overlay.innerHTML = '<div style="background:#fff;border-radius:24px;padding:32px 24px;text-align:center;max-width:360px;width:100%;">' +
            '<div style="font-size:48px;margin-bottom:12px;">🎉</div>' +
            '<div style="font-size:16px;font-weight:800;margin-bottom:4px;">兌換成功</div>' +
            '<div style="font-size:13px;color:#64748B;margin-bottom:20px;">' + escapeHTML(rewardName) + '</div>' +
            '<div style="background:#F8FAFC;border-radius:16px;padding:20px;margin-bottom:16px;">' +
                '<div style="font-size:12px;color:#94A3B8;margin-bottom:8px;">兌換碼</div>' +
                '<div style="font-size:36px;font-weight:900;letter-spacing:6px;color:#7C3AED;">' + code + '</div>' +
                '<div style="font-size:12px;color:#94A3B8;margin-top:8px;">24 小時內有效，請出示給店員核銷</div>' +
            '</div>' +
            '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="width:100%;padding:14px;border:none;border-radius:14px;background:#7C3AED;color:#fff;font-size:15px;font-weight:700;cursor:pointer;">確定</button>' +
        '</div>';
        document.body.appendChild(overlay);
    }

    // ===== 綁定手機 =====
    async function bindPhone() {
        var phone = document.getElementById('bindPhoneInput').value.trim();
        if (!phone || phone.length < 9) { showToast('請輸入正確的手機號碼'); return; }
        if (!currentMember) return;
        try {
            await sb.from('loyalty_members').update({ phone: phone }).eq('id', currentMember.id);
            currentMember.phone = phone;
            document.getElementById('bindPhoneCard').style.display = 'none';
            showToast('✅ 手機號碼已綁定');
        } catch(e) { showToast('❌ 綁定失敗'); }
    }
    </script>
</body>
</html>
