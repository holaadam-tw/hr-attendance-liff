<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎁 集點會員</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:#1E293B; min-height:100vh; }
        .container { max-width:480px; margin:0 auto; padding:20px 16px 32px; }
        .header { text-align:center; padding:32px 0 20px; }
        .header h1 { font-size:24px; font-weight:800; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.15); }
        .header p { font-size:14px; color:rgba(255,255,255,.75); margin-top:6px; }
        .content-card { background:#fff; border-radius:24px; padding:24px 20px; box-shadow:0 8px 32px rgba(0,0,0,.12); margin-bottom:16px; }
        .btn { display:block; width:100%; padding:14px; border:none; border-radius:14px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s; }
        .btn-primary { background:linear-gradient(135deg,#7C3AED,#6D28D9); color:#fff; box-shadow:0 4px 16px rgba(124,58,237,.3); }
        .btn-primary:active { transform:scale(0.98); }
        .btn-outline { background:#fff; color:#7C3AED; border:2px solid #7C3AED; }
        input[type=text], input[type=tel] { width:100%; padding:14px 16px; border:2px solid #E2E8F0; border-radius:14px; font-size:15px; font-family:inherit; transition:border-color .2s; }
        input:focus { outline:none; border-color:#7C3AED; }
        .point-card { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:#fff; border-radius:20px; padding:24px; text-align:center; margin-bottom:20px; }
        .point-card .pts { font-size:48px; font-weight:900; margin:12px 0 4px; }
        .point-card .label { font-size:13px; opacity:0.85; }
        .tx-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #F1F5F9; }
        .tx-row:last-child { border-bottom:none; }
        .section-title { font-size:15px; font-weight:800; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
        .reward-card { display:flex; align-items:center; gap:14px; padding:14px; border:2px solid #E2E8F0; border-radius:14px; margin-bottom:10px; cursor:pointer; transition:all .2s; }
        .reward-card:hover { border-color:#C4B5FD; }
        .reward-card .rpts { background:#EDE9FE; color:#7C3AED; padding:4px 10px; border-radius:8px; font-size:12px; font-weight:700; white-space:nowrap; }
        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#1E293B; color:#fff; padding:12px 24px; border-radius:12px; font-size:14px; z-index:9999; display:none; }
        .back-btn { display:inline-flex; align-items:center; gap:6px; color:rgba(255,255,255,.85); font-size:14px; font-weight:600; text-decoration:none; margin-bottom:16px; }
        #loginView, #memberView { display:none; }
    </style>
</head>
<body>
    <div class="container">
        <a class="back-btn" href="javascript:history.back()">← 返回</a>
        <div class="header">
            <h1>🎁 集點會員</h1>
            <p id="storeName">載入中...</p>
        </div>

        <!-- 登入 View -->
        <div id="loginView">
            <div class="content-card">
                <div class="section-title">📱 輸入手機號碼</div>
                <p style="font-size:13px;color:#64748B;margin-bottom:16px;">輸入手機號碼查詢您的集點或加入會員</p>
                <input type="tel" id="phoneInput" placeholder="0912345678" maxlength="10" style="margin-bottom:14px;">
                <button class="btn btn-primary" onclick="lookupMember()">查詢 / 加入會員</button>
            </div>
        </div>

        <!-- 會員 View -->
        <div id="memberView">
            <div class="point-card">
                <div style="font-size:14px;font-weight:600;" id="memberName">會員</div>
                <div class="pts" id="memberPoints">0</div>
                <div class="label">可用點數</div>
                <div style="font-size:11px;opacity:0.7;margin-top:8px;" id="memberSince"></div>
            </div>

            <div class="content-card">
                <div class="section-title">📋 點數記錄</div>
                <div id="txHistory" style="font-size:13px;color:#94A3B8;">載入中...</div>
            </div>

            <div class="content-card">
                <div class="section-title">🎁 兌換商品</div>
                <div id="rewardsList"></div>
            </div>

            <button class="btn btn-outline" onclick="switchToLogin()" style="margin-top:12px;">🔄 切換帳號</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    const SUPABASE_URL = 'https://nssuisyvlrqnqfxupklb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zc3Vpc3l2bHJxbnFmeHVwa2xiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyOTAwMzUsImV4cCI6MjA4NDg2NjAzNX0.q_B6v3gf1TOCuAq7z0xIw10wDueCSJn0p37VzdMfmbc';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    var companyId = '';
    var currentMember = null;

    function showToast(msg) {
        var el = document.getElementById('toast');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(function() { el.style.display = 'none'; }, 2500);
    }

    function escapeHTML(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ===== 初始化 =====
    window.addEventListener('load', async function() {
        var params = new URLSearchParams(window.location.search);
        companyId = params.get('store') || params.get('company');
        if (!companyId) {
            document.getElementById('storeName').textContent = '缺少商店參數';
            return;
        }

        // 載入商店名稱
        try {
            var { data: co } = await sb.from('companies').select('name').eq('id', companyId).maybeSingle();
            if (co) document.getElementById('storeName').textContent = co.name;
            else document.getElementById('storeName').textContent = '商店不存在';
        } catch(e) { console.warn(e); }

        // 檢查 sessionStorage 是否有記住的手機
        var savedPhone = sessionStorage.getItem('loyalty_phone_' + companyId);
        if (savedPhone) {
            document.getElementById('phoneInput').value = savedPhone;
            await lookupMember();
        } else {
            document.getElementById('loginView').style.display = 'block';
        }
    });

    // ===== 查詢/加入會員 =====
    async function lookupMember() {
        var phone = document.getElementById('phoneInput').value.trim();
        if (!phone || phone.length < 9) {
            showToast('請輸入正確的手機號碼');
            return;
        }

        try {
            // 查詢現有會員
            var { data: member } = await sb.from('loyalty_members')
                .select('*')
                .eq('company_id', companyId)
                .eq('phone', phone)
                .maybeSingle();

            if (!member) {
                // 查詢歡迎點數設定
                var welcomePoints = 0;
                try {
                    var { data: settings } = await sb.from('loyalty_settings')
                        .select('welcome_points')
                        .eq('company_id', companyId)
                        .maybeSingle();
                    if (settings) welcomePoints = settings.welcome_points || 0;
                } catch(e) {}

                // 新增會員
                var { data: newMember, error } = await sb.from('loyalty_members')
                    .insert({
                        company_id: companyId,
                        phone: phone,
                        total_points: welcomePoints,
                        used_points: 0
                    })
                    .select()
                    .single();

                if (error) throw error;
                member = newMember;

                // 記錄歡迎點數
                if (welcomePoints > 0) {
                    await sb.from('loyalty_transactions').insert({
                        company_id: companyId,
                        member_id: member.id,
                        type: 'earn',
                        points: welcomePoints,
                        source: 'manual',
                        note: '新會員歡迎禮'
                    });
                }

                showToast('🎉 歡迎加入會員！' + (welcomePoints > 0 ? ' 獲得 ' + welcomePoints + ' 點' : ''));
            }

            currentMember = member;
            sessionStorage.setItem('loyalty_phone_' + companyId, phone);
            showMemberView();
        } catch(e) {
            console.error(e);
            showToast('❌ 查詢失敗，請重試');
        }
    }

    // ===== 顯示會員頁面 =====
    async function showMemberView() {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('memberView').style.display = 'block';

        document.getElementById('memberName').textContent = currentMember.name || currentMember.phone;
        document.getElementById('memberPoints').textContent = currentMember.available_points || 0;
        if (currentMember.member_since) {
            document.getElementById('memberSince').textContent = '會員自 ' + currentMember.member_since;
        }

        loadTransactions();
        loadRewards();
    }

    // ===== 載入點數記錄 =====
    async function loadTransactions() {
        var el = document.getElementById('txHistory');
        try {
            var { data: txns } = await sb.from('loyalty_transactions')
                .select('*')
                .eq('member_id', currentMember.id)
                .order('created_at', { ascending: false })
                .limit(10);

            if (!txns || txns.length === 0) {
                el.innerHTML = '<div style="text-align:center;padding:16px;color:#94A3B8;">尚無點數記錄</div>';
                return;
            }

            var html = '';
            txns.forEach(function(t) {
                var isEarn = t.type === 'earn';
                var dateStr = t.created_at ? new Date(t.created_at).toLocaleDateString('zh-TW', { timeZone: 'Asia/Taipei', month: 'numeric', day: 'numeric' }) : '';
                var sourceLabel = { order: '🛒 消費集點', booking: '📅 預約集點', manual: '🎁 手動' }[t.source] || t.source || '';
                html += '<div class="tx-row">';
                html += '<div>';
                html += '<div style="font-size:13px;font-weight:600;">' + escapeHTML(t.note || sourceLabel || (isEarn ? '獲得點數' : '兌換商品')) + '</div>';
                html += '<div style="font-size:11px;color:#94A3B8;">' + dateStr + (t.amount ? ' · $' + t.amount : '') + '</div>';
                html += '</div>';
                html += '<div style="font-size:15px;font-weight:800;color:' + (isEarn ? '#059669' : '#DC2626') + ';">' + (isEarn ? '+' : '') + t.points + '</div>';
                html += '</div>';
            });
            el.innerHTML = html;
        } catch(e) {
            el.innerHTML = '<div style="text-align:center;padding:16px;color:#94A3B8;">載入失敗</div>';
        }
    }

    // ===== 載入兌換商品 =====
    async function loadRewards() {
        var el = document.getElementById('rewardsList');
        try {
            var { data: rewards } = await sb.from('loyalty_rewards')
                .select('*')
                .eq('company_id', companyId)
                .eq('is_active', true)
                .order('sort_order');

            if (!rewards || rewards.length === 0) {
                el.innerHTML = '<div style="text-align:center;padding:16px;color:#94A3B8;">目前沒有兌換商品</div>';
                return;
            }

            var pts = currentMember.available_points || 0;
            var html = '';
            rewards.forEach(function(r) {
                var canRedeem = pts >= r.points_required;
                html += '<div class="reward-card" style="' + (canRedeem ? '' : 'opacity:0.5;') + '" onclick="' + (canRedeem ? "redeemReward('" + r.id + "'," + r.points_required + ",'" + escapeHTML(r.name).replace(/'/g, "\\'") + "')" : '') + '">';
                html += '<div style="font-size:28px;">🎁</div>';
                html += '<div style="flex:1;min-width:0;">';
                html += '<div style="font-size:14px;font-weight:700;">' + escapeHTML(r.name) + '</div>';
                if (r.description) html += '<div style="font-size:12px;color:#64748B;margin-top:2px;">' + escapeHTML(r.description) + '</div>';
                html += '</div>';
                html += '<div class="rpts">' + r.points_required + '點</div>';
                html += '</div>';
            });
            el.innerHTML = html;
        } catch(e) {
            el.innerHTML = '<div style="text-align:center;padding:16px;color:#94A3B8;">載入失敗</div>';
        }
    }

    // ===== 兌換商品 =====
    async function redeemReward(rewardId, pointsRequired, rewardName) {
        if (!currentMember) return;
        if (!confirm('確定要兌換「' + rewardName + '」（' + pointsRequired + '點）？')) return;

        try {
            // 重新讀取最新點數（避免重複兌換）
            var { data: fresh } = await sb.from('loyalty_members')
                .select('available_points, total_points, used_points')
                .eq('id', currentMember.id)
                .single();

            if (!fresh || fresh.available_points < pointsRequired) {
                showToast('❌ 點數不足');
                return;
            }

            // 更新 used_points
            await sb.from('loyalty_members')
                .update({ used_points: fresh.used_points + pointsRequired })
                .eq('id', currentMember.id);

            // 記錄兌換交易
            await sb.from('loyalty_transactions').insert({
                company_id: companyId,
                member_id: currentMember.id,
                type: 'redeem',
                points: -pointsRequired,
                source: 'manual',
                note: '兌換：' + rewardName
            });

            // 更新 UI
            currentMember.used_points = fresh.used_points + pointsRequired;
            currentMember.available_points = fresh.available_points - pointsRequired;
            document.getElementById('memberPoints').textContent = currentMember.available_points;
            showToast('🎉 兌換成功！請向店員出示');
            loadTransactions();
            loadRewards();
        } catch(e) {
            console.error(e);
            showToast('❌ 兌換失敗');
        }
    }

    function switchToLogin() {
        currentMember = null;
        sessionStorage.removeItem('loyalty_phone_' + companyId);
        document.getElementById('memberView').style.display = 'none';
        document.getElementById('loginView').style.display = 'block';
        document.getElementById('phoneInput').value = '';
    }
    </script>
</body>
</html>
