<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📍 外勤/業務 - 員工服務中心</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loadingPage" class="loading-screen">
        <div class="spinner"></div>
        <p>系統載入中...</p>
    </div>

    <div class="container">
        <div id="mainPage" class="page active">
            <button class="btn btn-secondary" onclick="window.location.href='index.html'" style="width:auto;margin-bottom:10px;">← 返回</button>
            <div class="checkin-page">
                <h2>📍 外勤/業務</h2>

                <!-- 三個 tab 切換 -->
                <div id="fieldSalesTabs" style="display:flex;gap:4px;margin-bottom:16px;background:#F1F5F9;border-radius:10px;padding:3px;">
                    <button class="fwsTab active-tab" onclick="switchTab('fieldwork',this)" style="flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;background:#fff;color:#4F46E5;box-shadow:0 1px 4px rgba(0,0,0,0.08);">📍 外勤打卡</button>
                    <button class="fwsTab" onclick="switchTab('sales',this)" style="flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;background:transparent;color:#94A3B8;">📊 業務週報</button>
                    <button class="fwsTab" onclick="switchTab('clients',this)" style="flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;background:transparent;color:#94A3B8;">👥 客戶管理</button>
                </div>

                <!-- ====== Tab 1: 外勤打卡 ====== -->
                <div id="fwTabFieldwork">
                    <div class="lunch-summary" id="fwSummaryCard">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                            <span style="font-weight:700;font-size:14px;">今日外勤</span>
                            <span id="fwSummaryDate" style="font-size:12px;color:#64748B;"></span>
                        </div>
                        <div style="display:flex;gap:8px;">
                            <div style="flex:1;text-align:center;padding:10px;background:#DBEAFE;border-radius:10px;">
                                <div style="font-size:20px;font-weight:900;color:#1E40AF;" id="fwStationCount">0</div>
                                <div style="font-size:10px;font-weight:600;color:#1E40AF;">站次</div>
                            </div>
                            <div style="flex:1;text-align:center;padding:10px;background:#D1FAE5;border-radius:10px;">
                                <div style="font-size:20px;font-weight:900;color:#059669;" id="fwTotalHours">0.0</div>
                                <div style="font-size:10px;font-weight:600;color:#059669;">工時(h)</div>
                            </div>
                            <div style="flex:1;text-align:center;padding:10px;background:#FEF3C7;border-radius:10px;">
                                <div style="font-size:20px;font-weight:900;color:#92400E;" id="fwTotalKm">0</div>
                                <div style="font-size:10px;font-weight:600;color:#92400E;">里程(km)</div>
                            </div>
                        </div>
                    </div>

                    <div id="fwLogList" style="margin-bottom:12px;"></div>

                    <button class="btn btn-primary" id="fwAddBtn" onclick="showFieldWorkForm()" style="font-size:15px;padding:14px;border-radius:14px;">+ 新增外勤打卡</button>

                    <div id="fwFormArea" style="display:none;margin-top:16px;">
                        <div class="binding-card">
                            <h3 style="margin-bottom:12px;" id="fwFormTitle">新增外勤打卡</h3>
                            <div class="form-group">
                                <label>客戶 *</label>
                                <div style="display:flex;gap:8px;">
                                    <select id="fwClientSelect" style="flex:1;padding:12px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;">
                                        <option value="">-- 選擇客戶 --</option>
                                    </select>
                                    <button type="button" onclick="showQuickAddClientModal()" style="padding:12px 16px;border:none;border-radius:10px;background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#fff;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap;">+ 新增</button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>服務項目</label>
                                <div id="fwServiceHierarchy"></div>
                            </div>
                            <div id="fwArriveSection">
                                <button class="btn btn-success" onclick="fwArriveCheckin()" id="fwArriveBtn" style="font-size:14px;padding:14px;">📍 到達打卡</button>
                                <div id="fwArriveInfo" style="display:none;padding:10px;background:#D1FAE5;border-radius:10px;margin-top:8px;font-size:13px;color:#065F46;"></div>
                            </div>
                            <div id="fwContentSection" style="display:none;margin-top:12px;">
                                <div class="form-group">
                                    <label>工作內容</label>
                                    <textarea id="fwWorkContent" rows="3" placeholder="描述今日工作內容..." style="width:100%;padding:12px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;resize:vertical;box-sizing:border-box;"></textarea>
                                </div>
                                <div class="form-group">
                                    <label>拍照（最多 3 張）</label>
                                    <div id="fwPhotoPreview" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;"></div>
                                    <button class="btn btn-secondary" onclick="fwCapturePhoto()" id="fwPhotoBtn" style="font-size:13px;padding:10px;">📷 拍照</button>
                                    <input type="file" id="fwFileInput" accept="image/*" capture="environment" style="display:none;" onchange="fwHandleFileSelect(event)">
                                </div>
                                <div class="form-group">
                                    <label>里程（公里）</label>
                                    <input type="number" id="fwMileage" placeholder="0" min="0" step="0.1" style="width:100%;padding:12px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;box-sizing:border-box;">
                                </div>
                                <div class="form-group">
                                    <label>客戶簽名</label>
                                    <div id="fwSignatureArea" style="position:relative;">
                                        <canvas id="fwSignatureCanvas" width="320" height="160" style="border:2px dashed #CBD5E1;border-radius:10px;background:#fff;touch-action:none;width:100%;"></canvas>
                                        <div style="display:flex;gap:8px;margin-top:6px;">
                                            <button class="btn btn-secondary" onclick="fwClearSignature()" style="flex:1;font-size:12px;padding:8px;">清除簽名</button>
                                        </div>
                                    </div>
                                    <div id="fwSignatureStatus" style="font-size:12px;color:#94A3B8;margin-top:4px;"></div>
                                </div>
                                <div class="form-group">
                                    <label>備註</label>
                                    <input type="text" id="fwNotes" placeholder="選填" style="width:100%;padding:12px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;box-sizing:border-box;">
                                </div>
                                <button class="btn btn-primary" onclick="fwLeaveCheckin()" id="fwLeaveBtn" style="font-size:14px;padding:14px;margin-top:8px;">📍 離開打卡 & 送出</button>
                                <div id="fwLeaveInfo" style="display:none;padding:10px;background:#DBEAFE;border-radius:10px;margin-top:8px;font-size:13px;color:#1E40AF;"></div>
                            </div>
                            <button class="btn btn-secondary" onclick="cancelFieldWorkForm()" style="margin-top:12px;font-size:13px;">取消</button>
                        </div>
                    </div>
                </div><!-- /fwTabFieldwork -->

                <!-- ====== Tab 2: 業務週報 ====== -->
                <div id="fwTabSales" style="display:none;">
                    <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;">
                        <button onclick="salesChangeWeek(-1)" style="padding:8px 14px;border:1px solid #E2E8F0;border-radius:10px;background:#fff;cursor:pointer;font-size:16px;">←</button>
                        <span id="salesWeekLabel" style="font-weight:700;font-size:14px;min-width:180px;text-align:center;"></span>
                        <button onclick="salesChangeWeek(1)" style="padding:8px 14px;border:1px solid #E2E8F0;border-radius:10px;background:#fff;cursor:pointer;font-size:16px;">→</button>
                    </div>
                    <div class="lunch-summary" id="salesProgressCard">
                        <h3 style="margin-bottom:12px;font-size:14px;">🎯 本週進度</h3>
                        <div style="margin-bottom:12px;">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                                <span style="font-size:13px;">📞 電話拜訪</span>
                                <span id="salesCallText" style="font-size:13px;font-weight:700;">0 / 0</span>
                            </div>
                            <div style="width:100%;height:8px;background:#E2E8F0;border-radius:4px;overflow:hidden;">
                                <div id="salesCallBar" style="height:100%;background:linear-gradient(90deg,#4F46E5,#7C3AED);border-radius:4px;transition:width 0.3s;width:0%;"></div>
                            </div>
                        </div>
                        <div>
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                                <span style="font-size:13px;">🏢 實地拜訪</span>
                                <span id="salesVisitText" style="font-size:13px;font-weight:700;">0 / 0</span>
                            </div>
                            <div style="width:100%;height:8px;background:#E2E8F0;border-radius:4px;overflow:hidden;">
                                <div id="salesVisitBar" style="height:100%;background:linear-gradient(90deg,#059669,#10B981);border-radius:4px;transition:width 0.3s;width:0%;"></div>
                            </div>
                        </div>
                    </div>
                    <div style="display:flex;gap:8px;margin-bottom:16px;">
                        <button onclick="showSalesActivityModal('call')" style="flex:1;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#fff;font-weight:700;font-size:14px;cursor:pointer;">📞 記錄電話</button>
                        <button onclick="showSalesActivityModal('visit')" style="flex:1;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#059669,#10B981);color:#fff;font-weight:700;font-size:14px;cursor:pointer;">🏢 記錄拜訪</button>
                    </div>
                    <div id="salesActivityList"></div>
                </div><!-- /fwTabSales -->

                <!-- ====== Tab 3: 客戶管理 ====== -->
                <div id="fwTabClients" style="display:none;">
                    <div style="display:flex;gap:8px;margin-bottom:12px;">
                        <input type="text" id="clientSearch" placeholder="搜尋公司名稱..." oninput="filterClientList()" style="flex:1;padding:10px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;">
                        <button class="btn btn-primary" onclick="showClientModal()" style="white-space:nowrap;font-size:13px;padding:10px 16px;">+ 新增</button>
                    </div>
                    <div id="clientList">
                        <p style="text-align:center;color:#94A3B8;font-size:13px;padding:16px;">載入中...</p>
                    </div>

                    <!-- 服務項目管理（僅管理員可見） -->
                    <div id="serviceItemSection" class="lunch-summary" style="margin-top:20px;display:none;">
                        <h3 style="margin-bottom:10px;">🔧 服務項目管理</h3>
                        <div id="serviceItemList"></div>
                        <div style="display:flex;gap:8px;margin-top:10px;">
                            <input type="text" id="newServiceItemName" placeholder="新增服務項目名稱" style="flex:1;padding:10px;border:1px solid #E2E8F0;border-radius:10px;font-size:13px;">
                            <button class="btn btn-success" onclick="addServiceItem()" style="font-size:12px;padding:8px 14px;white-space:nowrap;">新增</button>
                        </div>
                    </div>
                </div><!-- /fwTabClients -->

            </div>
        </div>

        <!-- 新增業務活動 Modal -->
        <div id="salesActivityModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;padding:20px;">
            <div style="background:#fff;border-radius:16px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;padding:24px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                    <h3 id="salesModalTitle" style="margin:0;font-size:18px;">📞 記錄電話拜訪</h3>
                    <button onclick="closeSalesActivityModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#94A3B8;padding:0;line-height:1;">×</button>
                </div>
                <input type="hidden" id="saType" value="call">
                <div class="form-group">
                    <label>客戶 *</label>
                    <div style="display:flex;gap:8px;">
                        <select id="saClientSelect" style="flex:1;padding:12px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;">
                            <option value="">-- 選擇客戶 --</option>
                        </select>
                        <button type="button" onclick="showQuickAddClientModal()" style="padding:12px 16px;border:none;border-radius:10px;background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#fff;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap;">+ 新增</button>
                    </div>
                </div>
                <div class="form-group" id="saProductGroup">
                    <label>服務項目</label>
                    <div id="saServiceHierarchy"></div>
                </div>
                <div class="form-group">
                    <label>說明</label>
                    <textarea id="saDescription" rows="2" placeholder="選填" style="width:100%;padding:12px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;resize:vertical;box-sizing:border-box;"></textarea>
                </div>
                <div class="form-group">
                    <label>時長（分鐘）</label>
                    <input type="number" id="saDuration" placeholder="例：30" min="0" style="width:100%;padding:12px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;box-sizing:border-box;">
                </div>
                <div class="form-group">
                    <label>結果</label>
                    <select id="saResult" style="width:100%;padding:12px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;">
                        <option value="">-- 選擇結果 --</option>
                        <option value="interested">🟢 有興趣</option>
                        <option value="follow-up">🟡 需追蹤</option>
                        <option value="closed">🎉 成交</option>
                        <option value="rejected">🔴 拒絕</option>
                        <option value="no-answer">⚪ 未接</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>備註</label>
                    <input type="text" id="saNotes" placeholder="選填" style="width:100%;padding:12px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;box-sizing:border-box;">
                </div>
                <div style="display:flex;gap:8px;margin-top:16px;">
                    <button onclick="closeSalesActivityModal()" style="flex:1;padding:14px;border:1px solid #E2E8F0;border-radius:10px;background:#fff;font-weight:600;font-size:14px;cursor:pointer;color:#64748B;">取消</button>
                    <button onclick="saveSalesActivity()" style="flex:1;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#059669,#10B981);color:#fff;font-weight:700;font-size:14px;cursor:pointer;">💾 儲存</button>
                </div>
            </div>
        </div>

        <!-- 快速新增客戶 Modal -->
        <div id="quickAddClientModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px;">
            <div style="background:#fff;border-radius:16px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;padding:24px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                    <h3 style="margin:0;font-size:18px;">🏢 快速新增客戶</h3>
                    <button onclick="closeQuickAddClientModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#94A3B8;padding:0;line-height:1;">×</button>
                </div>
                <div class="form-group">
                    <label>公司名稱 *</label>
                    <input type="text" id="qaClientName" placeholder="例：台北科技有限公司" style="width:100%;padding:12px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;box-sizing:border-box;">
                </div>
                <div class="form-group">
                    <label>聯絡人</label>
                    <input type="text" id="qaClientContact" placeholder="例：王小明" style="width:100%;padding:12px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;box-sizing:border-box;">
                </div>
                <div class="form-group">
                    <label>電話</label>
                    <input type="tel" id="qaClientPhone" placeholder="例：02-12345678" style="width:100%;padding:12px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;box-sizing:border-box;">
                </div>
                <div class="form-group">
                    <label>地址 <span style="font-size:11px;color:#94A3B8;font-weight:400;">或使用定位，擇一即可</span></label>
                    <input type="text" id="qaClientAddress" placeholder="輸入地址" style="width:100%;padding:12px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;box-sizing:border-box;">
                    <input type="hidden" id="qaClientLat">
                    <input type="hidden" id="qaClientLng">
                    <button type="button" onclick="qaGetGPS()" style="width:100%;margin-top:8px;padding:10px;border:1px solid #4F46E5;border-radius:10px;background:#EEF2FF;color:#4F46E5;font-weight:600;font-size:13px;cursor:pointer;">📍 用目前位置取代地址</button>
                    <div id="qaGpsStatus" style="font-size:12px;color:#059669;margin-top:4px;display:none;"></div>
                </div>
                <div style="display:flex;gap:8px;margin-top:16px;">
                    <button onclick="closeQuickAddClientModal()" style="flex:1;padding:14px;border:1px solid #E2E8F0;border-radius:10px;background:#fff;font-weight:600;font-size:14px;cursor:pointer;color:#64748B;">取消</button>
                    <button onclick="saveQuickClient()" style="flex:1;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#059669,#10B981);color:#fff;font-weight:700;font-size:14px;cursor:pointer;">💾 儲存</button>
                </div>
            </div>
        </div>

        <!-- 客戶編輯 Modal（完整版，管理員用） -->
        <div id="clientModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:999;overflow-y:auto;">
            <div style="background:#fff;margin:40px auto;max-width:500px;border-radius:16px;padding:24px;">
                <h3 id="clientModalTitle" style="margin-bottom:16px;">新增客戶</h3>
                <input type="hidden" id="clientEditId">
                <div class="form-group"><label>公司名稱 *</label><input type="text" id="clientCompanyName" placeholder="公司名稱"></div>
                <div class="form-group"><label>聯絡人</label><input type="text" id="clientContactName" placeholder="聯絡人姓名"></div>
                <div class="form-group"><label>電話</label><input type="text" id="clientPhone" placeholder="電話"></div>
                <div class="form-group"><label>地址</label><input type="text" id="clientAddress" placeholder="地址"></div>
                <div class="form-group">
                    <label>GPS 座標</label>
                    <div style="display:flex;gap:8px;">
                        <input type="text" id="clientLat" placeholder="緯度" style="flex:1;">
                        <input type="text" id="clientLng" placeholder="經度" style="flex:1;">
                    </div>
                    <button class="btn btn-secondary" onclick="getClientGPS()" style="margin-top:6px;font-size:12px;padding:8px;">📍 抓取目前位置</button>
                </div>
                <div class="form-group">
                    <label>分類</label>
                    <select id="clientCategory" style="width:100%;padding:10px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;">
                        <option value="general">一般</option>
                        <option value="vip">VIP ⭐</option>
                    </select>
                </div>
                <div class="form-group"><label>產業別</label><input type="text" id="clientIndustry" placeholder="例：科技業、製造業"></div>
                <div class="form-group"><label>備註</label><textarea id="clientNotes" rows="2" placeholder="備註" style="width:100%;padding:10px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;resize:vertical;box-sizing:border-box;"></textarea></div>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-success" onclick="saveClient()" style="flex:1;">💾 儲存</button>
                    <button class="btn btn-secondary" onclick="closeClientModal()" style="flex:1;">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        // ===== 權限判斷 =====
        function isAdminUser() {
            return currentEmployee?.role === 'admin' || currentEmployee?.role === 'platform_admin';
        }

        // ===== Tab 切換 =====
        function switchTab(type, btn) {
            document.getElementById('fwTabFieldwork').style.display = type === 'fieldwork' ? 'block' : 'none';
            document.getElementById('fwTabSales').style.display = type === 'sales' ? 'block' : 'none';
            document.getElementById('fwTabClients').style.display = type === 'clients' ? 'block' : 'none';
            document.querySelectorAll('.fwsTab').forEach(t => {
                t.style.background = 'transparent';
                t.style.color = '#94A3B8';
                t.style.boxShadow = 'none';
            });
            if (btn) {
                btn.style.background = '#fff';
                btn.style.color = '#4F46E5';
                btn.style.boxShadow = '0 1px 4px rgba(0,0,0,0.08)';
            }
            if (type === 'fieldwork') initFieldWorkPage();
            if (type === 'sales') { loadClients().then(() => initSalesPage()); }
            if (type === 'clients') loadClientList();
        }

        // ===== 外勤打卡 =====
        let fwClients = [];
        let fwServiceItems = [];
        let fwLogs = [];
        let fwCurrentLogId = null;
        let fwPhotoUrls = [];
        let fwSignatureCtx = null;
        let fwSigning = false;

        async function initFieldWorkPage() {
            const dateEl = document.getElementById('fwSummaryDate');
            if (dateEl) dateEl.textContent = getTaiwanDate();
            fwPhotoUrls = [];
            fwCurrentLogId = null;
            try {
                await Promise.all([loadClients(), loadServiceItems(), loadFieldWorkLogs()]);
            } catch(e) {
                console.error('外勤頁面初始化失敗', e);
                showToast('⚠️ 部分資料載入失敗，請重新整理');
            }
        }

        async function loadClients() {
            try {
                let query = sb.from('clients').select('*').eq('is_active', true);
                if (window.currentCompanyId) query = query.eq('company_id', window.currentCompanyId);
                if (!isAdminUser() && currentEmployee?.id) {
                    query = query.eq('employee_id', currentEmployee.id);
                }
                const { data } = await query.order('company_name');
                fwClients = data || [];
                // 更新外勤打卡下拉
                const sel = document.getElementById('fwClientSelect');
                if (sel) {
                    sel.innerHTML = '<option value="">-- 選擇客戶 --</option>' +
                        fwClients.map(c => `<option value="${c.id}">${escapeHTML(c.company_name)}${c.category === 'vip' ? ' ⭐' : ''}</option>`).join('');
                }
            } catch(e) { console.error('載入客戶失敗', e); }
        }

        // ===== 快速新增客戶 =====
        function showQuickAddClientModal() {
            const modal = document.getElementById('quickAddClientModal');
            modal.style.display = 'flex';
            document.getElementById('qaClientName').value = '';
            document.getElementById('qaClientContact').value = '';
            document.getElementById('qaClientPhone').value = '';
            document.getElementById('qaClientAddress').value = '';
            document.getElementById('qaClientLat').value = '';
            document.getElementById('qaClientLng').value = '';
            qaGetGPS();
        }

        function closeQuickAddClientModal() {
            document.getElementById('quickAddClientModal').style.display = 'none';
        }

        async function qaGetGPS() {
            const statusEl = document.getElementById('qaGpsStatus');
            try {
                const loc = await getGPS();
                document.getElementById('qaClientLat').value = loc.latitude.toFixed(6);
                document.getElementById('qaClientLng').value = loc.longitude.toFixed(6);
                if (statusEl) { statusEl.textContent = '✅ 已取得定位'; statusEl.style.display = 'block'; }
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${loc.latitude}&lon=${loc.longitude}&format=json&accept-language=zh-TW`);
                    const geo = await res.json();
                    if (geo.display_name) {
                        document.getElementById('qaClientAddress').value = geo.display_name.split(',').slice(0, 3).join('');
                        if (statusEl) statusEl.textContent = '✅ 已取得定位及地址';
                    }
                } catch(e) {}
            } catch(e) {
                console.warn('GPS 取得失敗', e);
                showToast('⚠️ 無法取得位置，請手動輸入地址');
            }
        }

        async function saveQuickClient() {
            const name = document.getElementById('qaClientName').value.trim();
            if (!name) return showToast('請輸入公司名稱');

            const record = {
                company_name: name,
                contact_person: document.getElementById('qaClientContact').value.trim() || null,
                phone: document.getElementById('qaClientPhone').value.trim() || null,
                address: document.getElementById('qaClientAddress').value.trim() || null,
                latitude: parseFloat(document.getElementById('qaClientLat').value) || null,
                longitude: parseFloat(document.getElementById('qaClientLng').value) || null,
                is_active: true
            };
            if (window.currentCompanyId) record.company_id = window.currentCompanyId;
            if (currentEmployee?.id) record.employee_id = currentEmployee.id;

            try {
                const { data, error } = await sb.from('clients').insert(record).select().single();
                if (error) throw error;

                showToast('✅ 客戶已新增');
                closeQuickAddClientModal();

                await loadClients();
                const fwSel = document.getElementById('fwClientSelect');
                if (fwSel) fwSel.value = data.id;
                const saSel = document.getElementById('saClientSelect');
                if (saSel && document.getElementById('salesActivityModal')?.style.display === 'flex') {
                    saSel.innerHTML = '<option value="">-- 選擇客戶 --</option>' +
                        fwClients.map(c => `<option value="${c.id}">${escapeHTML(c.company_name)}${c.category === 'vip' ? ' ⭐' : ''}</option>`).join('');
                    saSel.value = data.id;
                }
            } catch(e) {
                console.error(e);
                showToast('❌ 新增失敗：' + friendlyError(e));
            }
        }

        // ===== 服務項目 =====
        async function loadServiceItems() {
            try {
                const { data } = await sb.from('service_items').select('*').eq('is_active', true).order('name');
                fwServiceItems = data || [];
                renderFwServiceHierarchy();
            } catch(e) { console.error('載入服務項目失敗', e); }

        function isUUIDCode(str) {
            return str && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(str);
        }

        function renderFwItemCard(s, on) {
            return `<div class="fwItemCard" data-id="${s.id}" data-selected="${on ? 'true' : 'false'}" onclick="toggleProductCard(this)" style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:${on ? '#F5F3FF' : '#fff'};border:2px solid ${on ? '#4F46E5' : '#E5E7EB'};border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;">
                <div style="width:22px;height:22px;border:2px solid ${on ? '#4F46E5' : '#CBD5E1'};border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:${on ? '#4F46E5' : '#fff'};color:#fff;font-size:14px;transition:all 0.2s;">${on ? '✓' : ''}</div>
                <span style="flex:1;">${escapeHTML(s.name)}</span>
                <span onclick="event.stopPropagation();editFwItem('${s.id}')" style="font-size:14px;opacity:0.4;padding:2px;">✏️</span>
            </div>`;
        }

        function renderFwServiceHierarchy(selectedItems) {
            const el = document.getElementById('fwServiceHierarchy');
            if (!el) return;
            selectedItems = selectedItems || [];
            const categories = fwServiceItems.filter(s => s.code === 'CAT');
            const childrenMap = {};
            const uncategorized = [];
            fwServiceItems.forEach(s => {
                if (s.code === 'CAT') return;
                if (isUUIDCode(s.code)) {
                    if (!childrenMap[s.code]) childrenMap[s.code] = [];
                    childrenMap[s.code].push(s);
                } else {
                    uncategorized.push(s);
                }
            });
            let html = '';
            categories.forEach(cat => {
                const children = childrenMap[cat.id] || [];
                html += `<div style="margin-bottom:14px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                        <div style="display:flex;align-items:center;gap:6px;">
                            <span style="font-size:14px;font-weight:700;color:#0F172A;">${escapeHTML(cat.name)}</span>
                            <span onclick="editFwCategory('${cat.id}')" style="font-size:14px;cursor:pointer;opacity:0.4;">✏️</span>
                        </div>
                        <button type="button" onclick="toggleFwAddRow('fwProdAdd_${cat.id}','fwNewProd_${cat.id}')" style="padding:4px 12px;border:1px solid #059669;border-radius:8px;background:#ECFDF5;color:#059669;font-weight:700;font-size:12px;cursor:pointer;">+ 新增</button>
                    </div>
                    <div id="fwEditCat_${cat.id}" style="display:none;margin-bottom:8px;">
                        <div style="display:flex;gap:6px;">
                            <input id="fwEditCatName_${cat.id}" value="${escapeHTML(cat.name)}" style="flex:1;padding:8px;border:1px solid #E2E8F0;border-radius:8px;font-size:13px;">
                            <button onclick="saveFwCategoryEdit('${cat.id}')" style="padding:8px 12px;border:none;border-radius:8px;background:#4F46E5;color:#fff;font-weight:700;font-size:12px;cursor:pointer;">儲存</button>
                            <button onclick="deleteFwItem('${cat.id}')" style="padding:8px 12px;border:none;border-radius:8px;background:#DC2626;color:#fff;font-weight:700;font-size:12px;cursor:pointer;">刪除</button>
                        </div>
                    </div>
                    <div id="fwProdAdd_${cat.id}" style="display:none;margin-bottom:8px;">
                        <div style="display:flex;gap:6px;">
                            <input id="fwNewProd_${cat.id}" placeholder="新項目名稱" style="flex:1;padding:8px;border:1px solid #E2E8F0;border-radius:8px;font-size:13px;">
                            <button onclick="saveFwProduct('${cat.id}')" style="padding:8px 14px;border:none;border-radius:8px;background:#059669;color:#fff;font-weight:700;font-size:13px;cursor:pointer;">新增</button>
                        </div>
                    </div>
                    <div style="display:flex;flex-wrap:wrap;gap:8px;">
                        ${children.length > 0 ? children.map(s => renderFwItemCard(s, selectedItems.includes(s.id))).join('') : '<span style="color:#94A3B8;font-size:12px;">尚無項目，請點 +新增</span>'}
                    </div>
                </div>`;
            });
            if (uncategorized.length > 0) {
                html += `<div style="margin-bottom:14px;">
                    <div style="font-size:14px;font-weight:700;color:#0F172A;margin-bottom:6px;">其他</div>
                    <div style="display:flex;flex-wrap:wrap;gap:8px;">
                        ${uncategorized.map(s => renderFwItemCard(s, selectedItems.includes(s.id))).join('')}
                    </div>
                </div>`;
            }
            html += `<div id="fwCatAddRow" style="display:none;margin-bottom:8px;">
                <div style="display:flex;gap:6px;">
                    <input id="fwNewCatName" placeholder="新服務類型名稱" style="flex:1;padding:8px;border:1px solid #E2E8F0;border-radius:8px;font-size:13px;">
                    <button onclick="saveFwCategory()" style="padding:8px 14px;border:none;border-radius:8px;background:#4F46E5;color:#fff;font-weight:700;font-size:13px;cursor:pointer;">新增</button>
                </div>
            </div>
            <button type="button" onclick="toggleFwAddRow('fwCatAddRow','fwNewCatName')" style="padding:8px 14px;border:2px dashed #CBD5E1;border-radius:10px;background:#fff;color:#64748B;font-weight:700;font-size:13px;cursor:pointer;width:100%;">+ 新增服務類型</button>`;
            el.innerHTML = html;
        }

        function toggleFwAddRow(rowId, inputId) {
            const row = document.getElementById(rowId);
            if (!row) return;
            const show = row.style.display === 'none';
            row.style.display = show ? 'block' : 'none';
            if (show && inputId) document.getElementById(inputId)?.focus();
        }

        async function saveFwCategory() {
            const input = document.getElementById('fwNewCatName');
            const name = input?.value.trim();
            if (!name) return showToast('請輸入服務類型名稱');
            try {
                const { data, error } = await sb.from('service_items').insert({ name, code: 'CAT', is_active: true }).select().single();
                if (error) throw error;
                input.value = '';
                document.getElementById('fwCatAddRow').style.display = 'none';
                fwServiceItems.push(data);

                renderSaServiceHierarchy();
                showToast('✅ 已新增服務類型「' + name + '」');
            } catch(e) { showToast('❌ 新增失敗：' + friendlyError(e)); }
        }

        async function saveFwProduct(catId) {
            const input = document.getElementById('fwNewProd_' + catId);
            const name = input?.value.trim();
            if (!name) return showToast('請輸入項目名稱');
            try {

        function editFwCategory(catId) {
            const row = document.getElementById('fwEditCat_' + catId);
            if (!row) return;
            const show = row.style.display === 'none';
            row.style.display = show ? 'block' : 'none';
            if (show) document.getElementById('fwEditCatName_' + catId)?.focus();
        }

        async function saveFwCategoryEdit(catId) {
            const input = document.getElementById('fwEditCatName_' + catId);
            const name = input?.value.trim();
            if (!name) return showToast('名稱不可為空');
            try {
                const { error } = await sb.from('service_items').update({ name }).eq('id', catId);
                if (error) throw error;
                const item = fwServiceItems.find(s => s.id === catId);
                if (item) item.name = name;
                renderFwServiceHierarchy();
                showToast('✅ 已更新');
            } catch(e) { showToast('❌ 更新失敗：' + friendlyError(e)); }
        }

        function editFwItem(itemId) {
            const item = fwServiceItems.find(s => s.id === itemId);
            if (!item) return;
            const existing = document.getElementById('fwItemEditOverlay');
            if (existing) existing.remove();
            const overlay = document.createElement('div');
            overlay.id = 'fwItemEditOverlay';
            overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:9999;display:flex;align-items:flex-end;justify-content:center;';
            overlay.innerHTML = `<div style="background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;">
                <div style="font-size:15px;font-weight:800;margin-bottom:12px;">編輯項目</div>
                <input id="fwEditItemName" value="${escapeHTML(item.name)}" style="width:100%;padding:10px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;box-sizing:border-box;margin-bottom:12px;">
                <div style="display:flex;gap:8px;">
                    <button onclick="saveFwItemEdit('${itemId}')" style="flex:1;padding:12px;border:none;border-radius:10px;background:#4F46E5;color:#fff;font-weight:700;font-size:14px;cursor:pointer;">儲存</button>
                    <button onclick="deleteFwItem('${itemId}')" style="padding:12px 16px;border:none;border-radius:10px;background:#DC2626;color:#fff;font-weight:700;font-size:14px;cursor:pointer;">🗑️</button>
                    <button onclick="document.getElementById('fwItemEditOverlay').remove()" style="padding:12px 16px;border:1px solid #E2E8F0;border-radius:10px;background:#fff;font-weight:700;font-size:14px;cursor:pointer;">取消</button>
                </div>
            </div>`;
            overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
            document.body.appendChild(overlay);
            document.getElementById('fwEditItemName')?.focus();
        }

        async function saveFwItemEdit(itemId) {
            const input = document.getElementById('fwEditItemName');
            const name = input?.value.trim();
            if (!name) return showToast('名稱不可為空');
            try {
                const { error } = await sb.from('service_items').update({ name }).eq('id', itemId);
                if (error) throw error;
                const item = fwServiceItems.find(s => s.id === itemId);
                if (item) item.name = name;
                document.getElementById('fwItemEditOverlay')?.remove();
                renderFwServiceHierarchy();
                renderSaServiceHierarchy();
                showToast('✅ 已更新');
            } catch(e) { showToast('❌ 更新失敗：' + friendlyError(e)); }
        }

        async function deleteFwItem(itemId) {
            const item = fwServiceItems.find(s => s.id === itemId);
            if (!item) return;
            const isCat = item.code === 'CAT';
            const msg = isCat ? `確定刪除「${item.name}」及其下所有子項目？` : `確定刪除「${item.name}」？`;
            if (!confirm(msg)) return;
            try {
                await sb.from('service_items').update({ is_active: false }).eq('id', itemId);
                if (isCat) {
                    await sb.from('service_items').update({ is_active: false }).eq('code', itemId);
                    fwServiceItems = fwServiceItems.filter(s => s.id !== itemId && s.code !== itemId);
                } else {
                    fwServiceItems = fwServiceItems.filter(s => s.id !== itemId);
                }
                document.getElementById('fwItemEditOverlay')?.remove();
                renderFwServiceHierarchy();
                renderSaServiceHierarchy();
                showToast('✅ 已刪除');
            } catch(e) { showToast('❌ 刪除失敗：' + friendlyError(e)); }
        }

        function getSelectedFwItems() {
            const ids = [];
            document.querySelectorAll('.fwItemCard').forEach(card => {
                if (card.dataset.selected === 'true') ids.push(card.dataset.id);
            });
            return ids;
        }

        function toggleProductCard(card) {
            const box = card.querySelector('div');
            const isOn = card.dataset.selected === 'true';
            if (isOn) {
                card.dataset.selected = 'false';
                card.style.borderColor = '#E5E7EB'; card.style.background = '#fff';
                box.style.borderColor = '#CBD5E1'; box.style.background = '#fff'; box.textContent = '';
            } else {
                card.dataset.selected = 'true';
                card.style.borderColor = '#4F46E5'; card.style.background = '#F5F3FF';
                box.style.borderColor = '#4F46E5'; box.style.background = '#4F46E5'; box.textContent = '✓';
            }
        }

        // ===== 報工紀錄 =====
        async function loadFieldWorkLogs() {
            if (!currentEmployee) return;
            try {
                const todayStr = getTaiwanDate();
                const { data } = await sb.from('field_work_logs')
                    .select('*, clients(company_name), service_items(name)')
                    .eq('employee_id', currentEmployee.id)
                    .eq('work_date', todayStr)
                    .order('created_at', { ascending: false });
                fwLogs = data || [];
                renderFieldWorkLogs();
                updateFieldWorkSummary();
            } catch(e) { console.error('載入報工紀錄失敗', e); }
        }

        function updateFieldWorkSummary() {
            document.getElementById('fwStationCount').textContent = fwLogs.length;
            const totalH = fwLogs.reduce((s, l) => s + (l.work_hours || 0), 0);
            document.getElementById('fwTotalHours').textContent = totalH.toFixed(1);
            const totalKm = fwLogs.reduce((s, l) => s + (l.mileage || 0), 0);
            document.getElementById('fwTotalKm').textContent = Math.round(totalKm);
        }

        function renderFieldWorkLogs() {
            const el = document.getElementById('fwLogList');
            if (!el) return;
            if (fwLogs.length === 0) {
                el.innerHTML = '<p style="text-align:center;color:#94A3B8;font-size:13px;padding:16px;">今日尚無外勤紀錄</p>';
                return;
            }
            el.innerHTML = fwLogs.map(log => {
                const statusMap = { draft:'🟡 進行中', submitted:'🔵 已送出', approved:'🟢 已核准', rejected:'🔴 退回' };
                const statusLabel = statusMap[log.status] || log.status;
                const clientName = log.clients?.company_name || '未選擇客戶';
                const serviceName = log.service_items?.name || '';
                const arriveT = log.arrive_time ? new Date(log.arrive_time).toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' }) : '--:--';
                const leaveT = log.leave_time ? new Date(log.leave_time).toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' }) : '--:--';
                const hours = log.work_hours ? log.work_hours.toFixed(1) + 'h' : '';
                return `<div style="background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:14px;margin-bottom:8px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                        <span style="font-weight:700;font-size:14px;">${escapeHTML(clientName)}</span>
                        <span style="font-size:12px;">${statusLabel}</span>
                    </div>
                    <div style="font-size:12px;color:#64748B;">
                        ${serviceName ? '<span style="background:#EFF6FF;color:#2563EB;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;">' + escapeHTML(serviceName) + '</span> ' : ''}
                        ${arriveT} → ${leaveT} ${hours ? '(' + hours + ')' : ''}
                        ${log.mileage ? ' · ' + log.mileage + 'km' : ''}
                    </div>
                    ${log.work_content ? '<div style="font-size:12px;color:#475569;margin-top:6px;white-space:pre-wrap;">' + escapeHTML(log.work_content).substring(0, 80) + '</div>' : ''}
                    ${log.status === 'draft' ? '<button class="btn btn-primary" onclick="resumeFieldWork(\'' + log.id + '\')" style="font-size:12px;padding:8px;margin-top:8px;">繼續填寫</button>' : ''}
                </div>`;
            }).join('');
        }

        function showFieldWorkForm() {
            fwCurrentLogId = null;
            fwPhotoUrls = [];
            document.getElementById('fwFormArea').style.display = 'block';
            document.getElementById('fwAddBtn').style.display = 'none';
            document.getElementById('fwFormTitle').textContent = '新增外勤打卡';
            document.getElementById('fwClientSelect').value = '';
            renderFwServiceHierarchy();
            document.getElementById('fwArriveBtn').style.display = 'block';
            document.getElementById('fwArriveInfo').style.display = 'none';
            document.getElementById('fwContentSection').style.display = 'none';
            document.getElementById('fwPhotoPreview').innerHTML = '';
            const mileageEl = document.getElementById('fwMileage');
            if (mileageEl) mileageEl.value = '';
            const contentEl = document.getElementById('fwWorkContent');
            if (contentEl) contentEl.value = '';
            const notesEl = document.getElementById('fwNotes');
            if (notesEl) notesEl.value = '';
            document.getElementById('fwLeaveInfo').style.display = 'none';
            initSignatureCanvas();
        }

        function cancelFieldWorkForm() {
            document.getElementById('fwFormArea').style.display = 'none';
            document.getElementById('fwAddBtn').style.display = 'block';
        }

        async function resumeFieldWork(logId) {
            const log = fwLogs.find(l => l.id === logId);
            if (!log) return;
            fwCurrentLogId = logId;
            fwPhotoUrls = log.photo_urls || [];
            showFieldWorkForm();
            document.getElementById('fwFormTitle').textContent = '繼續外勤打卡';
            document.getElementById('fwClientSelect').value = log.client_id || '';
            renderFwServiceHierarchy(log.service_item_id ? [log.service_item_id] : []);
            if (log.arrive_time) {
                document.getElementById('fwArriveBtn').style.display = 'none';
                const t = new Date(log.arrive_time).toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
                document.getElementById('fwArriveInfo').style.display = 'block';
                document.getElementById('fwArriveInfo').textContent = `✅ 已到達 ${t}`;
                document.getElementById('fwContentSection').style.display = 'block';
                const contentEl = document.getElementById('fwWorkContent');
                if (contentEl) contentEl.value = log.work_content || '';
                const mileageEl = document.getElementById('fwMileage');
                if (mileageEl) mileageEl.value = log.mileage || '';
                const notesEl = document.getElementById('fwNotes');
                if (notesEl) notesEl.value = log.notes || '';
                renderPhotoPreview();
            }
        }

        // ---- 到達打卡 ----
        async function fwArriveCheckin() {
            const clientId = document.getElementById('fwClientSelect').value;
            if (!clientId) return showToast('請先選擇客戶');
            const btn = document.getElementById('fwArriveBtn');
            btn.disabled = true; btn.textContent = '📍 定位中...';
            try {
                const loc = await getGPS();
                const now = new Date().toISOString();
                const selectedItems = getSelectedFwItems();
                const serviceId = selectedItems.length > 0 ? selectedItems[0] : null;
                const record = {
                    employee_id: currentEmployee.id,
                    client_id: clientId,
                    service_item_id: serviceId,
                    work_date: getTaiwanDate(),
                    arrive_time: now,
                    arrive_lat: loc.latitude,
                    arrive_lng: loc.longitude,
                    status: 'draft'
                };
                const { data, error } = await sb.from('field_work_logs').insert(record).select().single();
                if (error) throw error;
                fwCurrentLogId = data.id;
                btn.style.display = 'none';
                const infoEl = document.getElementById('fwArriveInfo');
                const t = new Date(now).toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
                infoEl.style.display = 'block';

        async function fwHandleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 20 * 1024 * 1024) {
                showToast('⚠️ 檔案過大（上限 20MB）');
                event.target.value = '';
                return;
            }
            try {
                showToast('☁️ 上傳中...');
                const bitmap = await createImageBitmap(file);
                const MAX_W = 800, MAX_H = 600;
                let cw = bitmap.width, ch = bitmap.height;
                if (cw > MAX_W) { ch = Math.round(ch * MAX_W / cw); cw = MAX_W; }
                if (ch > MAX_H) { cw = Math.round(cw * MAX_H / ch); ch = MAX_H; }
                const canvas = document.createElement('canvas');
                canvas.width = cw; canvas.height = ch;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(bitmap, 0, 0, cw, ch);
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.6));
                const fileName = `fieldwork/${currentEmployee.employee_number}_${Date.now()}.jpg`;
                const { error } = await sb.storage.from(CONFIG.BUCKET).upload(fileName, blob);
                if (error) throw error;
                const { data: urlData } = sb.storage.from(CONFIG.BUCKET).getPublicUrl(fileName);
                const url = urlData?.publicUrl || urlData?.publicURL;
                fwPhotoUrls.push(url);
                renderPhotoPreview();
                if (fwCurrentLogId) {
                    await sb.from('field_work_logs').update({ photo_urls: fwPhotoUrls }).eq('id', fwCurrentLogId);
                }
                showToast('✅ 照片已上傳');
            } catch(e) {
                console.error(e);
                showToast('❌ 上傳失敗：' + friendlyError(e));
            }
            event.target.value = '';
        }

        // ---- 簽名板 ----
        function initSignatureCanvas() {
            const canvas = document.getElementById('fwSignatureCanvas');
            if (!canvas) return;
            fwSignatureCtx = canvas.getContext('2d');
            fwSignatureCtx.clearRect(0, 0, canvas.width, canvas.height);
            fwSignatureCtx.lineWidth = 2;
            fwSignatureCtx.lineCap = 'round';
            fwSignatureCtx.strokeStyle = '#0F172A';
            fwSigning = false;
            document.getElementById('fwSignatureStatus').textContent = '請在上方區域簽名';
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const touch = e.touches ? e.touches[0] : e;
                return { x: (touch.clientX - rect.left) * scaleX, y: (touch.clientY - rect.top) * scaleY };
            };
            const start = (e) => { e.preventDefault(); fwSigning = true; const p = getPos(e); fwSignatureCtx.beginPath(); fwSignatureCtx.moveTo(p.x, p.y); };
            const move = (e) => { if (!fwSigning) return; e.preventDefault(); const p = getPos(e); fwSignatureCtx.lineTo(p.x, p.y); fwSignatureCtx.stroke(); };
            const end = () => { fwSigning = false; };
            canvas.onmousedown = start; canvas.onmousemove = move; canvas.onmouseup = end; canvas.onmouseleave = end;
            canvas.ontouchstart = start; canvas.ontouchmove = move; canvas.ontouchend = end;
        }

        function fwClearSignature() {
            const canvas = document.getElementById('fwSignatureCanvas');
            if (!canvas || !fwSignatureCtx) return;
            fwSignatureCtx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('fwSignatureStatus').textContent = '已清除，請重新簽名';
        }

        async function fwUploadSignature() {
            const canvas = document.getElementById('fwSignatureCanvas');
            if (!canvas) return null;
            const blank = document.createElement('canvas');
            blank.width = canvas.width; blank.height = canvas.height;
            if (canvas.toDataURL() === blank.toDataURL()) return null;
            const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
            const fileName = `signatures/${currentEmployee.employee_number}_${Date.now()}.png`;
            const { error } = await sb.storage.from(CONFIG.BUCKET).upload(fileName, blob);
            if (error) throw error;
            const { data: urlData } = sb.storage.from(CONFIG.BUCKET).getPublicUrl(fileName);
            return urlData?.publicUrl || urlData?.publicURL;
        }

            const date = new Date(d);
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            date.setDate(diff);
            date.setHours(0, 0, 0, 0);
            return date;
        }

        function formatDate(d) {
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function getSunday(monday) {
            const sun = new Date(monday);
            sun.setDate(sun.getDate() + 6);
            return sun;
        }

        async function loadClientList() {
            try {
                let query = sb.from('clients').select('*');
                if (window.currentCompanyId) query = query.eq('company_id', window.currentCompanyId);
                if (!isAdminUser() && currentEmployee?.id) {
                    query = query.eq('employee_id', currentEmployee.id);
                }
                const { data } = await query.order('company_name');
                allClients = data || [];
                renderClientList(allClients);

                // 服務項目管理僅管理員可見
                const svcSection = document.getElementById('serviceItemSection');
                if (svcSection) svcSection.style.display = isAdminUser() ? 'block' : 'none';
                if (isAdminUser()) loadServiceItemList();
            } catch(e) { console.error('載入客戶失敗', e); }
        }

        function filterClientList() {
            const q = (document.getElementById('clientSearch')?.value || '').toLowerCase();
            const filtered = q ? allClients.filter(c => c.company_name.toLowerCase().includes(q)) : allClients;
            renderClientList(filtered);
        }

        function renderClientList(list) {
            const el = document.getElementById('clientList');
            if (!el) return;
            if (list.length === 0) {
                el.innerHTML = '<p style="text-align:center;color:#94A3B8;font-size:13px;padding:16px;">無客戶資料</p>';
                return;
            }
            el.innerHTML = list.map(c => {
                const catBadge = c.category === 'vip'
                    ? '<span style="background:#FEF3C7;color:#92400E;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;">VIP ⭐</span>'
                    : '<span style="background:#F1F5F9;color:#64748B;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;">一般</span>';
                const activeBadge = c.is_active === false ? ' <span style="color:#EF4444;font-size:10px;">（已停用）</span>' : '';
                return `<div style="background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:14px;margin-bottom:8px;${c.is_active === false ? 'opacity:0.5;' : ''}">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                        <span style="font-weight:700;font-size:14px;">${escapeHTML(c.company_name)}${activeBadge}</span>
                        ${catBadge}
                    </div>
                    <div style="font-size:12px;color:#64748B;">
                        ${c.contact_name ? '👤 ' + escapeHTML(c.contact_name) + ' ' : ''}
                        ${c.phone ? '📞 ' + escapeHTML(c.phone) : ''}
                        ${c.industry ? ' · ' + escapeHTML(c.industry) : ''}
                    </div>
                    ${c.address ? '<div style="font-size:11px;color:#94A3B8;margin-top:4px;">📍 ' + escapeHTML(c.address) + '</div>' : ''}
                    <div style="display:flex;gap:6px;margin-top:8px;">
                        <button class="btn btn-secondary" onclick="editClient('${c.id}')" style="font-size:11px;padding:6px 12px;">編輯</button>
                        <button class="btn btn-secondary" onclick="toggleClientActive('${c.id}',${c.is_active !== false})" style="font-size:11px;padding:6px 12px;color:${c.is_active !== false ? '#EF4444' : '#059669'};">${c.is_active !== false ? '停用' : '啟用'}</button>
                    </div>
                </div>`;
            }).join('');
        }

        function showClientModal(id) {
            document.getElementById('clientModal').style.display = 'block';
            document.getElementById('clientEditId').value = id || '';
            document.getElementById('clientModalTitle').textContent = id ? '編輯客戶' : '新增客戶';
            if (!id) {
                ['clientCompanyName','clientContactName','clientPhone','clientAddress','clientLat','clientLng','clientIndustry','clientNotes'].forEach(f => {
                    const el = document.getElementById(f); if (el) el.value = '';
                });
                document.getElementById('clientCategory').value = 'general';
            }
        }

        function closeClientModal() {
            document.getElementById('clientModal').style.display = 'none';
        }

        function editClient(id) {
            const c = allClients.find(x => x.id === id);
            if (!c) return;
            showClientModal(id);
            document.getElementById('clientCompanyName').value = c.company_name || '';
            document.getElementById('clientContactName').value = c.contact_name || '';
            document.getElementById('clientPhone').value = c.phone || '';
            document.getElementById('clientAddress').value = c.address || '';
            document.getElementById('clientLat').value = c.latitude || '';
            document.getElementById('clientLng').value = c.longitude || '';
            document.getElementById('clientCategory').value = c.category || 'general';
            document.getElementById('clientIndustry').value = c.industry || '';
            document.getElementById('clientNotes').value = c.notes || '';
        }

        async function getClientGPS() {
            try {
                showToast('📍 定位中...');
                const loc = await getGPS();
                document.getElementById('clientLat').value = loc.latitude.toFixed(6);
                document.getElementById('clientLng').value = loc.longitude.toFixed(6);
                showToast('✅ 座標已取得');
            } catch(e) { showToast('❌ 定位失敗：' + friendlyError(e)); }
        }

        async function saveClient() {
            const name = document.getElementById('clientCompanyName').value.trim();
            if (!name) return showToast('請輸入公司名稱');
            const id = document.getElementById('clientEditId').value;
            const record = {
                company_name: name,
                contact_name: document.getElementById('clientContactName').value.trim(),
                phone: document.getElementById('clientPhone').value.trim(),
                address: document.getElementById('clientAddress').value.trim(),
                latitude: parseFloat(document.getElementById('clientLat').value) || null,
                longitude: parseFloat(document.getElementById('clientLng').value) || null,
                category: document.getElementById('clientCategory').value,
                industry: document.getElementById('clientIndustry').value.trim(),
                notes: document.getElementById('clientNotes').value.trim(),
                updated_at: new Date().toISOString()
            };
            if (!id) {
                if (window.currentCompanyId) record.company_id = window.currentCompanyId;
                if (currentEmployee?.id) record.employee_id = currentEmployee.id;
            }
            try {
                if (id) {
                    const { error } = await sb.from('clients').update(record).eq('id', id);
                    if (error) throw error;
                    showToast('✅ 客戶已更新');
                } else {
                    const { error } = await sb.from('clients').insert(record);
                    if (error) throw error;
                    showToast('✅ 客戶已新增');
                }
                closeClientModal();
                loadClientList();
            } catch(e) { showToast('❌ 儲存失敗：' + friendlyError(e)); }
        }

        async function toggleClientActive(id, isActive) {
            const action = isActive ? '停用' : '啟用';
            if (!confirm(`確定${action}此客戶？`)) return;
            try {
                const { error } = await sb.from('clients').update({ is_active: !isActive, updated_at: new Date().toISOString() }).eq('id', id);
                if (error) throw error;
                showToast(`✅ 已${action}`);
                loadClientList();
            } catch(e) { showToast('❌ 操作失敗：' + friendlyError(e)); }
        }

        // ===== 服務項目管理（管理員用） =====
        async function loadServiceItemList() {
            try {
                const { data } = await sb.from('service_items').select('*').order('name');
                const el = document.getElementById('serviceItemList');
                if (!el || !data) return;
                el.innerHTML = data.map(s => {
                    const active = s.is_active !== false;
                    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F1F5F9;">
                        <span style="flex:1;font-size:13px;${active ? '' : 'opacity:0.4;text-decoration:line-through;'}">${escapeHTML(s.name)}</span>
                        <button onclick="toggleServiceItem('${s.id}',${active})" style="padding:4px 10px;border:1px solid #E2E8F0;border-radius:6px;background:#fff;font-size:11px;cursor:pointer;color:${active ? '#EF4444' : '#059669'};">${active ? '停用' : '啟用'}</button>
                    </div>`;
                }).join('');
            } catch(e) { console.error('載入服務項目失敗', e); }
        }

        async function addServiceItem() {
            const input = document.getElementById('newServiceItemName');
            const name = input?.value.trim();
            if (!name) return showToast('請輸入服務項目名稱');
            try {
                const { error } = await sb.from('service_items').insert({ name, is_active: true });
                if (error) throw error;
                input.value = '';
                showToast('✅ 已新增');
                loadServiceItemList();
                loadServiceItems();
            } catch(e) { showToast('❌ 新增失敗：' + friendlyError(e)); }
        }

        async function toggleServiceItem(id, isActive) {
            try {
                const { error } = await sb.from('service_items').update({ is_active: !isActive }).eq('id', id);
                if (error) throw error;
                showToast(isActive ? '已停用' : '已啟用');
                loadServiceItemList();
                loadServiceItems();
            } catch(e) { showToast('❌ 操作失敗：' + friendlyError(e)); }
        }

        // ===== 頁面初始化 =====
        window.addEventListener('load', async () => {
            if (typeof initializeLiff === 'undefined') {
                console.error('initializeLiff 函數未定義，請檢查 common.js 是否正確載入');
                return;
            }

            const initialized = await initializeLiff();
            if (initialized) {
                const isLoggedIn = await checkUserStatus();
                if (isLoggedIn) {
                    document.getElementById('loadingPage').style.display = 'none';

                    // 根據 hash 決定預設 tab
                    const hash = window.location.hash;
                    if (hash === '#sales') {
                        const salesBtn = document.querySelectorAll('.fwsTab')[1];
                        if (salesBtn) switchTab('sales', salesBtn);
                    } else if (hash === '#clients') {
                        const clientBtn = document.querySelectorAll('.fwsTab')[2];
                        if (clientBtn) switchTab('clients', clientBtn);
                    } else {
                        initFieldWorkPage();
                    }
                } else {
                    window.location.href = 'index.html';
                }
            }
        });
    </script>

</body>
</html>
