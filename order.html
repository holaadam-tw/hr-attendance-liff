}

function renderGroupMembers() {
  var container = document.getElementById('groupMembers');
  if (!container) return;

  // 合併自己的即時購物車資料
  var myData = {
    memberId: groupMe.memberId,
    nickname: groupMe.nickname,
    avatar: groupMe.avatar,
    items: cart.map(function(c) {
      var item = menuItems.find(function(i) { return i.id === c.id; });
      return { name: item ? item.name : '???', qty: c.qty, price: c.price };
    }),
    total: cart.reduce(function(s, c) { return s + c.price * c.qty; }, 0),
    count: cart.reduce(function(s, c) { return s + c.qty; }, 0),
    status: cart.length > 0 ? 'ordering' : 'browsing'
  };

  // 合併所有成員（自己 + 其他人）
  var allMembers = [myData];
  groupMembers.forEach(function(m) {
    if (m.memberId !== groupMe.memberId) allMembers.push(m);
  });

  var html = '';
  var grandTotal = 0;
  allMembers.forEach(function(m) {
    var isMe = m.memberId === groupMe.memberId;
    var statusText = '';
    if (m.count > 0) {
      statusText = m.count + ' 項';
      var itemNames = (m.items || []).slice(0, 3).map(function(i) { return i.name; }).join('、');
      if (itemNames) statusText += '：' + itemNames;
      if ((m.items || []).length > 3) statusText += '…';
    } else {
      statusText = m.status === 'browsing' ? '瀏覽菜單中…' : '尚未開始';
    }
    grandTotal += (m.total || 0);

    html += '<div class="group-member' + (isMe ? ' me' : '') + '">' +
      '<div class="group-member-avatar">' + m.avatar + '</div>' +
      '<div class="group-member-info">' +
        '<div class="group-member-name">' + m.nickname + (isMe ? '（你）' : '') + '</div>' +
        '<div class="group-member-status">' + statusText + '</div>' +
      '</div>' +
      (m.total > 0 ? '<div class="group-member-total">$' + m.total + '</div>' : '') +
    '</div>';
  });

  // 合計列
  if (allMembers.length > 1) {
    html += '<div style="display:flex;justify-content:space-between;padding:8px 10px 2px;border-top:1px solid var(--border-light);margin-top:4px;">' +
      '<span style="font-size:13px;font-weight:700;color:var(--text-secondary);">團體合計</span>' +
      '<span style="font-size:16px;font-weight:800;color:var(--primary);">$' + grandTotal + '</span>' +
    '</div>';
  }

  container.innerHTML = html;
}

// 同步購物車到 Supabase（使用 orders 表作為即時通訊通道）
async function saveGroupMember() {
  if (!groupSession || !groupMe || !currentStoreId) return;
  try {
    var myItems = cart.map(function(c) {
      var item = menuItems.find(function(i) { return i.id === c.id; });
      return { name: item ? item.name : '???', qty: c.qty, price: c.price };
    });

    var payload = {
      store_id: currentStoreId,
      table_number: groupSession.tableNum,
      order_type: 'group_sync',
      status: 'active',
      notes: JSON.stringify({
        sessionId: groupSession.sessionId,
        memberId: groupMe.memberId,
        nickname: groupMe.nickname,
        avatar: groupMe.avatar,
        isHost: groupMe.isHost || false,
        timestamp: new Date().toISOString()
      }),
      items: myItems,
      total: cart.reduce(function(s, c) { return s + c.price * c.qty; }, 0)
    };

    await fetch(SUPABASE_URL + '/rest/v1/orders', {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify(payload)
    });
  } catch(e) { /* 靜默處理 */ }
}

// 定時同步
function startGroupSync() {
  if (groupPollTimer) clearInterval(groupPollTimer);

  // 每 3 秒同步一次
  groupPollTimer = setInterval(function() {
    syncGroupData();
    saveGroupMember(); // 同時上傳自己的最新狀態
  }, 3000);

  // 立即同步一次
  syncGroupData();
}

async function syncGroupData() {
  if (!groupSession || !currentStoreId) return;
  try {
    // 查詢同 session 的所有成員最新資料
    var res = await fetch(SUPABASE_URL + '/rest/v1/orders?store_id=eq.' + currentStoreId +
      '&order_type=eq.group_sync&status=eq.active' +
      '&table_number=eq.' + encodeURIComponent(groupSession.tableNum) +
      '&notes=like.*' + encodeURIComponent(groupSession.sessionId) + '*' +
      '&order=created_at.desc&limit=20', {
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' }
    });
    var data = await res.json();
    if (!Array.isArray(data)) return;

    // 只保留每個 memberId 的最新一筆
    var latest = {};
    data.forEach(function(row) {
      try {
        var meta = JSON.parse(row.notes);
        if (!meta.memberId) return;
        if (!latest[meta.memberId] || new Date(meta.timestamp) > new Date(latest[meta.memberId]._ts)) {
          latest[meta.memberId] = {
            memberId: meta.memberId,
            nickname: meta.nickname,
            avatar: meta.avatar,
            items: row.items || [],
            total: row.total || 0,
            count: (row.items || []).reduce(function(s, i) { return s + (i.qty || 1); }, 0),
            status: (row.items || []).length > 0 ? 'ordering' : 'browsing',
            _ts: meta.timestamp
          };
        }
      } catch(e) {}
    });

    groupMembers = Object.values(latest);
    renderGroupMembers();
  } catch(e) { /* 靜默處理 */ }
}

function shareGroupLink() {

  var params = '?store=' + currentStoreId + '&table=' + encodeURIComponent(groupSession.tableNum) + '&group=' + groupSession.sessionId;
  var url = baseUrl + params;

  if (navigator.share) {

function copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      showToast('已複製到剪貼簿！');
    }).catch(function() { fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); showToast('已複製到剪貼簿！'); } catch(e) { showToast('複製失敗，請手動複製'); }
  document.body.removeChild(ta);
}

// ===== 接收分享購物車連結 =====
function loadSharedCart() {
  var params = new URLSearchParams(window.location.search);
  var cartParam = params.get('cart');
  if (!cartParam) return;
  try {
    var decoded = JSON.parse(decodeURIComponent(escape(atob(cartParam))));
    if (!Array.isArray(decoded) || decoded.length === 0) return;
    // 等菜單載入後才匯入
    var checkMenu = setInterval(function() {
      if (menuItems.length > 0) {
        clearInterval(checkMenu);
        var imported = 0;
        decoded.forEach(function(c) {
          var item = menuItems.find(function(i) { return i.id === c.i; });
          if (item && item.available) {
            cart.push({ id: c.i, qty: c.q || 1, price: c.p || item.price, sizeName: c.s || null, selectedOpts: (c.o || []).map(function(n) { return { name: n }; }) });
            imported++;
          }
        });
        if (imported > 0) {
          updateCartUI();
          showToast('已匯入 ' + imported + ' 項共享點餐！');
          // 清除 URL 中的 cart 參數
          var url = new URL(window.location);
          url.searchParams.delete('cart');
          window.history.replaceState({}, '', url);
        }
      }
    }, 200);
  } catch(e) { /* 解析失敗靜默忽略 */ }
}

function getItemDisplayPrice(item) {
  return (item.sizes && item.sizes.length > 0) ? item.sizes[item.sizes.length - 1].price : item.price;

function generatePlaceholder(name) {
  const colors = ['#FFE0B2','#FFCCBC','#C8E6C9','#B3E5FC','#F0F4C3','#D1C4E9','#FFCDD2','#B2DFDB'];
  const hash = name.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  const bg = colors[hash % colors.length];
  const ch = name.charAt(0);
  return 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect fill="' + bg + '" width="200" height="200"/><text x="100" y="115" font-size="56" text-anchor="middle" fill="#555">' + ch + '</text></svg>');
}

  const sectionRect = section.getBoundingClientRect();
  content.scrollTo({ top: content.scrollTop + sectionRect.top - contentRect.top - 8, behavior: 'smooth' });
  setTimeout(function() { isScrollingByClick = false; }, 600);
}

// ===== CART LOGIC =====
function addToCart(itemId, event) {
  const item = menuItems.find(i => i.id === itemId);
  if (!item) return;
  let selectedSizeIdx = item.sizes ? item.sizes.length - 1 : -1;
  if (item.sizes) {
    const itemEl = document.querySelector('.menu-item[data-id="' + itemId + '"]');
    if (itemEl) {
      const activeSize = itemEl.querySelector('.size-option.active');
      if (activeSize) {
        const allSizes = itemEl.querySelectorAll('.size-option');
        allSizes.forEach((el, i) => { if (el === activeSize) selectedSizeIdx = i; });
      }
    }
  }
  const existing = cart.find(c => c.id === itemId);
  if (existing) {
    existing.qty += 1;
    if (item.sizes && selectedSizeIdx >= 0) {
      existing.price = item.sizes[selectedSizeIdx].price;
      existing.sizeName = item.sizes[selectedSizeIdx].name;
    }
  } else {
    const price = item.sizes ? item.sizes[selectedSizeIdx].price : item.price;
    const sizeName = item.sizes ? item.sizes[selectedSizeIdx].name : null;
    cart.push({ id: itemId, qty: 1, price: price, sizeName: sizeName });
  }
  updateCartUI();
  animateAddToCart(event);
  refreshItemDisplay(itemId);
}

function changeQty(itemId, delta, event) {
  if (event) event.stopPropagation();
  const idx = cart.findIndex(c => c.id === itemId);
  if (idx === -1) return;
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  updateCartUI();
  refreshItemDisplay(itemId);
}
function changeCartIdx(idx, delta) {
  if (idx < 0 || idx >= cart.length) return;
  var itemId = cart[idx].id;
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  updateCartUI();
  refreshItemDisplay(itemId);
}

function getCartQty(itemId) {
  return cart.filter(c => c.id === itemId).reduce((sum, c) => sum + c.qty, 0);
}

function refreshItemDisplay(itemId) {
  const itemEl = document.querySelector('.menu-item[data-id="' + itemId + '"]');
  if (!itemEl) return;
  const item = menuItems.find(i => i.id === itemId);
  if (!item) return;
  const actionsEl = itemEl.querySelector('.item-actions');
  const cartQty = getCartQty(itemId);
  var itemName = item ? escHtml(item.name) : '';
  actionsEl.innerHTML = cartQty > 0
    ? '<div class="qty-control"><button class="qty-btn minus" aria-label="減少數量" onclick="changeQty(' + qid(itemId) + ', -1, event)">&#8722;</button><span class="qty-num">' + cartQty + '</span><button class="qty-btn" aria-label="增加數量" onclick="changeQty(' + qid(itemId) + ', 1, event)">+</button></div>'
    : '<button class="add-btn" aria-label="加入 ' + itemName + '" onclick="addToCart(' + qid(itemId) + ', event)">+</button>';
}

function updateCartUI() {
  const totalQty = cart.reduce((s, c) => s + c.qty, 0);
  const totalPrice = cart.reduce((s, c) => s + c.price * c.qty, 0);
  document.getElementById('cartBar').classList.toggle('hidden', totalQty === 0);
  document.getElementById('cartCount').textContent = totalQty;
  document.getElementById('cartItemsText').textContent = '已選 ' + totalQty + ' 件';
  document.getElementById('cartTotal').textContent = totalPrice;
  document.getElementById('drawerTotal').textContent = totalPrice;
  document.getElementById('drawerCount').textContent = totalQty;

  categories.forEach(cat => {
    const badge = document.getElementById('catBadge_' + cat.id);
    if (!badge) return;
    const catQty = cart.filter(c => { const item = menuItems.find(i => i.id === c.id); return item && item.category === cat.id; }).reduce((s, c) => s + c.qty, 0);
    badge.textContent = catQty;
    badge.classList.toggle('show', catQty > 0);
  });
  renderDrawerItems();
}

function renderDrawerItems() {
  const container = document.getElementById('drawerItems');
  if (cart.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">' + ICONS.cart + '</div><div class="empty-title">購物車是空的</div><div class="empty-desc">快去選幾道好菜吧！</div></div>';
    return;
  }
  container.innerHTML = cart.map(function(c, idx) {
    const item = menuItems.find(i => i.id === c.id);
    if (!item) return '';
    const imgSrc = item.image || generatePlaceholder(item.name);
    return '<div class="drawer-item">' +
      '<img class="drawer-item-img" src="' + imgSrc + '" alt="' + escHtml(item.name) + '" onerror="this.src=\'' + generatePlaceholder(item.name) + '\'">' +
      '<div class="drawer-item-info"><div class="drawer-item-name">' + escHtml(item.name) + '</div>' +
      (c.optKey ? '<div class="drawer-item-size">' + escHtml(c.optKey) + '</div>' : '') +
      '<div class="drawer-item-price"><span class="currency">$</span>' + (c.price * c.qty) + '</div></div>' +
      '<div class="drawer-item-qty"><button class="drawer-qty-btn" onclick="changeCartIdx(' + idx + ', -1)">&#8722;</button>' +
      '<span class="drawer-qty-num">' + c.qty + '</span>' +
      '<button class="drawer-qty-btn" onclick="changeCartIdx(' + idx + ', 1)">+</button></div></div>';
  }).join('');
}

function clearCart() {
  if (!confirm('確定要清空購物車嗎？')) return;
  const ids = cart.map(c => c.id);
  cart = [];
  updateCartUI();
  ids.forEach(id => refreshItemDisplay(id));
  toggleCartDrawer();
  showToast('購物車已清空');
}

function toggleCartDrawer() {
  const overlay = document.getElementById('cartOverlay');
  const drawer = document.getElementById('cartDrawer');
  const isOpen = drawer.classList.contains('show');
  if (isOpen) { overlay.classList.remove('show'); drawer.classList.remove('show'); }
  else { renderDrawerItems(); overlay.classList.add('show'); drawer.classList.add('show'); }
}

// ===== ITEM DETAIL MODAL =====
function openItemModal(itemId) {
  const item = menuItems.find(i => i.id === itemId);
  if (!item) return;
  modalItem = item;
  modalQtyVal = 1;
  modalSelectedSize = item.sizes ? item.sizes.length - 1 : null;
  const imgSrc = item.image || generatePlaceholder(item.name);

  // null 防禦：檢查 modal 元素是否存在
  var modalImgEl = document.getElementById('modalImg');
  if (!modalImgEl) {
    // modal 還沒重建完，手動重建
    var overlay = document.getElementById('itemModalOverlay');
    if (overlay && !overlay.querySelector('#modalImg')) {
      overlay.innerHTML =
        '<div class="item-modal" onclick="event.stopPropagation()">' +
        '<img class="modal-img" id="modalImg" src="" alt="">' +
        '<button class="modal-close" onclick="closeItemModal()">&#10005;</button>' +
        '<div class="modal-body"><div class="modal-name" id="modalName"></div><div class="modal-desc" id="modalDesc"></div><div id="modalOptions"></div></div>' +
        '<div class="modal-footer"><div class="modal-price"><span class="currency">$</span><span id="modalPrice">0</span></div>' +
        '<div class="modal-qty-area"><div class="qty-control"><button class="qty-btn minus" onclick="modalQtyChange(-1)">&#8722;</button><span class="qty-num" id="modalQty">1</span><button class="qty-btn" onclick="modalQtyChange(1)">+</button></div></div>' +
        '<button class="modal-add-cart" onclick="modalAddToCart()">加入購物車</button></div></div>';
      modalImgEl = document.getElementById('modalImg');
    }
    if (!modalImgEl) return; // 真的找不到就 bail out
  }

  modalImgEl.src = imgSrc;
  modalImgEl.onerror = function() { this.src = generatePlaceholder(item.name); };
  document.getElementById('modalName').textContent = item.name;
  document.getElementById('modalDesc').textContent = item.desc || '暫無描述';
  document.getElementById('modalQty').textContent = modalQtyVal;
  let optHtml = '';
  if (item.sizes && item.sizes.length > 0) {
    var hasImgs = item.sizes.some(function(s) { return s.image; });
    if (hasImgs) {
      optHtml += '<div class="modal-option-group"><div class="modal-option-title">份量 <span class="required">必選</span></div><div class="modal-options has-images">' +
        item.sizes.map(function(s, i) {
          var sImg = s.image || generatePlaceholder(s.name);
          return '<div class="modal-opt-card ' + (i === modalSelectedSize ? 'active' : '') + '" onclick="selectModalSize(' + i + ')">' +
            '<img class="opt-card-img" src="' + sImg + '" onerror="this.src=\'' + generatePlaceholder(s.name) + '\'">' +
            '<div class="opt-card-check">✓</div>' +
            '<div class="opt-card-info"><div class="opt-card-name">' + escHtml(s.name) + '</div>' +
            '<div class="opt-card-price">$' + s.price + '</div></div></div>';
        }).join('') +
      '</div></div>';
    } else {
      optHtml += '<div class="modal-option-group"><div class="modal-option-title">份量 <span class="required">必選</span></div><div class="modal-options">' +
        item.sizes.map((s, i) => '<button class="modal-opt-btn ' + (i === modalSelectedSize ? 'active' : '') + '" onclick="selectModalSize(' + i + ')">' + escHtml(s.name) + ' - $' + s.price + '</button>').join('') +
      '</div></div>';
    }
  }
  // 顯示非尺寸的 options（如飲料選擇、可樂/雪碧）
  if (item.options && Array.isArray(item.options)) {
    item.options.forEach(function(grp, gi) {
      if (grp.group === '尺寸') return; // 已處理為 sizes
      var reqHtml = grp.required ? ' <span class="required">必選</span>' : '';
      var grpItems = grp.items || [];
      var grpHasImgs = grpItems.some(function(o) { return o.image; });
      if (grpHasImgs) {
        optHtml += '<div class="modal-option-group" data-optgrp="' + gi + '"><div class="modal-option-title">' + escHtml(grp.group) + reqHtml + '</div><div class="modal-options has-images">' +
          grpItems.map(function(opt, oi) {
            var oImg = opt.image || generatePlaceholder(opt.name);
            var priceText = opt.price ? '+$' + opt.price : '免費';
            return '<div class="modal-opt-card' + (oi === 0 ? ' active' : '') + '" onclick="selectOption(this, ' + gi + ', ' + oi + ')">' +
              '<img class="opt-card-img" src="' + oImg + '" onerror="this.src=\'' + generatePlaceholder(opt.name) + '\'">' +
              '<div class="opt-card-check">✓</div>' +
              '<div class="opt-card-info"><div class="opt-card-name">' + escHtml(opt.name) + '</div>' +
              '<div class="opt-card-price">' + priceText + '</div></div></div>';
          }).join('') +
        '</div></div>';
      } else {
        optHtml += '<div class="modal-option-group" data-optgrp="' + gi + '"><div class="modal-option-title">' + escHtml(grp.group) + reqHtml + '</div><div class="modal-options">' +
          grpItems.map(function(opt, oi) {
            return '<button class="modal-opt-btn' + (oi === 0 ? ' active' : '') + '" onclick="selectOption(this, ' + gi + ', ' + oi + ')">' + escHtml(opt.name) + (opt.price ? ' +$' + opt.price : '') + '</button>';
          }).join('') +
        '</div></div>';
      }
    });
  }
  if (item.spicy > 0) {
    optHtml += '<div class="modal-option-group"><div class="modal-option-title">辣度</div><div class="modal-options">' +
      '<button class="modal-opt-btn" onclick="selectSpicy(this, 0)">不辣</button>' +
      '<button class="modal-opt-btn active" onclick="selectSpicy(this, 1)">小辣</button>' +
      '<button class="modal-opt-btn" onclick="selectSpicy(this, 2)">中辣</button>' +
      '<button class="modal-opt-btn" onclick="selectSpicy(this, 3)">大辣</button></div></div>';
  }
  document.getElementById('modalOptions').innerHTML = optHtml;
  updateModalPrice();
  document.getElementById('itemModalOverlay').classList.add('show');

function closeItemModal(event) {
  if (event && event.target !== document.getElementById('itemModalOverlay') && !event.target.classList.contains('modal-close')) return;
  document.getElementById('itemModalOverlay').classList.remove('show');
  modalItem = null;
}

function selectModalSize(idx) {
  modalSelectedSize = idx;
  // 支援 button 模式和 card 模式
  var grp = document.querySelector('#modalOptions .modal-option-group:first-child');
  if (grp) {
    grp.querySelectorAll('.modal-opt-btn').forEach(function(btn, i) { btn.classList.toggle('active', i === idx); });
    grp.querySelectorAll('.modal-opt-card').forEach(function(card, i) { card.classList.toggle('active', i === idx); });
  }
  updateModalPrice();
}

function selectSpicy(btn, level) {
  btn.closest('.modal-options').querySelectorAll('.modal-opt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function selectOption(el, grpIdx, optIdx) {
  // el 可能是 button 或 card div
  var container = el.closest('.modal-options');
  container.querySelectorAll('.modal-opt-btn').forEach(b => b.classList.remove('active'));
  container.querySelectorAll('.modal-opt-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function updateModalPrice() {
  if (!modalItem) return;
  let price = modalItem.price;
  if (modalItem.sizes && modalSelectedSize !== null) price = modalItem.sizes[modalSelectedSize].price;
  document.getElementById('modalPrice').textContent = price * modalQtyVal;
}

function modalQtyChange(delta) {
  modalQtyVal = Math.max(1, modalQtyVal + delta);
  document.getElementById('modalQty').textContent = modalQtyVal;
  updateModalPrice();
}

function modalAddToCart() {
  if (!modalItem) return;
  let price = modalItem.price;
  let sizeName = null;
  if (modalItem.sizes && modalSelectedSize !== null) {
    price = modalItem.sizes[modalSelectedSize].price;
    sizeName = modalItem.sizes[modalSelectedSize].name;
  }
  // 收集選擇的 options
  var selectedOpts = [];
  document.querySelectorAll('#modalOptions [data-optgrp]').forEach(function(grpEl) {
    var activeBtn = grpEl.querySelector('.modal-opt-btn.active');
    if (activeBtn) selectedOpts.push(activeBtn.textContent.trim());
  });
  var optKey = sizeName ? sizeName : '';
  if (selectedOpts.length > 0) optKey += (optKey ? '/' : '') + selectedOpts.join('/');

  const existing = cart.find(c => c.id === modalItem.id && c.sizeName === sizeName && c.optKey === optKey);
  if (existing) { existing.qty += modalQtyVal; }
  else { cart.push({ id: modalItem.id, qty: modalQtyVal, price: price, sizeName: sizeName, optKey: optKey, selectedOpts: selectedOpts }); }
  updateCartUI();
  refreshItemDisplay(modalItem.id);
  closeItemModal({ target: document.getElementById('itemModalOverlay') });
  showToast('已加入 ' + modalItem.name + ' x ' + modalQtyVal);
}

function selectSize(itemId, sizeIdx) {
  const item = menuItems.find(i => i.id === itemId);
  if (!item || !item.sizes) return;
  const itemEl = document.querySelector('.menu-item[data-id="' + itemId + '"]');
  if (!itemEl) return;
  itemEl.querySelectorAll('.size-option').forEach((el, i) => { el.classList.toggle('active', i === sizeIdx); });
  const priceEl = itemEl.querySelector('.item-price');
  if (priceEl) priceEl.innerHTML = '<span class="currency">$</span>' + item.sizes[sizeIdx].price;
  const cartItem = cart.find(c => c.id === itemId);
  if (cartItem) {
    cartItem.price = item.sizes[sizeIdx].price;
    cartItem.sizeName = item.sizes[sizeIdx].name;
    updateCartUI();
  }
}

function animateAddToCart(event) {
  if (!event) return;
  const btn = event.target || event.currentTarget;
  const rect = btn.getBoundingClientRect();
  const cartIcon = document.querySelector('.cart-icon-wrap');
  if (!cartIcon) return;
  const cartRect = cartIcon.getBoundingClientRect();
  const dot = document.createElement('div');
  dot.className = 'fly-dot';
  dot.style.left = (rect.left + rect.width / 2 - 7) + 'px';
  dot.style.top = (rect.top + rect.height / 2 - 7) + 'px';
  document.body.appendChild(dot);
  requestAnimationFrame(function() {
    dot.style.left = (cartRect.left + cartRect.width / 2 - 7) + 'px';
    dot.style.top = (cartRect.top + cartRect.height / 2 - 7) + 'px';
    dot.style.transform = 'scale(0.3)';
    dot.style.opacity = '0.5';
  });
  setTimeout(function() { dot.remove(); }, 600);
}

function setViewMode(mode, btn) {

    items.classList.add('grid-view');

// ===== UPSELL RECOMMENDATIONS (結帳前加購推薦) =====
function getUpsellItems() {
  // 從購物車中找出未點的同分類或推薦品項
  var cartIds = cart.map(function(c) { return c.id; });
  var cartCats = [];
  cart.forEach(function(c) {
    var item = menuItems.find(function(i) { return i.id === c.id; });
    if (item && item.category_id) cartCats.push(item.category_id);
  });

  // 優先推薦：有圖片的 + 不在購物車裡的 + 價格較低（配菜/飲料類）
  var candidates = menuItems.filter(function(item) {
    if (cartIds.indexOf(item.id) !== -1) return false;
    if (!item.available) return false;
    return true;
  });

  // 排序策略：有圖片優先、推薦標籤優先、低價優先（加購通常是小品項）
  candidates.sort(function(a, b) {
    var aScore = 0, bScore = 0;
    if (a.image) aScore += 10;
    if (b.image) bScore += 10;
    if (a.is_featured) aScore += 5;
    if (b.is_featured) bScore += 5;
    if ((a.tags || []).indexOf('hot') !== -1) aScore += 3;
    if ((b.tags || []).indexOf('hot') !== -1) bScore += 3;
    // 同分類的不優先（避免推薦同類型）
    if (cartCats.indexOf(a.category_id) === -1) aScore += 2;
    if (cartCats.indexOf(b.category_id) === -1) bScore += 2;
    return bScore - aScore;
  });

  return candidates.slice(0, 6);
}

function renderUpsellSection() {
  var items = getUpsellItems();
  if (items.length === 0) return '';

  var cardsHtml = '';
  items.forEach(function(item) {
    var imgSrc = item.image || generatePlaceholder(item.name);
    cardsHtml += '<div class="upsell-card" onclick="addUpsellItem(\'' + item.id + '\')">' +
      '<img class="upsell-card-img" src="' + imgSrc + '" alt="' + item.name + '" onerror="this.src=\'' + generatePlaceholder(item.name) + '\'">' +
      '<div class="upsell-card-info">' +
        '<div class="upsell-card-name">' + escHtml(item.name) + '</div>' +
        '<div class="upsell-card-price">$' + item.price + '</div>' +
      '</div>' +
      '<button class="upsell-card-add" onclick="event.stopPropagation()">+</button>' +
    '</div>';
  });

  return '<div class="upsell-section">' +
    '<div class="upsell-header"><span class="upsell-icon">🤤</span><h4>別人也加了這些</h4><span class="upsell-hint">點擊加入</span></div>' +
    '<div class="upsell-scroll">' + cardsHtml + '</div>' +
  '</div>';
}

function addUpsellItem(itemId) {
  var item = menuItems.find(function(i) { return i.id === itemId; });
  if (!item) return;

  // 直接加入購物車
  var cartItem = { id: item.id, qty: 1, price: item.price, sizeName: null, selectedOpts: [] };
  cart.push(cartItem);
  updateCartUI();

  // 重新渲染確認訂單頁（包含更新後的清單）
  closeConfirmOrder();
  setTimeout(function() { submitOrder(); }, 150);
}

async function confirmAndSubmitOrder() {
  var btn = document.getElementById('confirmSubmitBtn');
  btn.disabled = true;
  btn.textContent = '送出中...';

  const isTakeout = window._orderMode === 'takeout';
  const tableNum = isTakeout ? '外帶' : document.getElementById('tableNumber').value.trim();
  const totalQty = cart.reduce((s, c) => s + c.qty, 0);
  const totalPrice = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const orderItems = cart.map(c => {
    const item = menuItems.find(i => i.id === c.id);
    return { item_id: c.id, name: item ? item.name : 'Unknown', size: c.sizeName || null, options: c.selectedOpts || [], qty: c.qty, unit_price: c.price, subtotal: c.price * c.qty };
  });

  var orderNum = '';
  // 從確認頁讀取手機和姓名
  const memberPhone = (document.getElementById('confirmPhone')?.value?.trim()) || (document.getElementById('memberPhone')?.value?.trim()) || '';
  const customerName = (document.getElementById('confirmName')?.value?.trim()) || (document.getElementById('customerNameInput')?.value?.trim()) || '';

  // 手機必填驗證
  if (!memberPhone || memberPhone.length < 9) {
    var errEl = document.getElementById('confirmPhoneError');
    if (errEl) errEl.style.display = '';
    var phoneInput = document.getElementById('confirmPhone');
    if (phoneInput) {
      phoneInput.style.borderColor = '#EF4444';
      phoneInput.focus();
      phoneInput.addEventListener('input', function() {
        phoneInput.style.borderColor = '#E2E8F0';
        if (errEl) errEl.style.display = 'none';
      }, { once: true });
    }
    showToast('📱 請填寫手機號碼才能點餐');
    btn.disabled = false;
    btn.textContent = '確認送出';
    return;
  }

  // 黑名單檢查
  if (window._isBlacklisted) {
    showToast('🚫 此號碼已被限制線上點餐，請至櫃檯點餐');
    btn.disabled = false;
    btn.textContent = '確認送出';
    return;
  }

  // 同步回會員區 + localStorage
  if (document.getElementById('memberPhone')) document.getElementById('memberPhone').value = memberPhone;
  if (document.getElementById('customerNameInput')) document.getElementById('customerNameInput').value = customerName;
  if (currentStoreId) {
    try { localStorage.setItem('member_phone_' + currentStoreId, memberPhone); } catch(e) {}
  }

  const order = {
    store_id: currentStoreId,
    table_number: tableNum,
    items: orderItems,
    total: totalPrice,
    status: 'pending',
    order_type: isTakeout ? 'takeout' : 'dine_in',
    customer_phone: memberPhone || null,
    customer_name: customerName || null,
    customer_line_id: _lineUserId || null,
    notes: isTakeout ? '' : '用餐人數: ' + guestCount
  };
  try {
    if (currentStoreId) {
      const res = await fetch(SUPABASE_URL + '/rest/v1/orders', {
        method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
        body: JSON.stringify(order)
      });
      if (!res.ok) {
        const errText = await res.text();
        console.error('Order API error:', res.status, errText, JSON.stringify(order));
        showToast('訂單送出失敗: ' + res.status + ' ' + (errText || '').substring(0, 80));
        btn.disabled = false;
        btn.textContent = '確認送出';
        return;
      }
      const resData = await res.json();
      if (resData && resData[0]) {
        if (resData[0].order_number) orderNum = resData[0].order_number;
        if (resData[0].id) window._lastOrderId = resData[0].id;
      }
    }
  } catch (e) {
    console.error('Order submit error:', e);
    showToast('訂單送出失敗: ' + e.message);
    btn.disabled = false;
    btn.textContent = '確認送出';
    return;
  }
  // 會員集點
  let earnedPts = 0;
  if (loyaltyConfig) {
    earnedPts = await awardLoyaltyPoints(totalPrice, window._lastOrderId) || 0;
  }

  // 儲存手機號給「我的訂單」面板用
  window._myOrderPhone = memberPhone;

  // 自動建立/更新客戶資料（優雅降級：失敗不影響送單）
  try {
    var custCheck = await fetch(SUPABASE_URL + '/rest/v1/store_customers?store_id=eq.' + currentStoreId +
      '&phone=eq.' + encodeURIComponent(memberPhone) + '&limit=1', {
      headers: { 'apikey': SUPABASE_KEY }
    });
    if (custCheck.ok) {
      var custData = await custCheck.json();
      if (custData && custData[0]) {
        // 更新：累加訂單數和消費金額
        await fetch(SUPABASE_URL + '/rest/v1/store_customers?id=eq.' + custData[0].id, {
          method: 'PATCH',
          headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify({
            total_orders: (custData[0].total_orders || 0) + 1,
            total_spent: parseFloat(custData[0].total_spent || 0) + totalPrice,
            name: customerName || custData[0].name,
            updated_at: new Date().toISOString()
          })
        });
      } else {
        // 新建客戶
        await fetch(SUPABASE_URL + '/rest/v1/store_customers', {
          method: 'POST',
          headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify({
            store_id: currentStoreId,
            phone: memberPhone,
            name: customerName || null,
            total_orders: 1,
            total_spent: totalPrice
          })
        });
      }
    }
  } catch(e) {
    console.warn('客戶資料更新跳過:', e.message);
  }

  showOrderSuccess(totalQty, totalPrice, tableNum, orderNum, earnedPts);
}

function showOrderSuccess(qty, price, table, orderNum, earnedPts) {
  const isTakeout = table === '外帶';

  // 記錄本次訂單，清空購物車
  if (orderNum) {
    if (!window._myOrders) window._myOrders = [];
    window._myOrders.push({ orderNum: orderNum, time: new Date(), qty: qty, total: price, status: 'pending', table: table, rushCount: 0 });
  }
  cart = [];
  updateCartUI();
  showMyOrdersBtn();
  const pointsHtml = earnedPts > 0 ? '<div style="background:#FEF3C7;border-radius:10px;padding:8px 16px;margin-bottom:16px;display:inline-block;font-size:13px;color:#92400E;">🎯 本次獲得 <b>' + earnedPts + '</b> 點</div>' : '';
  const overlay = document.getElementById('itemModalOverlay');
  overlay.innerHTML = '<div class="item-modal" onclick="event.stopPropagation()" style="text-align:center; padding: 40px 20px;">' +
    '<div style="font-size:64px; margin-bottom:16px; color:#4CAF50;">&#10003;</div>' +
    '<h2 style="font-size:22px; font-weight:800; margin-bottom:8px;">訂單已送出！</h2>' +
    (orderNum ? '<div style="background:#F0FDF4;border:2px solid #86EFAC;border-radius:12px;padding:12px 20px;margin-bottom:16px;display:inline-block;"><div style="font-size:11px;color:#16A34A;margin-bottom:2px;">' + (isTakeout ? '取餐號碼' : '訂單號碼') + '</div><div style="font-size:36px;font-weight:900;color:#15803D;letter-spacing:4px;">' + orderNum + '</div></div>' : '') +
    '<p style="color:#666; font-size:14px; margin-bottom:20px;">' + (isTakeout ? '外帶' : '桌號 ' + table) + '&#12288;' + qty + ' 道菜品&#12288;合計 $' + price + '</p>' +
    pointsHtml +
    '<p style="color:#999; font-size:12px; margin-bottom:24px;">' + (isTakeout ? '請至櫃檯等候叫號取餐' : '廚房正在準備您的餐點，請稍候') + '</p>' +
    '<div style="display:flex;flex-direction:column;gap:12px;margin-top:24px;padding:0 16px;">' +
    '<button onclick="showMyOrdersPanel()" style="width:100%;padding:16px;border:2px solid var(--primary);border-radius:14px;background:#fff;color:var(--primary);font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;">📋 查看我的訂單</button>' +
    '<button onclick="showMyOrdersPanel();setTimeout(function(){switchOrderTab(\'points\');},300);" style="width:100%;padding:16px;border:2px solid #6366F1;border-radius:14px;background:#fff;color:#6366F1;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;">🎯 查看我的點數</button>' +
    '<button onclick="resetOrder()" style="width:100%;padding:16px;border:none;border-radius:14px;background:var(--primary);color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;">🍽️ 繼續點餐</button>' +
    '</div></div>';
  overlay.classList.add('show');
  document.getElementById('cartOverlay').classList.remove('show');
  document.getElementById('cartDrawer').classList.remove('show');
}

function resetOrder() {
  // 1. 清空購物車
  cart = [];
  updateCartUI();

  // 2. 關閉所有 overlay 和 drawer
  var overlay = document.getElementById('itemModalOverlay');
  if (overlay) overlay.classList.remove('show');
  var cartOverlay = document.getElementById('cartOverlay');
  if (cartOverlay) cartOverlay.classList.remove('show');
  var cartDrawer = document.getElementById('cartDrawer');
  if (cartDrawer) cartDrawer.classList.remove('show');

  // 3. 立刻重建 modal HTML（不用 setTimeout，避免 null 問題）
  if (overlay) {
    overlay.innerHTML =
      '<div class="item-modal" onclick="event.stopPropagation()">' +
      '<img class="modal-img" id="modalImg" src="" alt="">' +
      '<button class="modal-close" onclick="closeItemModal()">&#10005;</button>' +
      '<div class="modal-body"><div class="modal-name" id="modalName"></div><div class="modal-desc" id="modalDesc"></div><div id="modalOptions"></div></div>' +
      '<div class="modal-footer"><div class="modal-price"><span class="currency">$</span><span id="modalPrice">0</span></div>' +
      '<div class="modal-qty-area"><div class="qty-control"><button class="qty-btn minus" onclick="modalQtyChange(-1)">&#8722;</button><span class="qty-num" id="modalQty">1</span><button class="qty-btn" onclick="modalQtyChange(1)">+</button></div></div>' +
      '<button class="modal-add-cart" onclick="modalAddToCart()">加入購物車</button></div></div>';
  }

  // 4. 強制重置所有品項的數量按鈕回到 "+"
  document.querySelectorAll('.menu-item').forEach(function(el) {
    var id = el.getAttribute('data-id');
    if (!id) return;
    var actionsEl = el.querySelector('.item-actions');
    if (actionsEl) {
      actionsEl.innerHTML = '<button class="add-btn" onclick="addToCart(' + id + ', event)">+</button>';
    }
  });

  // 5. 重置所有 size 選擇回預設（最後一個/最大的）
  document.querySelectorAll('.menu-item').forEach(function(el) {
    var sizeOptions = el.querySelectorAll('.size-option');
    if (sizeOptions.length > 0) {
      sizeOptions.forEach(function(s, i) {
        s.classList.toggle('active', i === sizeOptions.length - 1);
      });
      // 重置價格顯示
      var id = el.getAttribute('data-id');
      var item = menuItems.find(function(m) { return m.id == id; });
      if (item && item.sizes) {
        var priceEl = el.querySelector('.item-price');
        if (priceEl) {
          priceEl.innerHTML = '<span class="currency">$</span>' + item.sizes[item.sizes.length - 1].price;
        }
      }
    }
  });
}

// ===== MY ORDERS (訂單追蹤 + 催單) =====
function showMyOrdersBtn() {
  var btn = document.getElementById('myOrdersBtn');
  if (!window._myOrders || window._myOrders.length === 0) { btn.style.display = 'none'; return; }
  var activeStatuses = ['pending', 'confirmed', 'preparing', 'ready'];
  var activeCount = window._myOrders.filter(function(o) { return activeStatuses.includes(o.status); }).length;
  // 只有有進行中訂單才顯示浮動按鈕
  if (activeCount > 0) {
    btn.style.display = 'block';
    var badge = document.getElementById('myOrdersBadge');
    badge.textContent = activeCount;
    badge.style.display = 'block';
  } else {
    btn.style.display = 'none';
  }
}

function showMyOrdersPanel() {
  document.getElementById('itemModalOverlay').classList.remove('show');
  var overlay = document.getElementById('myOrdersOverlay');
  overlay.style.display = 'block';
  var innerPanel = overlay.querySelector('div[onclick*="stopPropagation"]');
  if (innerPanel) {
    requestAnimationFrame(function() { innerPanel.style.transform = 'translateY(0)'; });
  }
  loadMyOrdersForPanel();
  if (window._orderPollTimer) clearInterval(window._orderPollTimer);
  window._orderPollTimer = setInterval(function() { loadMyOrdersForPanel(); }, 8000);
}

function closeMyOrdersPanel() {
  var overlay = document.getElementById('myOrdersOverlay');
  var innerPanel = overlay.querySelector('div[onclick*="stopPropagation"]');
  if (innerPanel) {
    innerPanel.style.transform = 'translateY(100%)';
  }
  setTimeout(function() {
    overlay.style.display = 'none';
  }, 350);
  if (window._orderPollTimer) { clearInterval(window._orderPollTimer); window._orderPollTimer = null; }
}

// ===== 頁面載入：自動偵測是否有歷史訂單 =====
async function checkMyOrdersOnLoad() {
  if (!currentStoreId) return;
  var phone = localStorage.getItem('member_phone_' + currentStoreId);
  if (!phone || phone.length < 9) return;

  // 儲存供面板使用
  window._myOrderPhone = phone;

  try {
    // 查有沒有 active 訂單（7天內）
    var sevenDaysAgo = new Date();
    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

    var res = await fetch(SUPABASE_URL + '/rest/v1/orders?store_id=eq.' + currentStoreId +
      '&customer_phone=eq.' + encodeURIComponent(phone) +
      '&created_at=gte.' + sevenDaysAgo.toISOString() +
      '&select=id,status&limit=20', {
      headers: { 'apikey': SUPABASE_KEY }
    });
    var orders = await res.json() || [];

    var activeStatuses = ['pending', 'confirmed', 'preparing', 'ready'];
    var activeCount = orders.filter(function(o) {
      return activeStatuses.includes(o.status);
    }).length;

    // 只有進行中訂單才顯示 header 按鈕
    if (activeCount > 0) {
      showHeaderOrderBtn(activeCount);
    } else {
      // 沒有進行中訂單，隱藏 header 按鈕
      var btn = document.getElementById('headerOrderBtn');
      if (btn) btn.style.display = 'none';
    }
  } catch(e) {
    // 靜默失敗，不影響點餐
  }
}

function showHeaderOrderBtn(activeCount) {
  var btn = document.getElementById('headerOrderBtn');
  if (!btn) return;
  btn.style.display = '';
  var badge = document.getElementById('headerOrderBadge');
  if (badge) {
    if (activeCount > 0) {
      badge.style.display = '';
      badge.textContent = String(activeCount);
    } else {
      badge.style.display = 'none';
    }
  }
}

var ORDER_STATUS_MAP = {
  pending:    { icon: '🕐', text: '等待確認', color: '#F59E0B', bg: '#FFFBEB' },
  confirmed:  { icon: '✅', text: '已確認',   color: '#3B82F6', bg: '#EFF6FF' },
  preparing:  { icon: '🍳', text: '準備中',   color: '#8B5CF6', bg: '#F5F3FF' },
  ready:      { icon: '🔔', text: '可取餐',   color: '#10B981', bg: '#ECFDF5' },
  completed:  { icon: '✅', text: '已完成',   color: '#6B7280', bg: '#F3F4F6' },
  cancelled:  { icon: '❌', text: '已取消',   color: '#EF4444', bg: '#FEF2F2' }
};

function renderMyOrders() {
  var list = document.getElementById('myOrdersList');
  if (!window._myOrders || window._myOrders.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:24px;color:#94A3B8;">目前沒有訂單</div>';
    return;
  }
  var sorted = window._myOrders.slice().reverse();
  list.innerHTML = sorted.map(function(o) {
    var s = ORDER_STATUS_MAP[o.status] || ORDER_STATUS_MAP.pending;
    var timeStr = o.time ? new Date(o.time).toLocaleTimeString('zh-TW', { timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', hour12: false }) : '';
    var isActive = o.status !== 'completed' && o.status !== 'cancelled';
    return '<div style="background:' + s.bg + ';border-radius:14px;padding:16px;margin-bottom:10px;' + (isActive ? 'border:2px solid ' + s.color + ';' : 'opacity:0.7;') + '">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">' +
        '<div style="font-size:20px;font-weight:900;color:' + s.color + ';">#' + escHtml(String(o.orderNum)) + '</div>' +
        '<div style="font-size:13px;font-weight:700;color:' + s.color + ';background:' + s.color + '22;padding:4px 10px;border-radius:20px;">' + s.icon + ' ' + s.text + '</div>' +
      '</div>' +
      '<div style="display:flex;justify-content:space-between;font-size:13px;color:#64748B;">' +
        '<span>' + (o.table === '外帶' ? '🛍️ 外帶' : '🍽️ ' + escHtml(String(o.table))) + '・' + o.qty + ' 件</span>' +
        '<span>$' + o.total + '・' + timeStr + '</span>' +
      '</div>' +
      (isActive && o.status === 'ready' ? '<div style="text-align:center;margin-top:10px;font-size:14px;font-weight:700;color:#10B981;animation:pulse 1.5s infinite;">🔔 您的餐點已準備好，請取餐！</div>' : '') +
      (isActive && o.status !== 'ready' ? '<div style="text-align:center;margin-top:10px;">' +
        (o.rushCount >= 2 ? '<div style="font-size:12px;color:#94A3B8;">已催單 ' + o.rushCount + ' 次，廚房加緊準備中</div>' :
        '<button onclick="rushOrder(\'' + escHtml(String(o.orderNum)) + '\')" style="background:none;border:2px solid #F59E0B;color:#F59E0B;padding:8px 20px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">🔥 催單</button>') +
      '</div>' : '') +
    '</div>';
  }).join('');
}

async function pollMyOrders() {
  if (!window._myOrders || window._myOrders.length === 0 || !currentStoreId) return;
  var activeOrders = window._myOrders.filter(function(o) { return o.status !== 'completed' && o.status !== 'cancelled'; });
  if (activeOrders.length === 0) return;
  try {
    var orderNums = activeOrders.map(function(o) { return o.orderNum; });
    var url = SUPABASE_URL + '/rest/v1/orders?store_id=eq.' + currentStoreId + '&order_number=in.(' + orderNums.join(',') + ')&select=order_number,status,rush_count';
    var res = await fetch(url, { headers: { 'apikey': SUPABASE_KEY } });
    if (!res.ok) return;
    var data = await res.json();
    var changed = false;
    (data || []).forEach(function(d) {
      var found = window._myOrders.find(function(o) { return String(o.orderNum) === String(d.order_number); });
      if (found) {
        if (found.status !== d.status) { found.status = d.status; changed = true;
          var st = ORDER_STATUS_MAP[d.status] || {};
          showToast(st.icon + ' #' + d.order_number + ' ' + (st.text || d.status));
        }
        if (d.rush_count !== undefined) found.rushCount = d.rush_count;
      }
    });
    if (changed) { renderMyOrders(); showMyOrdersBtn(); }
  } catch(e) { /* 靜默 */ }
}

async function rushOrder(orderNum) {
  var found = window._myOrders.find(function(o) { return String(o.orderNum) === String(orderNum); });
  if (!found) return;
  if (found.rushCount >= 2) { showToast('已催單 ' + found.rushCount + ' 次，請耐心等候'); return; }
  try {
    var url = SUPABASE_URL + '/rest/v1/orders?store_id=eq.' + currentStoreId + '&order_number=eq.' + orderNum;
    var res = await fetch(url, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify({ rush_count: (found.rushCount || 0) + 1, last_rush_at: new Date().toISOString() })
    });
    if (!res.ok) { showToast('催單失敗，請稍後再試'); return; }
    found.rushCount = (found.rushCount || 0) + 1;
    showToast('🔥 已催單！廚房已收到通知');
    renderMyOrders();
  } catch(e) {
    showToast('催單失敗：' + (e.message || e));
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { toast.classList.remove('show'); _toastTimer = null; }, 2200);
}

// ===== 會員集點 =====
async function checkMemberPoints() {
  const phone = document.getElementById('memberPhone').value.trim();
  if (!phone || phone.length < 9) { showToast('請輸入正確手機號碼'); return; }
  localStorage.setItem('member_phone_' + currentStoreId, phone);
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/loyalty_points?store_id=eq.' + currentStoreId + '&customer_line_id=eq.' + encodeURIComponent(phone) + '&limit=1', {
      headers: { 'apikey': SUPABASE_KEY }
    });
    const data = await res.json();
    const info = document.getElementById('memberInfo');
    if (data && data.length > 0) {
      memberPointsData = data[0];
      const pts = memberPointsData.points || 0;
      const cfg = loyaltyConfig || {};
      const needed = cfg.points_to_redeem || 10;
      const discount = cfg.discount_amount || 50;
      document.getElementById('memberPoints').textContent = '🎯 ' + pts + ' 點';
      info.style.display = '';
      if (pts >= needed) {
        info.innerHTML = '🎉 您有 <b>' + pts + '</b> 點，可兌換 <b>$' + discount + '</b> 折扣！<br><span style="font-size:11px;color:#94A3B8;">下次結帳時自動折抵</span>';
      } else {
        info.innerHTML = '目前 <b>' + pts + '</b> 點，再集 <b>' + (needed - pts) + '</b> 點可兌換 $' + discount + ' 折扣';
      }
      // 加上集點規則說明
      if (loyaltyConfig && window._loyaltyEnabled) {
        const ruleText = '<br><span style="font-size:11px;color:#94A3B8;">集點規則：每消費 $' +
          (loyaltyConfig.spend_per_point || 50) + ' 得 1 點，' +
          (loyaltyConfig.points_to_redeem || 10) + ' 點可折 $' +
          (loyaltyConfig.discount_amount || 50) + '</span>';
        info.innerHTML += ruleText;
      }
    } else {
      memberPointsData = null;
      document.getElementById('memberPoints').textContent = '新會員';
      info.style.display = '';

async function awardLoyaltyPoints(orderTotal, orderId) {
  // LINE userId 集點（優先），fallback 到手機號碼
  var lineUid = _lineUserId;
  var phone = document.getElementById('memberPhone')?.value?.trim() || document.getElementById('confirmPhone')?.value?.trim();
  if (!lineUid && (!phone || phone.length < 9)) return 0;
  if (!window._loyaltyEnabled) return 0;

  // 讀取 loyalty_settings
  var spendPer = (loyaltyConfig && loyaltyConfig.spend_per_point) || 50;
  try {
    var settingsResp = await fetch(SUPABASE_URL + '/rest/v1/loyalty_settings?company_id=eq.' + (window._storeCompanyId || currentStoreId) + '&limit=1', {
      headers: { 'apikey': SUPABASE_KEY }
    });
    var settingsArr = await settingsResp.json();
    if (settingsArr && settingsArr.length > 0) spendPer = settingsArr[0].points_per_amount || spendPer;
  } catch(e) {}

  var earnedPoints = Math.floor(orderTotal / spendPer);
  if (earnedPoints <= 0) return 0;

  try {
    var member = null;
    var headers = { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' };

    // 查詢會員：LINE userId 優先
    if (lineUid) {
      var resp = await fetch(SUPABASE_URL + '/rest/v1/loyalty_members?company_id=eq.' + (window._storeCompanyId || currentStoreId) + '&line_user_id=eq.' + encodeURIComponent(lineUid) + '&limit=1', { headers: headers });
      var arr = await resp.json();
      member = arr && arr.length > 0 ? arr[0] : null;
      if (!member) {
        var cr = await fetch(SUPABASE_URL + '/rest/v1/loyalty_members', {
          method: 'POST', headers: { ...headers, 'Prefer': 'return=representation' },
          body: JSON.stringify({ company_id: (window._storeCompanyId || currentStoreId), line_user_id: lineUid, name: _lineProfile?.displayName || null, phone: phone || null, total_points: 0 })
        });
        var created = await cr.json();
        member = Array.isArray(created) ? created[0] : created;
      }
    } else if (phone) {
      // Fallback: 手機號碼
      var resp2 = await fetch(SUPABASE_URL + '/rest/v1/loyalty_members?company_id=eq.' + (window._storeCompanyId || currentStoreId) + '&phone=eq.' + encodeURIComponent(phone) + '&limit=1', { headers: headers });
      var arr2 = await resp2.json();
      member = arr2 && arr2.length > 0 ? arr2[0] : null;
      if (!member) {
        var cr2 = await fetch(SUPABASE_URL + '/rest/v1/loyalty_members', {
          method: 'POST', headers: { ...headers, 'Prefer': 'return=representation' },
          body: JSON.stringify({ company_id: (window._storeCompanyId || currentStoreId), phone: phone, total_points: 0 })
        });
        var created2 = await cr2.json();
        member = Array.isArray(created2) ? created2[0] : created2;
      }
    }

    if (!member || !member.id) return 0;

    // 更新 total_points + last_visit
    await fetch(SUPABASE_URL + '/rest/v1/loyalty_members?id=eq.' + member.id, {
      method: 'PATCH', headers: { ...headers, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ total_points: (member.total_points || 0) + earnedPoints, last_visit: new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Taipei' }) })
    });

    // 寫入 loyalty_transactions
    await fetch(SUPABASE_URL + '/rest/v1/loyalty_transactions', {
      method: 'POST', headers: { ...headers, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ company_id: (window._storeCompanyId || currentStoreId), member_id: member.id, type: 'earn', points: earnedPoints, amount: orderTotal, source: 'order', source_id: orderId || null, note: '消費 $' + orderTotal + ' 集點' })
    });

    return earnedPoints;
  } catch(e) { console.warn('Award points error:', e); return 0; }
}

async function loadConfirmMemberInfo(phone) {
  var card = document.getElementById('confirmMemberCard');
  if (!card) return;

      var custRes = await fetch(SUPABASE_URL + '/rest/v1/store_customers?store_id=eq.' + currentStoreId + '&phone=eq.' + encodeURIComponent(phone) + '&limit=1', {

      }
    } catch(e) {
      console.warn('store_customers 查詢跳過:', e.message);
    }

    // 2. 查點數
    var points = 0;
    if (loyaltyConfig) {
      var ptsRes = await fetch(SUPABASE_URL + '/rest/v1/loyalty_points?store_id=eq.' + currentStoreId + '&customer_line_id=eq.' + encodeURIComponent(phone) + '&limit=1', {

      });

    }

      window._isBlacklisted = true;

    }
    window._isBlacklisted = false;

    // 4. 會員卡（精簡一行）
    card.style.display = '';
    card.style.background = '#F8FAFC';

    if (customer) {
      var html = '<div style="display:flex;justify-content:space-between;align-items:center;">';
      html += '<div>';

      html += '</div>';

      if (loyaltyConfig && window._loyaltyEnabled !== false) {
        var cfg = loyaltyConfig;
        var needed = cfg.points_to_redeem || cfg.points_per_reward || 10;
        var discount = cfg.discount_amount || cfg.reward_discount || 50;

        html += '<span style="font-size:11px;color:var(--primary);font-weight:600;"> 點</span>';
        if (points >= needed) {
          html += '<div style="font-size:10px;color:#059669;font-weight:600;">🎉 可折$' + discount + '</div>';
        } else {
          html += '<div style="font-size:10px;color:#94A3B8;">再' + (needed - points) + '點可折$' + discount + '</div>';
        }
        html += '</div>';
      }
      html += '</div>';

        html += '<div style="margin-top:6px;padding:4px 8px;background:#FEF3C7;border-radius:6px;color:#92400E;font-size:11px;">⚠️ 有' + customer.no_show_count + '次未取餐紀錄，再次未取餐將無法線上點餐</div>';

      var nameInput = document.getElementById('confirmName');

    }

    }

      html += '<div><div style="font-size:13px;font-weight:600;">' + (isEarn ? '✅ 消費集點' : '🎁 兌換折抵') + '</div>';
      html += '<div style="font-size:11px;color:#94A3B8;">' + dateStr + '</div></div>';
      html += '<div style="font-size:16px;font-weight:800;color:' + (isEarn ? '#059669' : '#DC2626') + ';">' + (isEarn ? '+' : '-') + pts + '</div>';
      html += '</div>';
    });
    container.innerHTML = html;
  } catch(e) {
    console.warn('Load points history error:', e);
    container.innerHTML = '<div style="text-align:center;padding:16px;color:#94A3B8;font-size:13px;">暫無點數紀錄</div>';
  }

function renderMyOrderCard(o) {
  var statusMap = {
    pending:   { label: '🕐 等待確認', bg: '#FEF3C7', color: '#92400E' },
    confirmed: { label: '✅ 已確認',   bg: '#D1FAE5', color: '#065F46' },
    preparing: { label: '🍳 準備中',   bg: '#DBEAFE', color: '#1E40AF' },
    ready:     { label: '🔔 可取餐',   bg: '#FEE2E2', color: '#991B1B' },
    completed: { label: '✅ 已完成',   bg: '#F3F4F6', color: '#6B7280' },
    cancelled: { label: '❌ 已取消',   bg: '#F9FAFB', color: '#9CA3AF' }
  };
  var st = statusMap[o.status] || statusMap.pending;
  var num = o.order_number || o.pickup_number || '---';
  var d = new Date(o.created_at);
  var dateStr = (d.getMonth()+1) + '/' + d.getDate() + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  var items = o.items || [];
  var isExpanded = !!myOrdersExpanded[o.id];
  var typeLabel = o.order_type === 'takeout' ? '外帶' : (o.table_number ? '桌' + o.table_number : '內用');
  var isActive = ['pending','confirmed','preparing','ready'].includes(o.status);

  var summary = items.slice(0, 2).map(function(i) { return esc(i.name) + ' x' + i.qty; }).join('、');
  if (items.length > 2) summary += '⋯ 還有' + (items.length - 2) + '項';

  var html = '<div style="background:#fff;border:1px solid #F1F5F9;border-radius:14px;padding:14px;margin-bottom:10px;' + (isActive ? 'border-left:4px solid ' + st.color + ';' : '') + '">';

  // Header
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
    '<div><span style="font-size:16px;font-weight:800;">#' + num + '</span><span style="font-size:11px;color:#94A3B8;margin-left:6px;">' + typeLabel + '</span></div>' +
    '<span style="font-size:11px;padding:3px 8px;border-radius:6px;font-weight:600;background:' + st.bg + ';color:' + st.color + ';">' + st.label + '</span>' +
  '</div>';

  // Ready 提示
  if (o.status === 'ready') {
    html += '<div style="padding:6px 8px;background:#FEE2E2;border-radius:8px;text-align:center;font-size:13px;font-weight:700;color:#DC2626;margin-bottom:6px;">🔔 您的餐點已準備好，請取餐！</div>';
  }

  // 品項（展開/收合）
  html += '<div onclick="toggleMyOrder(\'' + o.id + '\')" style="cursor:pointer;">';
  if (isExpanded) {
    items.forEach(function(i) {
      var opts = '';
      if (i.options && Array.isArray(i.options)) {
        opts = i.options.map(function(g) {
          if (typeof g === 'string') return g;
          if (g.group && g.choices) return g.group + ': ' + g.choices.join(', ');
          return '';
        }).filter(Boolean).join(' / ');
      }
      html += '<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed #F1F5F9;font-size:13px;">' +
        '<div><span style="font-weight:600;">' + esc(i.name || '') + '</span> <span style="color:#94A3B8;">x' + i.qty + '</span>' +
        (opts ? '<div style="font-size:11px;color:#94A3B8;">' + esc(opts) + '</div>' : '') + '</div>' +
        '<span style="font-weight:600;">$' + (i.subtotal || i.unit_price * i.qty) + '</span></div>';
    });
    html += '<div style="text-align:center;font-size:11px;color:var(--primary);margin-top:4px;">▲ 收合</div>';
  } else {
    html += '<div style="font-size:13px;color:#64748B;">' + summary + '</div>';
    html += '<div style="text-align:center;font-size:11px;color:var(--primary);margin-top:4px;">▼ 展開明細</div>';
  }
  html += '</div>';

  // Footer
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding-top:6px;border-top:1px solid #F1F5F9;">' +
    '<span style="font-size:12px;color:#94A3B8;">' + dateStr + '</span>' +
    '<span style="font-size:15px;font-weight:800;">$' + (o.total || 0) + '</span></div>';

  html += '</div>';
  return html;
}

function toggleMyOrder(id) {
  myOrdersExpanded[id] = !myOrdersExpanded[id];
  loadMyOrdersForPanel();
}
</script>

<!-- ===== MY ORDERS FLOATING BTN + PANEL ===== -->
<div id="myOrdersBtn" style="display:none; position:fixed; bottom:90px; right:16px; z-index:800; background:var(--primary); color:#fff; width:52px; height:52px; border-radius:50%; box-shadow:0 4px 16px rgba(0,0,0,0.2); cursor:pointer; font-size:20px; font-weight:700; text-align:center; line-height:52px;" onclick="showMyOrdersPanel()">
  📋
  <span id="myOrdersBadge" style="position:absolute;top:-4px;right:-4px;background:#EF4444;color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;line-height:18px;text-align:center;padding:0 4px;display:none;"></span>
</div>

<div id="myOrdersOverlay" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);" onclick="closeMyOrdersPanel()">
  <div onclick="event.stopPropagation()" style="position:absolute;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--bg-card,#fff);border-radius:24px 24px 0 0;max-height:80vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,0.15);padding:20px 16px calc(24px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);">
    <div style="width:40px;height:4px;border-radius:2px;background:#DDD;margin:0 auto 16px;"></div>
    <!-- Tab 切換 -->
    <div style="display:flex;border-bottom:2px solid #E2E8F0;margin-bottom:12px;">
      <button id="tabOrders" onclick="switchOrderTab('orders')" style="flex:1;padding:12px;font-size:15px;font-weight:700;border:none;background:none;cursor:pointer;border-bottom:3px solid var(--primary);color:var(--primary);font-family:inherit;">📋 我的訂單</button>
      <button id="tabPoints" onclick="switchOrderTab('points')" style="flex:1;padding:12px;font-size:15px;font-weight:700;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;color:#94A3B8;font-family:inherit;">🎯 我的點數</button>
    </div>
    <!-- Tab 內容：訂單 -->
    <div id="tabContentOrders">
      <div style="font-size:12px;color:var(--text-muted,#94A3B8);text-align:center;margin-bottom:16px;">最近 7 天的訂單紀錄</div>
      <div id="myOrdersList" style="max-height:60vh;overflow-y:auto;"></div>
    </div>
    <!-- Tab 內容：點數 -->
    <div id="tabContentPoints" style="display:none;">
      <div id="myOrdersPointsCard"></div>
      <div id="pointsHistory" style="margin-top:16px;"></div>
    </div>
  </div>
</div>

<div id="myOrdersPanel" style="display:none;"></div>

<style>
@keyframes slideUpPanel { from { transform:translateY(100%); } to { transform:translateY(0); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
</style>

</body>
