        function goPage(url) {

        function startCheckIn() {
            if (document.getElementById('checkInBtn')?.classList.contains('disabled')) return;
            if (isProcessing) return;
            isProcessing = true;
            window.location.href = 'checkin.html?type=in';
            setTimeout(() => isProcessing = false, 1000);
        }

        function startCheckOut() {
            if (document.getElementById('checkOutBtn')?.classList.contains('disabled')) return;
            if (isProcessing) return;
            isProcessing = true;
            window.location.href = 'checkin.html?type=out';
            setTimeout(() => isProcessing = false, 1000);

        // 餐飲業快捷功能
        async function openQrOrder() {
            // 找到該公司關聯的商店，導向點餐頁
            if (!currentCompanyId) return;
            try {
                const { data } = await sb.from('store_profiles')

                    .eq('is_active', true)

        // 根據產業別調整頁面標題
        function updatePageTitle() {

                restaurant: '🍽️ 餐飲服務中心',
                manufacturing: '🏭 員工服務中心',
                service: '🔧 服務管理中心',

            };

            document.title = title;

        // 更新今日資訊
        function updateTodayInfo() {
            const now = new Date();
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            const dateStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} 週${days[now.getDay()]}`;
            const el = document.getElementById('todayDate');
            if (el) el.textContent = dateStr;
        }

        // 載入今日打卡狀態（重用 checkTodayAttendance() 已取得的 todayAttendance，避免重複 API）
        function loadTodayStatus() {
            const data = todayAttendance;
            const badgeEl = document.getElementById('userStatusBadge');

            if (data?.check_in_time) {
                const inTime = new Date(data.check_in_time);
                const timeStr = inTime.toLocaleTimeString('zh-TW', { timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', hour12: false });
                document.getElementById('todayCheckinTime').textContent = timeStr;

                // is_late 來自 DB（quick_check_in RPC 判定），fallback 用打卡時間 vs 班別開始時間
                let isLate = data.is_late === true;
                if (data.is_late == null) {
                    // fallback：DB 無 is_late 時用上班時間判斷
                    const workStart = getCachedSetting('work_hours')?.start || '08:00';
                    const [sh, sm] = workStart.split(':').map(Number);
                    const threshold = parseInt(getCachedSetting('late_threshold_minutes')?.toString() || '0');
                    const inLocal = new Date(inTime.toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
                    const scheduledMin = sh * 60 + sm + threshold;
                    const actualMin = inLocal.getHours() * 60 + inLocal.getMinutes();
                    isLate = actualMin > scheduledMin;
                }
                document.getElementById('todayCheckinStatus').textContent = isLate ? '⚠️ 遲到' : '✅ 準時';
                document.getElementById('todayCheckinCard').style.background = isLate ? '#FEE2E2' : '#D1FAE5';
                document.getElementById('todayCheckinTime').style.color = isLate ? '#EF4444' : '#059669';

                if (badgeEl) {
                    badgeEl.textContent = '✅ 已打卡';
                    badgeEl.style.background = '#D1FAE5';
                    badgeEl.style.color = '#065F46';
                }
            } else {
                if (badgeEl) {
                    badgeEl.textContent = '⏳ 未打卡';
                    badgeEl.style.background = '#FEF3C7';
                    badgeEl.style.color = '#92400E';
                }
            }

            if (data?.check_out_time) {
                const outTime = new Date(data.check_out_time);
                const timeStr = outTime.toLocaleTimeString('zh-TW', { timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', hour12: false });
                document.getElementById('todayCheckoutTime').textContent = timeStr;
                document.getElementById('todayCheckoutStatus').textContent = '✅ 已下班';
            }
        }

        // 載入員工類型（正職/兼職）
        async function loadEmployeeType() {
            if (!currentEmployee?.id) return;
            try {
                const { data } = await sb.from('salary_settings')
                    .select('salary_type')
                    .eq('employee_id', currentEmployee.id)
                    .eq('is_current', true)
                    .maybeSingle();
                
                const badge = document.getElementById('userTypeBadge');
                if (badge && data) {
                    badge.style.display = 'inline-block';
                    if (data.salary_type === 'monthly') {
                        badge.textContent = '正職';
                        badge.style.background = '#DBEAFE';
                        badge.style.color = '#1E40AF';
                    } else if (data.salary_type === 'hourly') {
                        badge.textContent = '時薪';
                        badge.style.background = '#FEF3C7';
                        badge.style.color = '#92400E';
                    } else if (data.salary_type === 'daily') {
                        badge.textContent = '日薪';
                        badge.style.background = '#FEF3C7';
                        badge.style.color = '#92400E';
                    }
                }
            } catch(e) { console.log('載入員工類型失敗', e); }
        }

        // 天氣
        const WMO_WEATHER = {
            0:'☀️ 晴', 1:'🌤️ 晴', 2:'⛅ 多雲', 3:'☁️ 陰',
            45:'🌫️ 霧', 48:'🌫️ 霧', 51:'🌦️ 小雨', 53:'🌧️ 雨',
            55:'🌧️ 大雨', 61:'🌦️ 小雨', 63:'🌧️ 雨', 65:'🌧️ 大雨',
            71:'🌨️ 小雪', 73:'🌨️ 雪', 75:'🌨️ 大雪', 80:'🌦️ 陣雨',
            81:'🌧️ 陣雨', 82:'⛈️ 暴雨', 95:'⛈️ 雷雨', 96:'⛈️ 雷雨', 99:'⛈️ 雷雨'
        };
        async function loadWeather() {
            try {
                // sessionStorage 快取（30 分鐘有效）
                const WEATHER_CACHE_KEY = 'weather_cache';
                const WEATHER_CACHE_TTL = 30 * 60 * 1000;
                const cached = sessionStorage.getItem(WEATHER_CACHE_KEY);
                if (cached) {
                    try {
                        const c = JSON.parse(cached);
                        if (Date.now() - c.ts < WEATHER_CACHE_TTL) {
                            const el = document.getElementById('weatherInfo');
                            if (el) { el.textContent = c.text; el.style.display = 'inline'; }
                            return;
                        }
                    } catch(e) { sessionStorage.removeItem(WEATHER_CACHE_KEY); }
                }

                let lat = 25.033, lon = 121.565; // 預設台北
                if (cachedLocation) {
                    lat = cachedLocation.latitude; lon = cachedLocation.longitude;
                } else {
                    try {
                        const loc = await getGPS();
                        lat = loc.latitude; lon = loc.longitude;
                    } catch(e) { /* GPS 失敗，使用預設座標 */ }
                }
                // 天氣 + 地名同時取得
                const [weatherRes, geoRes] = await Promise.all([
                    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=Asia%2FTaipei`),
                    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=10&accept-language=zh-TW`).catch(() => null)
                ]);
                const weather = await weatherRes.json();
                const temp = Math.round(weather.current.temperature_2m);
                const code = weather.current.weather_code;
                const desc = WMO_WEATHER[code] || '🌡️';
                // 取地名（市/區）
                let city = '';
                try {
                    if (geoRes?.ok) {
                        const geo = await geoRes.json();
                        city = geo.address?.city || geo.address?.county || geo.address?.town || geo.address?.state || '';
                        city = city.replace(/市$|縣$/, ''); // 台北市 → 台北
                    }
                } catch(e) {}
                const weatherText = `${city ? city + ' ' : ''}${desc} ${temp}°C`;
                const el = document.getElementById('weatherInfo');
                if (el) {
                    el.textContent = weatherText;
                    el.style.display = 'inline';
                }
                // 寫入快取
                try { sessionStorage.setItem(WEATHER_CACHE_KEY, JSON.stringify({ text: weatherText, ts: Date.now() })); } catch(e) {}
            } catch(e) { console.warn('天氣載入失敗', e); }
        }

        // 載入目前訂單（顯示格子 + badge 數字）
        async function loadActiveOrders() {
            const item = document.getElementById('activeOrdersItem');
            const badge = document.getElementById('activeOrdersBadge');
            if (!item) return;
            // 管理員顯示此格子
            item.style.display = '';

            try {
                let storeQ = sb.from('store_profiles').select('id');
                if (currentCompanyId) storeQ = storeQ.or('company_id.eq.' + currentCompanyId + ',company_id.is.null');
                const { data: stores } = await storeQ;
                if (!stores || stores.length === 0) return;

                const { count } = await sb.from('orders')
                    .select('id', { count: 'exact', head: true })
                    .in('store_id', stores.map(s => s.id))
                    .in('status', ['pending', 'confirmed', 'preparing', 'ready']);

                if (count > 0 && badge) {
                    badge.textContent = count;
                    badge.style.display = '';
                }
            } catch(e) { console.log('載入訂單數失敗', e); }
        }

        function checkLiffParams() {
            try {
                if (liff && liff.isInClient()) {
                    const liffParams = liff.getContext();
                    if (liffParams?.type === 'utim' && liffParams.utm) {
                        const urlParams = new URLSearchParams(liffParams.utm);
                        const company = urlParams.get('company');
                        if (company) sessionStorage.setItem('company_code', company);
                    }
                }
            } catch(e) {}
            const urlParams = new URLSearchParams(window.location.search);
            const company = urlParams.get('company');
            if (company) sessionStorage.setItem('company_code', company);
        }

        function handleGotoParam() {
            const goto = new URLSearchParams(window.location.search).get('goto');
            if (!goto) return false;
            const pages = {
                'records': 'records.html',
                'leave': 'records.html#leave',
                'attendance': 'records.html#attendance',
                'requests': 'requests.html',
                'salary': 'salary.html',
                'checkin': 'checkin.html',
                'services': 'services.html',
                'fieldwork': 'fieldwork.html',
                'admin': 'admin.html'
            };
            // loyalty/order 特殊處理：傳遞 LINE userId 到目標頁
            if (goto === 'loyalty' || goto === 'order') {
                var store = new URLSearchParams(window.location.search).get('store') || window.currentCompanyId || '';
                if (liffProfile && liffProfile.userId) {
                    sessionStorage.setItem('loyalty_line_user_id_' + store, liffProfile.userId);
                    sessionStorage.setItem('loyalty_line_name_' + store, liffProfile.displayName || '');
                }
                // 檢查是否有之前存的完整 redirect URL
                var pending = sessionStorage.getItem('liff_redirect_page');
                if (pending && goto === 'order') {
                    sessionStorage.removeItem('liff_redirect_page');
                    window.location.href = pending;
                    return true;
                }
                window.location.href = (goto === 'loyalty' ? 'loyalty.html' : 'order.html') + '?store=' + store;
                return true;
            }
            if (pages[goto]) { window.location.href = pages[goto]; return true; }
            return false;
        }

        window.addEventListener('load', async () => {
            if (typeof initializeLiff === 'undefined') {
                console.error('common.js 未正確載入');
                return;
            }

            const initialized = await initializeLiff({ requireLineApp: true });
            if (initialized) {
                checkLiffParams();

                // LIFF 初始化完成後立即顯示骨架屏（比 checkUserStatus 快）
                const skeleton = document.getElementById('skeletonScreen');
                const loadingEl = document.getElementById('loadingPage');
                if (loadingEl) loadingEl.style.display = 'none';
                if (skeleton) skeleton.style.display = '';

                const isLoggedIn = await checkUserStatus();
                if (isLoggedIn) {
                    // URL 參數跳轉（Rich Menu 用）
                    if (handleGotoParam()) return;

                    // 立即顯示首頁（不等次要資料）
                    if (skeleton) skeleton.style.display = 'none';
                    showPage('homePage');

                    updateTodayInfo();

                    // 顯示公司名稱
                    if (currentCompanyName) {
                        const el = document.getElementById('homeCompanyName');
                        if (el) { el.textContent = currentCompanyName; el.style.display = 'block'; }
                    }

                    // admin 和 manager 都可進管理後台
                    if (currentEmployee && (currentEmployee.role === 'admin' || currentEmployee.role === 'manager')) {
                        const adminEntry = document.getElementById('adminEntry');
                        if (adminEntry) adminEntry.style.display = 'block';
                    }

                    // [優化] loadTodayStatus 直接使用已取得的 todayAttendance，不再額外查詢
                    loadTodayStatus();

                    if (window.isPlatformAdmin) {
                        var vt = document.getElementById('viewToggle');
                        if (vt) vt.style.display = '';
                    }
                    applyFeatureVisibility();
                    renderFeatureToggles();
                    const menuGrid = document.getElementById('smartMenuGrid');
                    if (menuGrid) menuGrid.style.opacity = '1';
                    if (typeof updatePageTitle === 'function') updatePageTitle();

                    // [優化] 次要資料背景載入（不阻擋首頁顯示）
                    const tasks = [
                        loadEmployeeType(),
                        loadAnnouncements(),
                        checkForcedAnnouncements(),
                        loadWeather(),
                        preloadGPS()
                    ];
                    if (currentEmployee.role === 'admin' || currentEmployee.role === 'manager') {
                        tasks.push(loadActiveOrders());
                    }
                    Promise.all(tasks.map(p => Promise.resolve(p).catch(e => console.error(e))));
                } else {
                    // 未綁定：隱藏 skeleton，直接顯示綁定頁面
                    if (skeleton) skeleton.style.display = 'none';
                    showPage('bindPage');
                }
            } else {
                // 無 LIFF 環境（電腦瀏覽器直開）：仍載入設定並套用格子顯示
                try {
                    await loadSettings();
                    applyFeatureVisibility();
                    const menuGrid = document.getElementById('smartMenuGrid');
                    if (menuGrid) menuGrid.style.opacity = '1';
                } catch(e) { console.warn('非 LIFF 環境，功能格子使用預設值'); }
            }
        });

        // ===== 頁面返回時自動刷新打卡狀態 =====
        // checkin.html 打卡成功後設 sessionStorage('needRefreshAttendance', timestamp)
        // index.html 多處檢查 flag → 只重查考勤（不重新 liff.init）
        let _lastRefresh = 0;
        async function refreshAttendanceStatus() {
            if (!currentEmployee?.id) return;
            const now = Date.now();
            if (now - _lastRefresh < 2000) return;
            _lastRefresh = now;
            await checkTodayAttendance();
            loadTodayStatus();
        }
        function checkRefreshFlag() {
            const flag = sessionStorage.getItem('needRefreshAttendance');
            if (!flag) return;
            // 只處理 60 秒內的 flag（避免舊 flag 殘留）
            const elapsed = Date.now() - parseInt(flag, 10);
            if (isNaN(elapsed) || elapsed < 60000) {
                sessionStorage.removeItem('needRefreshAttendance');
                refreshAttendanceStatus();
            } else {
                sessionStorage.removeItem('needRefreshAttendance');
            }
        }
        // 初始化完成後立即檢查（完整重載時走這條路）
        // 放在 load 事件尾端，此時 currentEmployee 已設定好
        setTimeout(checkRefreshFlag, 500);
        // 三重備援（BFCache / 頁面切換 / 焦點恢復）
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) checkRefreshFlag();
        });
        window.addEventListener('pageshow', function() {
            checkRefreshFlag();
        });
        window.addEventListener('focus', function() {
            checkRefreshFlag();
        });
    </script>
</body>
</html>
